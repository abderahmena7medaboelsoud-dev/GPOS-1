//  GPMS Phase 1.1 — UM: User Management Controller
// ══════════════════════════════════════════════════════
const UM = (() => {
  let _editingId = null;

  // ─── Settings Tab Switch ──────────────────────
  function switchSettingsTab(tab) {
    const user  = State.get('currentUser');
    const theme = State.get('theme');
    const content = document.getElementById('settings-content');
    if (!content) return;
    document.querySelectorAll('.settings-tab').forEach(el => {
      const isActive = el.id === 'tab-' + tab;
      el.style.color = isActive ? 'var(--accent-primary)' : 'var(--text-muted)';
      el.style.borderBottom = isActive ? '2px solid var(--accent-primary)' : '2px solid transparent';
    });
    if (tab === 'profile')    content.innerHTML = Components._renderProfileTab(user);
    if (tab === 'appearance') content.innerHTML = Components._renderAppearanceTab(theme);
    if (tab === 'um')         content.innerHTML = renderUserTable();
  }

  // ─── Save Profile ─────────────────────────────
  function saveProfile() {
    const user  = State.get('currentUser');
    const name  = document.getElementById('prof-name')?.value?.trim();
    const pw    = document.getElementById('prof-pw')?.value;
    const msgEl = document.getElementById('prof-msg');
    if (!name) { _msg(msgEl, 'يرجى إدخال الاسم', 'error'); return; }
    const updates = { name };
    if (pw && pw.length >= 6) updates.password = pw;
    else if (pw && pw.length > 0) { _msg(msgEl, 'كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error'); return; }
    const result = UserDB.update(user.id, updates);
    if (result.error) { _msg(msgEl, result.error, 'error'); return; }
    const fresh = UserDB.buildSessionUser(result.user);
    State.login(fresh);
    App._updateTopbarUser(fresh);
    _msg(msgEl, '✓ تم الحفظ بنجاح', 'success');
  }

  // ─── Render User Table (with data isolation) ──
  function renderUserTable(filter = '') {
    const currentUser = State.get('currentUser');
    const role = currentUser.role;

    // RBAC: who can see this section
    const canEdit = role === 'Project Leader';
    const canView = canEdit || role === 'Assistant Project Leader' || role === 'Supervisor';
    const isGroupLeader = role === 'Group Leader';

    if (!canView && !isGroupLeader)
      return RBAC.renderDenied('لا توجد صلاحية لعرض إدارة المستخدمين.');

    // Data isolation: get only visible users
    let users = UserDB.getVisibleUsers(currentUser);
    if (filter) users = users.filter(u =>
      u.name.toLowerCase().includes(filter.toLowerCase()) ||
      u.email.toLowerCase().includes(filter.toLowerCase()) ||
      u.role.toLowerCase().includes(filter.toLowerCase())
    );

    const sectionTitle = isGroupLeader
      ? `أعضاء مجموعتي — ${currentUser.group}`
      : 'إدارة المستخدمين';

    return `
    <div>
      <div class="um-toolbar">
        <input class="form-control" placeholder="🔍 بحث..."
          oninput="UM.searchUsers(this.value)" style="max-width:260px;">
        ${canEdit ? `<button class="btn btn-primary" onclick="UM.openModal()">+ إضافة مستخدم</button>` : ''}
        <span class="badge badge-primary">${users.length} مستخدم</span>
      </div>

      ${isGroupLeader ? `<div class="um-group-badge">
        <span>👥 ${sectionTitle}</span>
        <span class="badge badge-info">${currentUser.project}</span>
      </div>` : ''}

      <div class="um-table-wrap">
        <table class="um-table">
          <thead><tr>
            <th>المستخدم</th>
            <th class="hide-mobile">الدور</th>
            <th class="hide-mobile">المشروع / المجموعة</th>
            <th>الحالة</th>
            ${canEdit ? '<th>إجراءات</th>' : ''}
          </tr></thead>
          <tbody>
            ${users.map(u => {
              const ri = UserDB.getRoleInfo(u.role);
              return `<tr>
                <td>
                  <div class="flex items-center gap-2">
                    <div class="avatar avatar-sm" style="background:linear-gradient(135deg,${ri.color},#8B7CFF);color:white;font-size:0.7rem;min-width:28px;">${u.name.charAt(0)}</div>
                    <div>
                      <div style="font-weight:600;font-size:0.85rem;">${u.name}</div>
                      <div style="font-size:0.72rem;color:var(--text-muted);" dir="ltr">${u.email}</div>
                      <div class="show-mobile-only" style="font-size:0.72rem;color:var(--accent-primary);font-weight:600;">${ri.icon} ${u.role}</div>
                      <div class="show-mobile-only" style="font-size:0.7rem;color:var(--text-muted);">${u.project||''} ${u.group ? '/ '+u.group : ''}</div>
                    </div>
                  </div>
                </td>
                <td class="hide-mobile"><span style="font-size:0.82rem;font-weight:600;">${ri.icon} ${u.role}</span></td>
                <td class="hide-mobile">
                  <div style="font-size:0.8rem;font-weight:600;">${u.project||'—'}</div>
                  <div style="font-size:0.72rem;color:var(--text-muted);">${u.group||''}</div>
                </td>
                <td><span class="badge ${u.status==='active'?'badge-success':'badge-danger'}">${u.status==='active'?'نشط':'معطل'}</span></td>
                ${canEdit ? `<td>
                  <div class="actions">
                    <button class="btn-icon" onclick="UM.openModal('${u.id}')" data-tooltip="تعديل" style="font-size:0.85rem;">✏️</button>
                    <button class="btn-icon" onclick="UM.toggleStatus('${u.id}')" style="font-size:0.85rem;">
                      ${u.status==='active'?'🔴':'🟢'}
                    </button>
                  </div>
                </td>` : ''}
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  function searchUsers(val) {
    const content = document.getElementById('settings-content');
    if (content) content.innerHTML = renderUserTable(val);
  }

  function toggleStatus(id) {
    // RBAC guard
    if (!RBAC.can('manageUsers')) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }
    const user = UserDB.findById(id);
    if (!user) return;
    const currentUser = State.get('currentUser');
    if (user.id === currentUser.id) { Toast.show('لا يمكنك تعطيل حسابك الخاص', 'warning'); return; }
    const newStatus = user.status === 'active' ? 'inactive' : 'active';
    UserDB.update(id, { status: newStatus });
    Toast.show(newStatus === 'active' ? `✓ تم تفعيل حساب ${user.name}` : `تم تعطيل حساب ${user.name}`, newStatus === 'active' ? 'success' : 'warning');
    const content = document.getElementById('settings-content');
    if (content) content.innerHTML = renderUserTable();
  }

  // ─── Open Modal with Project/Group dropdowns ──
  function openModal(userId = null) {
    // RBAC guard
    if (!RBAC.can('manageUsers')) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }

    _editingId = userId;
    const existing  = userId ? UserDB.findById(userId) : null;
    const currentUser = State.get('currentUser');
    const isSelf    = existing && existing.id === currentUser.id;
    const allRoles  = Object.keys(UserDB.getRoles());
    const projects  = UserDB.getProjects();
    const selProject = existing?.project || '';
    const selGroup   = existing?.group   || '';

    // Build project dropdown
    const projectOptions = ['', ...Object.keys(projects)].map(p =>
      `<option value="${p}" ${selProject===p?'selected':''}>${p || '— بدون مشروع —'}</option>`
    ).join('');

    // Build group dropdown (dynamic via JS)
    const groupsForProject = selProject ? UserDB.getGroupsFor(selProject) : [];
    const groupOptions = _buildGroupOptions(groupsForProject, selGroup);

    const modal = document.createElement('div');
    modal.className = 'um-modal-bg';
    modal.id = 'um-modal';
    modal.innerHTML = `
      <div class="um-modal">
        <h4>${existing ? 'تعديل المستخدم' : 'إضافة مستخدم جديد'}</h4>

        <div class="form-group">
          <label>الاسم الكامل *</label>
          <input class="form-control" id="um-name" value="${existing?.name||''}" placeholder="الاسم الكامل">
        </div>
        <div class="form-group">
          <label>البريد الإلكتروني *</label>
          <input class="form-control" id="um-email" type="email" dir="ltr" value="${existing?.email||''}" placeholder="user@university.edu">
        </div>
        <div class="form-group">
          <label>${existing ? 'كلمة مرور جديدة' : 'كلمة المرور *'} <span style="color:var(--text-muted);font-weight:400;">${existing?'(اتركه فارغاً للإبقاء)':''}</span></label>
          <input class="form-control" id="um-password" type="password" placeholder="كلمة مرور (6 أحرف على الأقل)">
        </div>
        <div class="form-group">
          <label>الدور ${isSelf ? '<span style="color:var(--text-muted);font-size:0.75rem;">(لا يمكن تغيير دورك الخاص)</span>' : '*'}</label>
          <select class="form-control" id="um-role" ${isSelf?'disabled':''}>
            ${allRoles.map(r => `<option value="${r}" ${(existing?.role||'Member')===r?'selected':''}>${UserDB.getRoleInfo(r).icon} ${r}</option>`).join('')}
          </select>
        </div>

        <div class="um-project-group-row">
          <div class="form-group" style="flex:1;">
            <label>المشروع</label>
            <select class="form-control" id="um-project" onchange="UM._onProjectChange(this.value)">
              ${projectOptions}
            </select>
          </div>
          <div class="form-group" style="flex:1;">
            <label>المجموعة</label>
            <select class="form-control" id="um-group">
              ${groupOptions}
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>الحالة</label>
          <select class="form-control" id="um-status">
            <option value="active" ${(!existing||existing.status==='active')?'selected':''}>✓ نشط</option>
            <option value="inactive" ${existing?.status==='inactive'?'selected':''}>✗ معطل</option>
          </select>
        </div>

        <div id="um-modal-error" class="auth-error" style="display:none;"></div>
        <div class="um-modal-footer">
          <button class="btn btn-secondary" onclick="UM.closeModal()">إلغاء</button>
          <button class="btn btn-primary" onclick="UM.saveModal()">${existing ? '💾 حفظ التعديلات' : '➕ إنشاء الحساب'}</button>
        </div>
      </div>`;

    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.body.appendChild(modal);
  }

  // ─── Dynamic group dropdown on project change ─
  function _onProjectChange(projectName) {
    const groupSel = document.getElementById('um-group');
    if (!groupSel) return;
    const groups = UserDB.getGroupsFor(projectName);
    groupSel.innerHTML = _buildGroupOptions(groups, '');
  }

  function _buildGroupOptions(groups, selected) {
    const opts = ['', ...groups].map(g =>
      `<option value="${g}" ${selected===g?'selected':''}>${g || '— بدون مجموعة —'}</option>`
    ).join('');
    return opts;
  }

  function closeModal() {
    document.getElementById('um-modal')?.remove();
    _editingId = null;
  }

  function saveModal() {
    if (!RBAC.can('manageUsers')) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }

    const name     = document.getElementById('um-name')?.value?.trim();
    const email    = document.getElementById('um-email')?.value?.trim();
    const password = document.getElementById('um-password')?.value;
    const role     = document.getElementById('um-role')?.value;
    const project  = document.getElementById('um-project')?.value;
    const group    = document.getElementById('um-group')?.value;
    const status   = document.getElementById('um-status')?.value;
    const errEl    = document.getElementById('um-modal-error');

    if (!name)                       { _showModalError(errEl,'يرجى إدخال الاسم الكامل'); return; }
    if (!email||!email.includes('@')){ _showModalError(errEl,'يرجى إدخال بريد إلكتروني صحيح'); return; }
    if (!_editingId && (!password||password.length<6)) { _showModalError(errEl,'كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }
    if (password && password.length > 0 && password.length < 6) { _showModalError(errEl,'كلمة المرور يجب أن تكون 6 أحرف على الأقل'); return; }

    let result;
    if (_editingId) {
      const updates = { name, email, role, project, group, status };
      if (password && password.length >= 6) updates.password = password;
      result = UserDB.update(_editingId, updates);
    } else {
      result = UserDB.create({ name, email, password, role, project, group, status });
    }

    if (result.error) { _showModalError(errEl, result.error); return; }

    const currentUser = State.get('currentUser');
    if (_editingId && _editingId === currentUser.id) {
      const fresh = UserDB.buildSessionUser(result.user);
      State.login(fresh);
      App._updateTopbarUser(fresh);
    }

    Toast.show(_editingId ? `✓ تم تعديل حساب ${name}` : `✓ تم إنشاء حساب ${name} في ${project||'—'} / ${group||'—'}`, 'success');
    closeModal();
    const content = document.getElementById('settings-content');
    if (content) content.innerHTML = renderUserTable();
  }

  function _showModalError(el, msg) { if(!el) return; el.textContent=msg; el.style.display='block'; }
  function _msg(el, msg, type) {
    if(!el) return;
    el.textContent=msg;
    el.style.color = type==='error' ? 'var(--accent-secondary)' : 'var(--accent-tertiary)';
    el.style.display='block';
    setTimeout(()=>{ el.style.display='none'; }, 3500);
  }

  return { switchSettingsTab, saveProfile, renderUserTable, searchUsers, toggleStatus, openModal, closeModal, saveModal, _onProjectChange, _buildGroupOptions };
})();
window.UM = UM;

// ══════════════════════════════════════════════════════
//  GPMS Phase 1.2 — Training: Training & Development Module
// ══════════════════════════════════════════════════════
const Training = (() => {
  const STORE_KEY = 'gpms_courses_v1';

  const CATEGORIES = ['تقنية المعلومات','مهارات البحث','إدارة المشاريع','مهارات الاتصال','تطوير الذات','أخرى'];
  const TYPES = [
    { id: 'internal',      icon: '🏛️', label: 'داخلي'    },
    { id: 'youtube',       icon: '▶️',  label: 'YouTube'  },
    { id: 'online',        icon: '🌐',  label: 'أونلاين'  },
    { id: 'workshop',      icon: '🛠️', label: 'ورشة عمل' },
    { id: 'collaboration', icon: '🤝',  label: 'تعاوني'   },
  ];

  const TYPE_CFG = {
    internal:      { showResources: false, showFiles: true,  showCollab: false },
    youtube:       { showResources: true,  showFiles: false, showCollab: false, resourcesRequired: true },
    online:        { showResources: true,  showFiles: false, showCollab: false, resourcesRequired: true },
    workshop:      { showResources: false, showFiles: true,  showCollab: false },
    collaboration: { showResources: false, showFiles: false, showCollab: true  },
  };

  const ACCEPTED_FILES  = '.pdf,.ppt,.pptx,.doc,.docx,.zip';
  const ACCEPTED_COLLAB = '.pdf,.docx,.zip';

  function _load()     { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { return []; } }
  function _save(d)    { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
  function getCourses(){ return _load(); }

  function saveCourse(data) {
    const list = _load();
    if (data.id) {
      const i = list.findIndex(c => c.id === data.id);
      if (i > -1) list[i] = { ...list[i], ...data };
    } else {
      list.push({ ...data, id: 'c_' + Date.now(), createdAt: new Date().toLocaleDateString('ar-EG'), status: 'active' });
    }
    _save(list);
  }

  function deleteCourse(id) { _save(_load().filter(c => c.id !== id)); }

  function renderPage() {
    const courses = getCourses();
    const done   = courses.filter(c => c.status === 'done').length;
    const active = courses.filter(c => c.status === 'active').length;
    const total  = courses.length;
    const rate   = total > 0 ? Math.round((done / total) * 100) : 0;

    return `
    <div class="page-header">
      <div class="page-header-left">
        <h2>📚 التدريب والتطوير</h2>
        <p>إدارة الدورات والمسارات التدريبية</p>
      </div>
      ${RBAC.canManageTraining() ? `<button class="btn btn-primary" onclick="Training.showAddForm()">+ إضافة دورة</button>` : ''}
    </div>
    <div class="training-stats-row">
      ${_sc('📋','إجمالي الدورات',  total,      '#6C63FF','rgba(108,99,255,0.12)')}
      ${_sc('✅','الدورات المكتملة', done,       '#43E97B','rgba(67,233,123,0.12)')}
      ${_sc('⏳','الدورات النشطة',   active,     '#F7971E','rgba(247,151,30,0.12)')}
      ${_sc('📈','معدل التطوير',     rate + '%', '#38A1F3','rgba(56,161,243,0.12)')}
    </div>
    <div id="training-course-list">${_renderList(courses)}</div>`;
  }

  function _sc(icon, label, value, color, bg) {
    return `<div class="stat-card" style="--stat-color:${color};--stat-bg:${bg};">
      <div class="stat-header"><div class="stat-icon">${icon}</div></div>
      <div class="stat-value">${value}</div>
      <div class="stat-label">${label}</div>
    </div>`;
  }

  function _renderList(courses) {
    if (!courses.length) return `
      <div class="placeholder-page" style="min-height:260px;">
        <div class="placeholder-icon">📚</div>
        <h3>لا توجد دورات بعد</h3>
        <p>أضف أول دورة تدريبية للبدء</p>
        ${RBAC.canManageTraining() ? `<button class="btn btn-primary" onclick="Training.showAddForm()">+ إضافة دورة</button>` : ''}
      </div>`;
    return `<div class="training-course-grid">${courses.map(c => _card(c)).join('')}</div>`;
  }

  function _card(c) {
    const t   = TYPES.find(x => x.id === c.type) || TYPES[0];
    const cfg = TYPE_CFG[c.type] || TYPE_CFG.internal;
    const sm  = { active:{l:'نشط',cls:'badge-primary'}, done:{l:'مكتمل',cls:'badge-success'}, paused:{l:'متوقف',cls:'badge-warning'} };
    const s   = sm[c.status] || sm.active;
    const fileCount      = (c.files || []).length;
    const resourceCount  = (c.resources || []).length;
    const hasCollab      = c.type === 'collaboration' && c.collab?.partnerTeam;

    // Build resource links for card (first 2 shown inline, rest collapsed)
    const resourceLinks = cfg.showResources && resourceCount > 0
      ? `<div class="tr-resource-list">
          ${(c.resources || []).slice(0, 2).map((r,i) => `
            <a href="${r.url}" target="_blank" class="tr-resource-link" rel="noopener">
              <span class="tr-resource-num">${i+1}</span>
              <span class="tr-resource-title">${r.title || r.url}</span>
              <span class="tr-resource-arrow">↗</span>
            </a>`).join('')}
          ${resourceCount > 2 ? `<div class="tr-resource-more">+ ${resourceCount - 2} مصادر أخرى</div>` : ''}
        </div>`
      : '';

    return `
    <div class="training-card">
      <div class="training-card-header">
        <span class="training-type-badge">${t.icon} ${t.label}</span>
        <span class="badge ${s.cls}">${s.l}</span>
      </div>
      <h4 class="training-card-title">${c.name}</h4>
      <p class="training-card-desc">${c.description || 'لا يوجد وصف'}</p>
      <div class="training-card-meta">
        <span class="badge badge-info">${c.category || 'عام'}</span>
        ${c.stages ? `<span class="tr-meta-chip">📊 ${c.stages} مراحل</span>` : ''}
        ${fileCount > 0      ? `<span class="tr-meta-chip">📎 ${fileCount} ملف</span>` : ''}
        ${resourceCount > 0  ? `<span class="tr-meta-chip tr-res-chip">🔗 ${resourceCount} ${resourceCount === 1 ? 'مصدر' : 'مصادر'}</span>` : ''}
        ${hasCollab ? `<span class="tr-meta-chip tr-collab-chip">🤝 ${c.collab.partnerTeam}</span>` : ''}
        <span style="font-size:.7rem;color:var(--text-muted);margin-right:auto;">${c.createdAt||''}</span>
      </div>
      ${resourceLinks}
      ${hasCollab ? `<div class="tr-collab-summary"><span>🏛️ ${c.collab.university||''}</span><span>👤 ${c.collab.teamLeaderName||''}</span></div>` : ''}
      <div class="training-card-actions">
        <button class="btn btn-secondary text-sm" onclick="Training.showAddForm('${c.id}')" style="flex:1;">✏️ تعديل</button>
        <button class="btn btn-secondary text-sm" onclick="Training.toggleStatus('${c.id}')" style="flex:1;">
          ${c.status==='done' ? '↩️ إعادة تفعيل' : '✓ إتمام'}
        </button>
        <button class="btn-icon" onclick="Training.deleteCourseUI('${c.id}')" style="color:var(--accent-secondary);">🗑</button>
      </div>
    </div>`;
  }

  function showAddForm(editId) {
    // RBAC: only Project Leader, APL, Group Leader can manage training
    if (!RBAC.canManageTraining()) {
      Toast.show('⛔ ليس لديك صلاحية لإضافة أو تعديل الدورات', 'error');
      return;
    }
    const ex = editId ? getCourses().find(c => c.id === editId) : null;
    const initType = ex?.type || 'internal';

    modal.className = 'um-modal-bg';

    <div class="um-modal" style="max-width:520px;">
      <h4>${ex ? '✏️ تعديل الدورة' : '➕ إضافة دورة تدريبية'}</h4>
      <div class="form-group">
        <label>اسم الدورة *</label>
        <input class="form-control" id="tr-name" placeholder="مثال: مقدمة في تحليل البيانات" value="${ex?.name||''}">
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea class="form-control" id="tr-desc" rows="2" placeholder="وصف مختصر" style="resize:vertical;">${ex?.description||''}</textarea>
      </div>
      <div class="form-group">
        <label>التصنيف</label>
        <select class="form-control" id="tr-category">
          ${CATEGORIES.map(cat => `<option ${ex?.category===cat?'selected':''}>${cat}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label>عدد المراحل <span style="color:var(--text-muted);font-weight:400;">(اختياري)</span></label>

      <div class="form-group">
        <label>نوع الدورة</label>
        <div class="training-type-grid" id="tr-type-grid">
          ${TYPES.map(t => `
          <div class="training-type-opt ${initType===t.id?'selected':''}"
               data-type="${t.id}" onclick="Training._selectType(this,'${editId||''}')">

      <div class="um-modal-footer">
        <button class="btn btn-secondary" onclick="Training.closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="Training.saveForm('${editId||''}')">

  }

  function _dynamicFields(type, ex) {

    // ── Multiple resources (YouTube / Online) ──

        <input type="file" id="tr-files" accept="${ACCEPTED_FILES}" multiple style="display:none;"
          onchange="Training._previewFiles(this,'tr-file-preview')">
        <div id="tr-file-preview" class="tr-file-preview">
          ${existing.map(f => `<div class="tr-file-chip">📄 ${f.name} <span style="color:var(--text-muted);font-size:.7rem;">(محفوظ)</span></div>`).join('')}
        </div>

    if (cfg.showCollab) {

      html += `

            <label>الجامعة</label>

        <div class="tr-section-label" style="margin-top:.75rem;">👤 قائد الفريق</div>
        <div class="form-group">
          <label>الاسم *</label>
          <input class="form-control" id="col-leaderName" placeholder="اسم قائد الفريق" value="${col.teamLeaderName||''}">
        </div>
        <div class="tr-two-col">
          <div class="form-group">
            <label>البريد الإلكتروني</label>
            <input class="form-control" id="col-leaderEmail" type="email" dir="ltr" placeholder="email@uni.edu" value="${col.teamLeaderEmail||''}">

          <div class="form-group">
            <label>رقم الهاتف</label>
            <input class="form-control" id="col-leaderPhone" type="tel" dir="ltr" placeholder="+966..." value="${col.teamLeaderPhone||''}">
          </div>
        </div>
        <div class="form-group">
          <label>ملاحظات التعاون</label>
          <textarea class="form-control" id="col-notes" rows="2" style="resize:vertical;">${col.notes||''}</textarea>
        </div>
        <div class="form-group">
          <label>وثائق التعاون <span style="color:var(--text-muted);font-weight:400;font-size:.75rem;">(PDF, DOCX, ZIP — اختياري)</span></label>
          <div class="tr-upload-zone" onclick="document.getElementById('tr-collab-docs').click()">
            <span style="font-size:1.5rem;">📎</span>
            <span style="font-size:.82rem;font-weight:600;color:var(--accent-primary);">رفع الوثائق</span>
          </div>
          <input type="file" id="tr-collab-docs" accept="${ACCEPTED_COLLAB}" multiple style="display:none;"
            onchange="Training._previewFiles(this,'tr-collab-preview')">
          <div id="tr-collab-preview" class="tr-file-preview">
            ${(col.docs||[]).map(f => `<div class="tr-file-chip">📄 ${f.name} <span style="color:var(--text-muted);font-size:.7rem;">(محفوظ)</span></div>`).join('')}
          </div>
        </div>
      </div>`;
    }
    return html;
  }

  // ─── Resource row builder ─────────────────────
  function _resourceRow(idx, title, url) {
    return `
    <div class="tr-resource-row" id="tr-res-row-${idx}" data-idx="${idx}">
      <div class="tr-resource-row-header">
        <span class="tr-section-label" style="margin:0;font-size:.75rem;padding:.2rem .6rem;">مصدر ${idx + 1}</span>
        ${idx > 0 ? `<button type="button" class="btn-icon" style="color:var(--accent-secondary);font-size:.85rem;"
          onclick="Training._removeResourceRow(${idx})">✕</button>` : ''}
      </div>
      <div class="form-group" style="margin-bottom:.5rem;">
        <input class="form-control" id="tr-res-title-${idx}"
          placeholder="عنوان المصدر (مثال: مقدمة في البحث العلمي)"
          value="${title||''}">
      </div>
      <div class="form-group" style="margin-bottom:.75rem;">
        <input class="form-control" id="tr-res-url-${idx}" type="url"
          placeholder="https://youtube.com/watch?v=..."
          dir="ltr" value="${url||''}">
      </div>
    </div>`;
  }

  function _addResourceRow() {
    const list = document.getElementById('tr-resource-list');
    if (!list) return;
    const idx = list.querySelectorAll('.tr-resource-row').length;
    const div = document.createElement('div');
    div.innerHTML = _resourceRow(idx, '', '');
    list.appendChild(div.firstElementChild);
  }

  function _removeResourceRow(idx) {
    const row = document.getElementById('tr-res-row-' + idx);
    if (row) row.remove();
    // Re-number remaining rows
    const list = document.getElementById('tr-resource-list');
    if (!list) return;
    list.querySelectorAll('.tr-resource-row').forEach((el, i) => {
      el.id = 'tr-res-row-' + i;
      el.dataset.idx = i;
      const label = el.querySelector('.tr-section-label');
      if (label) label.textContent = 'مصدر ' + (i + 1);
      const titleIn = el.querySelector('[id^="tr-res-title-"]');
      const urlIn   = el.querySelector('[id^="tr-res-url-"]');
      if (titleIn) titleIn.id = 'tr-res-title-' + i;
      if (urlIn)   urlIn.id   = 'tr-res-url-'   + i;
      // Update remove button onclick
      const btn = el.querySelector('button[onclick*="_removeResourceRow"]');
      if (btn) btn.setAttribute('onclick', `Training._removeResourceRow(${i})`);
    });
  }

  function _selectType(el, editId) {
    document.querySelectorAll('.training-type-opt').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    const ex = editId ? getCourses().find(c => c.id === editId) : null;
    const dyn = document.getElementById('tr-dynamic-fields');
    if (dyn) dyn.innerHTML = _dynamicFields(el.dataset.type, ex);
  }

  function _previewFiles(input, previewId) {
    const preview = document.getElementById(previewId);
    if (!preview) return;
    preview.innerHTML = Array.from(input.files).map(f =>
      `<div class="tr-file-chip">📄 ${f.name} <span style="color:var(--text-muted);font-size:.7rem;">(${_fmt(f.size)})</span></div>`
    ).join('');
  }

  function _fmt(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  function saveForm(editId) {
    const name     = document.getElementById('tr-name')?.value?.trim();
    const desc     = document.getElementById('tr-desc')?.value?.trim();
    const category = document.getElementById('tr-category')?.value;
    const stages   = document.getElementById('tr-stages')?.value;
    const typeEl   = document.querySelector('.training-type-opt.selected');
    const type     = typeEl?.dataset?.type || 'internal';
    const cfg      = TYPE_CFG[type];
    const errEl    = document.getElementById('tr-error');
    const _err = msg => { if(errEl){errEl.textContent=msg;errEl.style.display='block';} };

    if (!name) { _err('يرجى إدخال اسم الدورة'); return; }

    let resources = [];
    let files = editId ? (getCourses().find(c=>c.id===editId)?.files || []) : [];
    let collab = null;

    if (cfg.showResources) {
      const rows = document.querySelectorAll('#tr-resource-list .tr-resource-row');
      rows.forEach((row, i) => {
        const title = document.getElementById('tr-res-title-' + i)?.value?.trim() || '';
        const url   = document.getElementById('tr-res-url-'   + i)?.value?.trim() || '';
        if (url) resources.push({ title: title || url, url, addedAt: new Date().toISOString() });
      });
      if (cfg.resourcesRequired && resources.length === 0) {
        _err('يرجى إضافة مصدر تعلم واحد على الأقل مع رابطه'); return;
      }
    }

    if (cfg.showFiles) {
      const fi = document.getElementById('tr-files');
      if (fi?.files?.length) files = Array.from(fi.files).map(f => ({ name: f.name, size: f.size, type: f.type }));
    }

    if (cfg.showCollab) {
      const pt = document.getElementById('col-partnerTeam')?.value?.trim();
      if (!pt) { _err('يرجى إدخال اسم الفريق الشريك'); return; }
      const di = document.getElementById('tr-collab-docs');
      const docs = di?.files?.length
        ? Array.from(di.files).map(f => ({ name: f.name, size: f.size }))
        : (editId ? (getCourses().find(c=>c.id===editId)?.collab?.docs || []) : []);
      collab = {
        partnerTeam: pt,
        dept:            document.getElementById('col-dept')?.value?.trim()||'',
        university:      document.getElementById('col-uni')?.value?.trim()||'',
        supervisorName:  document.getElementById('col-supervisor')?.value?.trim()||'',
        teamLeaderName:  document.getElementById('col-leaderName')?.value?.trim()||'',
        teamLeaderEmail: document.getElementById('col-leaderEmail')?.value?.trim()||'',
        teamLeaderPhone: document.getElementById('col-leaderPhone')?.value?.trim()||'',
        notes:           document.getElementById('col-notes')?.value?.trim()||'',
        docs,
      };
    }

    saveCourse({ id: editId||null, name, description:desc, category, type, resources, files, collab, stages:stages?parseInt(stages):null });
    closeModal();
    Toast.show(editId ? '✓ تم تعديل الدورة' : '✓ تمت إضافة الدورة', 'success');
    const content = document.getElementById('page-content');
    if (content) content.innerHTML = renderPage();
  }

  function closeModal() { document.getElementById('training-modal')?.remove(); }

  function toggleStatus(id) {
    const list = getCourses();
    const c = list.find(x => x.id === id);
    if (!c) return;
    c.status = c.status === 'done' ? 'active' : 'done';
    _save(list);
    Toast.show(c.status === 'done' ? '✓ تم تحديد الدورة كمكتملة' : 'تم إعادة تفعيل الدورة', 'success');
    const content = document.getElementById('page-content');
    if (content) content.innerHTML = renderPage();
  }

  function deleteCourseUI(id) {
    if (!RBAC.canManageTraining()) {
      Toast.show('⛔ ليس لديك صلاحية لحذف الدورات', 'error');
      return;
    }
    if (!confirm('هل أنت متأكد من حذف هذه الدورة؟')) return;
    deleteCourse(id);
    Toast.show('تم حذف الدورة', 'info');
    const content = document.getElementById('page-content');
    if (content) content.innerHTML = renderPage();
  }

  return { renderPage, showAddForm, closeModal, saveForm, toggleStatus, deleteCourseUI, _selectType, _previewFiles, _addResourceRow, _removeResourceRow, getCourses };
})();
window.Training = Training;

const Router = (() => {
  // ─── Route Definitions ───────────────────────
  const routes = {
    'dashboard':       { title: 'لوحة التحكم',         icon: '🏠', breadcrumb: 'الرئيسية' },
    'projects':        { title: 'المشاريع',             icon: '📁', breadcrumb: 'الرئيسية / المشاريع' },
    'teams':           { title: 'الفرق والأعضاء',      icon: '👥', breadcrumb: 'الرئيسية / الفرق' },
    'tasks':           { title: 'المهام',               icon: '✅', breadcrumb: 'الرئيسية / المهام' },
    'meetings':        { title: 'الاجتماعات',           icon: '📅', breadcrumb: 'الرئيسية / الاجتماعات' },
    'research':        { title: 'مركز البحث',           icon: '🔬', breadcrumb: 'الرئيسية / مركز البحث' },
    'chat':            { title: 'المحادثات',            icon: '💬', breadcrumb: 'الرئيسية / المحادثات' },
    'training':        { title: 'التدريب والتطوير',     icon: '📚', breadcrumb: 'الرئيسية / التدريب والتطوير' },
    'reports':         { title: 'التقارير',             icon: '📊', breadcrumb: 'الرئيسية / التقارير' },
    'settings':        { title: 'الإعدادات',            icon: '⚙️', breadcrumb: 'الرئيسية / الإعدادات' },
  };

  let _currentRoute = 'dashboard';
  let _listeners = [];

  // ─── Navigate ────────────────────────────────
  function navigate(route) {
    if (!routes[route]) {
      console.warn(`[Router] Unknown route: ${route}`);
      route = 'dashboard';
    }

    // ── RBAC Route Guard ──
    const user = State.get('currentUser');
    if (user && !RBAC.canAccessRoute(route)) {
      Toast.show(`⛔ ليس لديك صلاحية للوصول إلى "${routes[route]?.title || route}"`, 'error');
      return; // block navigation entirely
    }

    _currentRoute = route;
    window.location.hash = route;
    State.set('currentRoute', route);

    _listeners.forEach(cb => cb(route, routes[route]));
    _updateUI(route);
  }

  // ─── Update UI ───────────────────────────────
  function _updateUI(route) {
    const info = routes[route];

    // Update topbar title
    const titleEl = document.querySelector('.topbar-page-title h3');
    const breadEl = document.querySelector('.topbar-page-title .breadcrumb');
    if (titleEl) titleEl.textContent = info.title;
    if (breadEl) breadEl.textContent = info.breadcrumb;

    // Update sidebar active state
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });

    // Render page
    _renderPage(route);

    // Close mobile sidebar
    State.set('mobileSidebarOpen', false);
    document.getElementById('sidebar')?.classList.remove('mobile-open');
    document.getElementById('overlay')?.classList.remove('active');
  }

  // ─── Render page content ─────────────────────
  function _renderPage(route) {
    const content = document.getElementById('page-content');
    if (!content) return;

    content.innerHTML = '';
    content.className = 'page-view';

    // Force reflow for animation
    void content.offsetWidth;

    switch (route) {
      case 'dashboard': content.innerHTML = Components.renderDashboard(); break;
      case 'training':  content.innerHTML = Training.renderPage();        break;
      case 'settings':  content.innerHTML = Components.renderSettings();  break;
      default:          content.innerHTML = Components.renderPlaceholder(route, routes[route]); break;
    }

    // Post-render hooks
    _afterRender(route);
  }

  function _afterRender(route) {
    if (route === 'dashboard') {
      // Animate progress bars
      setTimeout(() => {
        document.querySelectorAll('.progress-fill[data-value]').forEach(bar => {
          bar.style.width = bar.dataset.value + '%';
        });
      }, 100);
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Parse initial hash
    const hash = window.location.hash.replace('#', '');
    const initial = routes[hash] ? hash : 'dashboard';

    // Handle hash changes
    window.addEventListener('hashchange', () => {
      const h = window.location.hash.replace('#', '');
      if (routes[h] && h !== _currentRoute) navigate(h);
    });

    navigate(initial);
  }

  function on(cb) { _listeners.push(cb); }
  function current() { return _currentRoute; }
  function getInfo(route) { return routes[route || _currentRoute]; }
  function getAllRoutes() { return routes; }

  return { navigate, init, on, current, getInfo, getAllRoutes };
})();

// ─── Toast Notifications ──────────────────────
const Toast = (() => {
  function show(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const icons = { success: '✅', warning: '⚠️', error: '❌', info: 'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${message}</span>`;

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  return { show };
})();

// ─── App Controller ────────────────────────────
const App = (() => {

  // ─── Show Login ──────────────────────────────
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    Auth.renderLogin();
  }

  // ─── Show Main App ────────────────────────────
  function showMainApp(user) {
    // Hide login
    const loginScreen = document.getElementById('login-screen');
    loginScreen.style.opacity = '0';
    loginScreen.style.transition = 'opacity 0.4s ease';

    setTimeout(() => {
      loginScreen.style.display = 'none';
      loginScreen.style.opacity = '1';
    }, 400);

    // Show main app
    const mainApp = document.getElementById('main-app');
    mainApp.style.display = 'flex';
    mainApp.style.opacity = '0';

    // Render sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = Components.renderSidebar(user);

    // Restore sidebar state (desktop only)
    if (State.get('sidebarCollapsed') && window.innerWidth > 768) {
      sidebar.classList.add('collapsed');
      document.body.classList.add('sidebar-collapsed');
    }

    // Topbar user info
    _updateTopbarUser(user);

    setTimeout(() => {
      mainApp.style.transition = 'opacity 0.4s ease';
      mainApp.style.opacity = '1';
      Router.init();
    }, 50);

    Toast.show(`مرحباً ${user.name}! 👋`, 'success');
  }

  // ─── Update Topbar User ───────────────────────
  function _updateTopbarUser(user) {
    const avatarEl = document.querySelector('.topbar-avatar .avatar');
    if (avatarEl) {
      avatarEl.textContent = user.avatar;
      avatarEl.style.background = `linear-gradient(135deg, ${user.roleColor}, #8B7CFF)`;
    }
  }

  // ─── Toggle Sidebar ───────────────────────────
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      // Mobile: slide in/out
      const isOpen = sidebar.classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active', isOpen);
      State.set('mobileSidebarOpen', isOpen);
    } else {
      // Desktop: collapse/expand
      sidebar.classList.toggle('collapsed');
      const collapsed = sidebar.classList.contains('collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      State.set('sidebarCollapsed', collapsed);
      localStorage.setItem('gpms_sidebar', collapsed ? '1' : '0');
    }
  }

  // ─── Sync Theme Toggle ────────────────────────
  function syncThemeToggle() {
    const thumb = document.querySelector('.theme-toggle-thumb');
    const theme = State.get('theme');
    if (thumb) thumb.textContent = theme === 'dark' ? '🌙' : '☀️';

    // Also sync settings page role cards if visible
    document.querySelectorAll('.role-card[onclick*="setTheme"]').forEach(el => {
      const isLight = el.getAttribute('onclick')?.includes("'light'");
      el.classList.toggle('selected', isLight ? theme === 'light' : theme === 'dark');
    });
  }

  // ─── Topbar search handler ─────────────────────
  function handleSearch(e) {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) Toast.show(`🔍 البحث عن: "${val}" — قريباً`, 'info');
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Init state (theme etc.)
    State.init();

    // Theme toggle listener
    State.on('themeChange', () => syncThemeToggle());

    // Overlay click closes mobile sidebar
    document.getElementById('overlay')?.addEventListener('click', () => {
      document.getElementById('sidebar')?.classList.remove('mobile-open');
      document.getElementById('overlay')?.classList.remove('active');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Ctrl/Cmd + K = search focus
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.querySelector('.search-bar input')?.focus();
      }
      // Escape = close mobile sidebar
      if (e.key === 'Escape') {
        document.getElementById('sidebar')?.classList.remove('mobile-open');
        document.getElementById('overlay')?.classList.remove('active');
      }
    });

    // Search input
    document.querySelector('.search-bar input')?.addEventListener('keydown', handleSearch);

    // Check for existing session
    const savedUser = State.restoreSession();
    if (savedUser) {
      showMainApp(savedUser);
    } else {
      showLogin();
    }

    // Initial theme sync
    syncThemeToggle();

    console.log('%cGPMS v1.1 — Phase 1.1 Auth Upgrade', 'color:#6C63FF;font-weight:bold;font-size:14px;');
    console.log('%c✔ UserDB  ✔ Auth  ✔ UM  ✔ Router  ✔ Theme', 'color:#43E97B;font-size:12px;');
  }

  return { init, showLogin, showMainApp, toggleSidebar, syncThemeToggle, handleSearch, _updateTopbarUser };
})();
