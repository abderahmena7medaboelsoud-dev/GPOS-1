<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPMS — نظام إدارة مشاريع التخرج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
/* ============================================
   GPMS - Graduation Project Management System
   style.css - Core styles, variables, themes
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* ─── CSS Variables ─────────────────────────── */
:root {
  /* Brand Colors */
  --accent-primary: #6C63FF;
  --accent-secondary: #FF6584;
  --accent-tertiary: #43E97B;
  --accent-warning: #F7971E;
  --accent-info: #38A1F3;

  /* Light Theme */
  --bg-base: #F0F2F8;
  --bg-surface: #FFFFFF;
  --bg-elevated: #FFFFFF;
  --bg-overlay: rgba(255,255,255,0.85);
  --bg-sidebar: #1A1D2E;
  --bg-sidebar-hover: rgba(108,99,255,0.15);
  --bg-sidebar-active: rgba(108,99,255,0.25);

  --text-primary: #1A1D2E;
  --text-secondary: #5A5E7A;
  --text-muted: #9299B8;
  --text-sidebar: #C8CCEA;
  --text-sidebar-active: #FFFFFF;
  --text-on-accent: #FFFFFF;

  --border-subtle: rgba(0,0,0,0.07);
  --border-medium: rgba(0,0,0,0.12);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --shadow-accent: 0 8px 30px rgba(108,99,255,0.25);

  /* Sidebar */
  --sidebar-width: 260px;
  --sidebar-collapsed: 72px;

  /* Topbar */
  --topbar-height: 64px;

  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* Font */
  --font-primary: 'Cairo', sans-serif;
  --font-display: 'Tajawal', sans-serif;
}

/* Dark Theme */
[data-theme="dark"] {
  --bg-base: #0F1117;
  --bg-surface: #1A1D2E;
  --bg-elevated: #222539;
  --bg-overlay: rgba(26, 29, 46, 0.92);
  --bg-sidebar: #12141F;
  --bg-sidebar-hover: rgba(108,99,255,0.12);
  --bg-sidebar-active: rgba(108,99,255,0.22);

  --text-primary: #E8EAF6;
  --text-secondary: #9299B8;
  --text-muted: #5A5E7A;
  --text-sidebar: #8B91B5;
  --text-sidebar-active: #FFFFFF;

  --border-subtle: rgba(255,255,255,0.05);
  --border-medium: rgba(255,255,255,0.1);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

/* ─── Reset & Base ───────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  direction: rtl;
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-primary);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition-normal), color var(--transition-normal);
}

/* ─── Typography ─────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.3;
  color: var(--text-primary);
}

h1 { font-size: clamp(1.6rem, 3vw, 2.2rem); }
h2 { font-size: clamp(1.3rem, 2.5vw, 1.7rem); }
h3 { font-size: clamp(1.1rem, 2vw, 1.3rem); }
h4 { font-size: 1.05rem; }

p { line-height: 1.7; color: var(--text-secondary); }

a { text-decoration: none; color: var(--accent-primary); transition: opacity var(--transition-fast); }
a:hover { opacity: 0.8; }

ul { list-style: none; }

/* ─── Scrollbar ──────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Utility Classes ────────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-1 { gap: 0.25rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.gap-6 { gap: 1.5rem; }
.w-full { width: 100%; }
.h-full { height: 100%; }
.relative { position: relative; }
.absolute { position: absolute; }
.hidden { display: none !important; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.text-sm { font-size: 0.8rem; }
.text-xs { font-size: 0.72rem; }
.text-lg { font-size: 1.1rem; }
.text-xl { font-size: 1.25rem; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.font-bold { font-weight: 700; }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-accent { color: var(--accent-primary); }
.text-success { color: var(--accent-tertiary); }
.text-warning { color: var(--accent-warning); }
.text-danger { color: var(--accent-secondary); }

/* ─── Buttons ────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.55rem 1.25rem;
  border-radius: var(--radius-sm);
  font-family: var(--font-primary);
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition-fast);
  white-space: nowrap;
  user-select: none;
}

.btn-primary {
  background: var(--accent-primary);
  color: white;
  box-shadow: var(--shadow-accent);
}
.btn-primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
  box-shadow: 0 12px 35px rgba(108,99,255,0.35);
}

.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border-medium);
}
.btn-secondary:hover {
  background: var(--bg-base);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 0.5rem;
}
.btn-ghost:hover {
  background: var(--border-subtle);
  color: var(--text-primary);
}

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.btn-icon:hover {
  background: var(--bg-base);
  color: var(--text-primary);
  border-color: var(--border-medium);
}

/* ─── Badges ─────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: var(--radius-full);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.badge-primary { background: rgba(108,99,255,0.15); color: var(--accent-primary); }
.badge-success { background: rgba(67,233,123,0.15); color: #2BC56A; }
.badge-warning { background: rgba(247,151,30,0.15); color: var(--accent-warning); }
.badge-danger  { background: rgba(255,101,132,0.15); color: var(--accent-secondary); }
.badge-info    { background: rgba(56,161,243,0.15); color: var(--accent-info); }
.badge-count {
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: var(--radius-full);
  background: var(--accent-secondary);
  color: white;
  font-size: 0.65rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── Cards ──────────────────────────────────── */
.card {
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-sm);
  padding: 1.5rem;
  transition: all var(--transition-normal);
}
.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* ─── Divider ────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 1rem 0;
}

/* ─── Avatar ─────────────────────────────────── */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: white;
  flex-shrink: 0;
}
.avatar-lg { width: 48px; height: 48px; font-size: 1rem; }
.avatar-sm { width: 28px; height: 28px; font-size: 0.7rem; }

/* ─── Progress Bar ───────────────────────────── */
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--border-subtle);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: var(--radius-full);
  background: linear-gradient(90deg, var(--accent-primary), #8B7CFF);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-fill.success { background: linear-gradient(90deg, #43E97B, #38F9D7); }
.progress-fill.warning { background: linear-gradient(90deg, #F7971E, #FFD200); }
.progress-fill.danger  { background: linear-gradient(90deg, #FF6584, #FF8C69); }

/* ─── Toast Notifications ────────────────────── */
#toast-container {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-md);
  padding: 0.75rem 1.25rem;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-primary);
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 250px;
}
.toast.success { border-right: 3px solid var(--accent-tertiary); }
.toast.warning { border-right: 3px solid var(--accent-warning); }
.toast.error   { border-right: 3px solid var(--accent-secondary); }
.toast.info    { border-right: 3px solid var(--accent-info); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-30px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-30px); }
}

/* ─── Overlay / Modal backdrop ───────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 400; /* BELOW sidebar (500) but above content */
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-normal);
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* ─── Page transition ────────────────────────── */
.page-view {
  animation: pageIn 0.3s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Skeleton Loaders ───────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--border-subtle) 25%, var(--border-medium) 50%, var(--border-subtle) 75%);
  background-size: 200% 100%;
  border-radius: var(--radius-sm);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── Tooltip ────────────────────────────────── */
[data-tooltip] { position: relative; }
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  right: 50%;
  transform: translateX(50%);
  background: var(--text-primary);
  color: var(--bg-surface);
  padding: 0.3rem 0.7rem;
  border-radius: var(--radius-sm);
  font-size: 0.72rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-fast);
  z-index: 100;
}
[data-tooltip]:hover::after { opacity: 1; }
/* ============================================
   GPMS - layout.css
   Shell layout, sidebar, topbar, responsive
   ============================================ */

/* ─── App Shell ──────────────────────────────── */
#app {
  display: flex;
  min-height: 100vh;
}

/* ─── LOGIN SCREEN ───────────────────────────── */
#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-base);
  z-index: 1000;
  overflow: hidden;
  transition: opacity var(--transition-slow);
}

/* Background decoration */
#login-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255,101,132,0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(67,233,123,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  padding: 3rem 2.5rem;
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
  animation: loginCardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes loginCardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2rem;
  justify-content: center;
}

.login-logo-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-primary), #8B7CFF);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(108,99,255,0.35);
  font-size: 1.5rem;
  color: white;
}

.login-logo h1 {
  font-size: 1.4rem;
  color: var(--text-primary);
  line-height: 1.1;
}
.login-logo span {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
}

.login-title {
  text-align: center;
  margin-bottom: 2rem;
}
.login-title h2 { font-size: 1.5rem; margin-bottom: 0.4rem; }
.login-title p  { font-size: 0.875rem; color: var(--text-secondary); }

.form-group {
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
}
.form-control {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--bg-base);
  border: 1.5px solid var(--border-medium);
  border-radius: var(--radius-sm);
  font-family: var(--font-primary);
  font-size: 0.9rem;
  color: var(--text-primary);
  transition: all var(--transition-fast);
  outline: none;
  direction: rtl;
}
.form-control:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  background: var(--bg-surface);
}
.form-control::placeholder { color: var(--text-muted); }

.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}

.role-card {
  padding: 0.75rem;
  border: 1.5px solid var(--border-medium);
  border-radius: var(--radius-md);
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
  background: var(--bg-base);
}
.role-card:hover {
  border-color: var(--accent-primary);
  background: rgba(108,99,255,0.05);
}
.role-card.selected {
  border-color: var(--accent-primary);
  background: rgba(108,99,255,0.1);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.role-card .role-icon {
  font-size: 1.5rem;
  margin-bottom: 0.3rem;
  display: block;
}
.role-card .role-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-primary);
}
.role-card .role-desc {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 0.1rem;
}

/* ─── MAIN APP SHELL ─────────────────────────── */
#main-app {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* ─── Sidebar ────────────────────────────────── */
#sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 200;
  transition: width var(--transition-slow), transform var(--transition-slow);
  overflow: hidden;
  border-left: 1px solid rgba(255,255,255,0.04);
}

#sidebar.collapsed {
  width: var(--sidebar-collapsed);
}

/* Sidebar Brand */
.sidebar-brand {
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 0.875rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}

.sidebar-logo {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-primary), #8B7CFF);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(108,99,255,0.4);
  font-size: 1rem;
  color: white;
}

.sidebar-brand-text { overflow: hidden; }
.sidebar-brand-text h2 {
  font-size: 0.95rem;
  font-weight: 800;
  color: white;
  white-space: nowrap;
  font-family: var(--font-display);
}
.sidebar-brand-text span {
  font-size: 0.65rem;
  color: var(--text-sidebar);
  display: block;
  white-space: nowrap;
}

/* Sidebar User */
.sidebar-user {
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-user-info { overflow: hidden; }
.sidebar-user-info .user-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-info .user-role {
  font-size: 0.68rem;
  color: var(--text-sidebar);
  white-space: nowrap;
}

/* Sidebar Nav */
.sidebar-nav {
  flex: 1;
  padding: 0.75rem 0;
  overflow-y: auto;
  overflow-x: hidden;
}

.nav-section-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  padding: 0.75rem 1.4rem 0.4rem;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--transition-normal);
}
#sidebar.collapsed .nav-section-label { opacity: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.7rem 1.25rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  border-radius: 0;
  overflow: hidden;
  white-space: nowrap;
  color: var(--text-sidebar);
  margin: 0.1rem 0.75rem;
  border-radius: var(--radius-sm);
}

.nav-item:hover {
  background: var(--bg-sidebar-hover);
  color: #D0D4FF;
}

.nav-item.active {
  background: var(--bg-sidebar-active);
  color: white;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: var(--accent-primary);
  border-radius: var(--radius-full) 0 0 var(--radius-full);
}

.nav-item-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}
.nav-item-text {
  font-size: 0.875rem;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
}
.nav-item-badge {
  flex-shrink: 0;
}

/* Sidebar Footer */
.sidebar-footer {
  padding: 1rem 0.75rem;
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}

.sidebar-toggle {
  width: 100%;
  padding: 0.6rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.875rem;
  background: transparent;
  border: none;
  cursor: pointer;
  color: var(--text-sidebar);
  font-family: var(--font-primary);
  font-size: 0.875rem;
  border-radius: var(--radius-sm);
  transition: all var(--transition-fast);
  white-space: nowrap;
  overflow: hidden;
}
.sidebar-toggle:hover {
  background: var(--bg-sidebar-hover);
  color: white;
}
.sidebar-toggle-icon {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-size: 1rem;
  transition: transform var(--transition-slow);
}
#sidebar.collapsed .sidebar-toggle-icon {
  transform: rotate(180deg);
}

/* ─── Top Bar ────────────────────────────────── */
#topbar {
  position: fixed;
  top: 0;
  right: var(--sidebar-width);
  left: 0;
  height: var(--topbar-height);
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 1.5rem;
  z-index: 100;
  transition: right var(--transition-slow);
  box-shadow: var(--shadow-sm);
}

#sidebar.collapsed ~ #topbar,
body.sidebar-collapsed #topbar {
  right: var(--sidebar-collapsed);
}

.topbar-start {
  display: flex;
  align-items: center;
  gap: 1rem;
}

.topbar-page-title {
  display: flex;
  flex-direction: column;
}
.topbar-page-title h3 {
  font-size: 1rem;
  font-weight: 700;
  color: var(--text-primary);
}
.topbar-page-title .breadcrumb {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.topbar-end {
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.search-bar {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-base);
  border: 1.5px solid var(--border-subtle);
  border-radius: var(--radius-sm);
  padding: 0.45rem 0.875rem;
  transition: all var(--transition-fast);
}
.search-bar:focus-within {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.08);
}
.search-bar input {
  background: none;
  border: none;
  outline: none;
  font-family: var(--font-primary);
  font-size: 0.85rem;
  color: var(--text-primary);
  width: 200px;
  direction: rtl;
}
.search-bar input::placeholder { color: var(--text-muted); }
.search-icon { color: var(--text-muted); font-size: 0.875rem; }

.theme-toggle {
  width: 52px;
  height: 28px;
  border-radius: var(--radius-full);
  background: var(--bg-base);
  border: 1.5px solid var(--border-medium);
  cursor: pointer;
  position: relative;
  transition: all var(--transition-normal);
  flex-shrink: 0;
}
.theme-toggle-thumb {
  position: absolute;
  top: 3px;
  right: 3px;
  width: 20px;
  height: 20px;
  border-radius: var(--radius-full);
  background: var(--accent-primary);
  transition: transform var(--transition-normal);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  box-shadow: 0 2px 6px rgba(108,99,255,0.4);
}
[data-theme="dark"] .theme-toggle-thumb {
  transform: translateX(-24px);
}

.notif-btn {
  position: relative;
}
.notif-dot {
  position: absolute;
  top: 4px;
  left: 4px;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-secondary);
  border: 2px solid var(--bg-surface);
}

.topbar-avatar {
  cursor: pointer;
  position: relative;
}
.topbar-avatar .avatar::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent-tertiary);
  border: 2px solid var(--bg-surface);
}

/* Mobile sidebar toggle */
.mobile-sidebar-toggle {
  display: none;
  width: 36px;
  height: 36px;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-subtle);
  background: var(--bg-base);
  color: var(--text-secondary);
  font-size: 1rem;
}

/* ─── Main Content ────────────────────────────── */
#content-area {
  margin-right: var(--sidebar-width);
  margin-top: var(--topbar-height);
  flex: 1;
  min-height: calc(100vh - var(--topbar-height));
  padding: 2rem;
  transition: margin-right var(--transition-slow);
}

body.sidebar-collapsed #content-area {
  margin-right: var(--sidebar-collapsed);
}

/* ─── Page Sections ──────────────────────────── */
.page-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 1.75rem;
  flex-wrap: wrap;
  gap: 1rem;
}
.page-header-left h2 {
  margin-bottom: 0.2rem;
}
.page-header-left p {
  font-size: 0.875rem;
}

/* ─── Stats Grid ─────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.25rem;
  margin-bottom: 2rem;
}

.stat-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
  transition: all var(--transition-normal);
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  top: -20%;
  left: -10%;
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--stat-color, var(--accent-primary));
  opacity: 0.06;
  transition: transform var(--transition-slow);
}
.stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-3px); }
.stat-card:hover::after { transform: scale(2.5); }

.stat-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
}
.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  background: var(--stat-bg, rgba(108,99,255,0.12));
  color: var(--stat-color, var(--accent-primary));
  flex-shrink: 0;
}
.stat-trend {
  display: flex;
  align-items: center;
  gap: 0.2rem;
  font-size: 0.75rem;
  font-weight: 600;
  padding: 0.2rem 0.5rem;
  border-radius: var(--radius-full);
}
.stat-trend.up   { background: rgba(67,233,123,0.12); color: #2BC56A; }
.stat-trend.down { background: rgba(255,101,132,0.12); color: var(--accent-secondary); }

.stat-value {
  font-size: 2rem;
  font-weight: 800;
  font-family: var(--font-display);
  color: var(--text-primary);
  line-height: 1;
}
.stat-label {
  font-size: 0.8rem;
  color: var(--text-secondary);
  font-weight: 500;
}

/* ─── Dashboard Grids ────────────────────────── */
.dashboard-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  margin-bottom: 1.25rem;
}
.dashboard-grid.three-col {
  grid-template-columns: 2fr 1fr 1fr;
}

/* ─── Placeholder Pages ──────────────────────── */
.placeholder-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 400px;
  text-align: center;
  gap: 1.5rem;
}
.placeholder-icon {
  width: 80px;
  height: 80px;
  border-radius: var(--radius-xl);
  background: rgba(108,99,255,0.08);
  border: 2px dashed var(--accent-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: var(--accent-primary);
}
.placeholder-page h3 { font-size: 1.3rem; }
.placeholder-page p  { color: var(--text-secondary); max-width: 360px; font-size: 0.9rem; }

.coming-soon-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 1rem;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: var(--radius-full);
  color: var(--accent-primary);
  font-size: 0.8rem;
  font-weight: 600;
}

/* ─── Responsive ─────────────────────────────── */
@media (max-width: 1024px) {
  .dashboard-grid.three-col { grid-template-columns: 1fr 1fr; }
}

/* ════════════════════════════════════════
   TABLET & MOBILE  ≤ 768px
   ════════════════════════════════════════ */
@media (max-width: 768px) {
  :root { --sidebar-width: 280px; }

  /* ── Prevent ALL horizontal overflow ── */
  html, body { overflow-x: hidden; max-width: 100vw; }
  #main-app  { overflow-x: hidden; max-width: 100vw; }

  /* ── Hamburger button ── */
  .mobile-sidebar-toggle {
    display: flex !important;
    width: 40px; height: 40px;
    font-size: 1.2rem;
  }

  /* ── Sidebar: off-canvas RTL drawer ── */
  #sidebar {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: var(--sidebar-width) !important;
    transform: translateX(110%);
    z-index: 500;
    transition: transform var(--transition-slow);
    box-shadow: none;
  }
  #sidebar.mobile-open {
    transform: translateX(0);
    box-shadow: -8px 0 40px rgba(0,0,0,0.45);
  }
  /* Sidebar auto-close handled in JS — ensure no width leaks */
  #sidebar.collapsed { width: var(--sidebar-width) !important; }

  /* ── Topbar: full width ── */
  #topbar {
    right: 0 !important;
    left: 0 !important;
    padding: 0 0.875rem;
    width: 100% !important;
    box-sizing: border-box;
  }

  /* ── Content: zero sidebar margin ── */
  #content-area {
    margin-right: 0 !important;
    margin-left: 0 !important;
    padding: 1rem 0.875rem;
    padding-bottom: 80px !important; /* room for bottom nav */
    width: 100% !important;
    box-sizing: border-box;
    overflow-x: hidden;
  }

  /* ── Grids ── */
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  .dashboard-grid,
  .dashboard-grid.three-col { grid-template-columns: 1fr !important; }
  .settings-grid  { grid-template-columns: 1fr !important; }
  .dashboard-bottom { grid-template-columns: 1fr !important; }

  /* ── Override any inline grid styles ── */
  [style*="grid-template-columns"] {
    grid-template-columns: 1fr !important;
  }

  /* ── Misc ── */
  .search-bar { display: none; }
  .page-header { flex-direction: column; align-items: flex-start; }
  #overlay { display: block; }

  /* ── Profile: single column, no overflow ── */
  .profile-card { max-width: 100%; padding: 0; }
  .info-row {
    flex-wrap: wrap;
    gap: 0.25rem;
  }
  .info-value { text-align: right; }

  /* ── Cards: prevent overflow ── */
  .card { padding: 1.125rem; }
  .stat-card { padding: 1rem; }

  /* ── User management table: contained scroll only ── */
  .um-table-wrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    max-width: 100%;
  }
  .um-table { min-width: 420px; }
  .um-table .hide-mobile { display: none; }
  .um-table th, .um-table td { padding: 0.6rem 0.6rem; font-size: 0.8rem; }

  /* ── Modal: full-width on mobile ── */
  .um-modal {
    max-width: 100% !important;
    margin: 0.5rem;
    max-height: 92vh;
  }
  .um-modal-footer { flex-wrap: wrap; }
  .um-modal-footer .btn { flex: 1; min-width: 100px; }

  /* ── Page header buttons ── */
  .page-header .btn { font-size: 0.82rem; padding: 0.5rem 0.875rem; }

  /* ── Topbar right element size ── */
  .topbar-page-title .breadcrumb { display: none; }
  .topbar-avatar .avatar { width: 32px; height: 32px; font-size: 0.78rem; }
}

/* ════════════════════════════════════════
   SMALL PHONES  ≤ 480px
   ════════════════════════════════════════ */
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.6rem; }
  .stat-card  { padding: 0.875rem; }
  .stat-value { font-size: 1.4rem; }
  .stat-icon  { width: 34px; height: 34px; font-size: 0.95rem; }

  .role-grid  { grid-template-columns: 1fr 1fr; }
  #content-area { padding: 0.75rem; padding-bottom: 80px !important; }
  .login-card { padding: 1.5rem 1.125rem; margin: 0.75rem; }
  .page-header-left h2 { font-size: 1.1rem; }
  .page-header { gap: 0.5rem; }

  /* Topbar */
  .topbar-page-title h3 { font-size: 0.875rem; }
  .topbar-end { gap: 0.35rem; }
  .btn-icon { width: 32px; height: 32px; font-size: 0.82rem; }
  .theme-toggle { width: 44px; height: 24px; }
  .theme-toggle-thumb { width: 16px; height: 16px; top: 3px; right: 3px; font-size: 0.55rem; }
  [data-theme="dark"] .theme-toggle-thumb { transform: translateX(-20px); }

  /* Training type grid: 3 across */
  .training-type-grid { grid-template-columns: repeat(3, 1fr); }

  /* Resource rows */
  .tr-resource-row { padding: 0.6rem 0.7rem .15rem; }

  /* Auth tabs */
  .auth-tab { font-size: 0.8rem; padding: 0.45rem 0.5rem; }

  /* Role cards */
  .role-card .role-icon { font-size: 1.25rem; }
  .role-card .role-name { font-size: 0.75rem; }
  .role-card .role-desc { font-size: 0.62rem; }
}

/* ════════════════════════════════════════
   VERY SMALL  ≤ 360px
   ════════════════════════════════════════ */
@media (max-width: 360px) {
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 0.4rem; }
  .stat-value { font-size: 1.25rem; }
  #content-area { padding: 0.6rem; padding-bottom: 80px !important; }
  .training-type-grid { grid-template-columns: repeat(2, 1fr); }
  .um-modal { margin: 0.25rem; }
}
    #main-app { display: none; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    /* Desktop sidebar position (overrides for min-width) */
    @media (min-width: 769px) {
      body:not(.sidebar-collapsed) #topbar { right: var(--sidebar-width); }
      body.sidebar-collapsed #topbar { right: var(--sidebar-collapsed); }
      body:not(.sidebar-collapsed) #content-area { margin-right: var(--sidebar-width); }
      body.sidebar-collapsed #content-area { margin-right: var(--sidebar-collapsed); }
    }
    .last-no-border:last-child { border-bottom: none !important; padding-bottom: 0 !important; }

    /* ── Training Module (Phase 1.2) ── */
    .training-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 768px) {
      .training-stats-row { grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    }
    @media (max-width: 400px) {
      .training-stats-row { grid-template-columns: 1fr 1fr; }
    }

    .training-course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    @media (max-width: 640px) {
      .training-course-grid { grid-template-columns: 1fr; }
    }

    .training-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-sm);
    }
    .training-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .training-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .training-type-badge {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent-primary);
      background: rgba(108,99,255,0.1);
      padding: 0.2rem 0.6rem;
      border-radius: var(--radius-full);
    }
    .training-card-title {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.4;
      margin: 0;
    }
    .training-card-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.5;
      margin: 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .training-card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .training-card-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.25rem;
      flex-wrap: wrap;
    }

    /* Type selector in modal */
    .training-type-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.4rem;
    }
    @media (max-width: 480px) {
      .training-type-grid { grid-template-columns: repeat(3, 1fr); }
    }
    .training-type-opt {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      padding: 0.6rem 0.3rem;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
      background: var(--bg-base);
    }
    .training-type-opt:hover { border-color: var(--accent-primary); }
    .training-type-opt.selected {
      border-color: var(--accent-primary);
      background: rgba(108,99,255,0.1);
      box-shadow: 0 0 0 2px rgba(108,99,255,0.15);
    }

    /* ── Training Phase 1.3 — Dynamic form CSS ── */

    /* Meta chips on card */
    .tr-meta-chip {
      font-size: .75rem;
      color: var(--text-secondary);
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: .15rem .55rem;
      white-space: nowrap;
    }
    .tr-collab-chip {
      background: rgba(67,233,123,.1);
      border-color: rgba(67,233,123,.3);
      color: #2BC56A;
    }
    .tr-collab-summary {
      display: flex;
      gap: .75rem;
      font-size: .78rem;
      color: var(--text-secondary);
      background: var(--bg-base);
      border-radius: var(--radius-sm);
      padding: .45rem .75rem;
      flex-wrap: wrap;
    }

    /* Upload zone */
    .tr-upload-zone {
      border: 2px dashed var(--border-medium);
      border-radius: var(--radius-md);
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .35rem;
      transition: all var(--transition-fast);
      background: var(--bg-base);
    }
    .tr-upload-zone:hover {
      border-color: var(--accent-primary);
      background: rgba(108,99,255,.04);
    }

    /* File chip list */
    .tr-file-preview {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
      margin-top: .6rem;
    }
    .tr-file-chip {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      padding: .25rem .6rem;
      font-size: .78rem;
      color: var(--text-primary);
    }

    /* Collab section label */
    .tr-section-label {
      font-size: .8rem;
      font-weight: 700;
      color: var(--accent-primary);
      background: rgba(108,99,255,.07);
      border-radius: var(--radius-sm);
      padding: .35rem .75rem;
      margin-bottom: .5rem;
    }

    /* Two-col grid inside modal (collab) */
    .tr-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }
    @media (max-width: 440px) {
      .tr-two-col { grid-template-columns: 1fr; }
    }

    /* Dynamic fields smooth appearance */
    #tr-dynamic-fields { animation: pageIn .2s ease; }

    /* ── Phase 2.1 Part 2 — Tasks Module ── */

    /* Tabs */
    .tasks-tabs {
      display: flex;
      gap: .5rem;
      border-bottom: 2px solid var(--border-subtle);
      margin-bottom: 1.25rem;
    }
    .tasks-tab {
      padding: .55rem 1.1rem;
      border: none;
      background: none;
      font-family: var(--font-primary);
      font-size: .875rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition-fast);
    }
    .tasks-tab.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    /* Kanban board */
    .kanban-board {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      padding-bottom: .75rem;
      -webkit-overflow-scrolling: touch;
    }
    .kanban-col {
      min-width: 230px;
      width: 230px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .kanban-col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .6rem .875rem;
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      border-top: 3px solid;
      font-size: .82rem;
      font-weight: 700;
      color: var(--text-primary);
      border-left: 1px solid var(--border-subtle);
      border-right: 1px solid var(--border-subtle);
      border-bottom: 1px solid var(--border-subtle);
    }
    .kanban-col-body {
      display: flex;
      flex-direction: column;
      gap: .5rem;
      min-height: 80px;
      padding: .25rem 0;
    }
    .kanban-empty {
      padding: 1rem;
      text-align: center;
      font-size: .78rem;
      color: var(--text-muted);
      border: 2px dashed var(--border-subtle);
      border-radius: var(--radius-md);
    }

    /* Task card */
    .kanban-task {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: .75rem;
      cursor: grab;
      transition: all var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: .4rem;
      box-shadow: var(--shadow-sm);
    }
    .kanban-task:hover  { box-shadow: var(--shadow-md); border-color: var(--accent-primary); }
    .kanban-task:active { cursor: grabbing; opacity: .8; }
    .kanban-task-overdue { border-right: 3px solid var(--accent-secondary); }

    .kt-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .kt-actions { display: flex; gap: .2rem; }
    .kt-title {
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
    }
    .kt-desc {
      font-size: .75rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }
    .kt-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .4rem;
      flex-wrap: wrap;
    }
    .kt-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: .35rem;
      border-top: 1px solid var(--border-subtle);
      gap: .4rem;
    }
    .kt-status-sel {
      font-family: var(--font-primary);
      font-size: .7rem;
      background: var(--bg-base);
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      padding: .2rem .4rem;
      color: var(--text-primary);
      cursor: pointer;
    }

    /* Quick Tasks */
    .qt-list { display: flex; flex-direction: column; gap: .6rem; }
    .qt-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: .875rem 1rem;
      transition: all var(--transition-fast);
    }
    .qt-card:hover { border-color: var(--accent-primary); box-shadow: var(--shadow-sm); }

    /* Mobile kanban */
    @media (max-width: 480px) {
      .kanban-col { min-width: 200px; width: 200px; }
      .kanban-task { padding: .6rem; }
      .kt-title { font-size: .8rem; }
    }

    /* Project section */
    .teams-project-section { margin-bottom: 2rem; }
    .teams-project-header {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1rem;
      padding-bottom: .75rem;
      border-bottom: 2px solid var(--border-subtle);
    }
    .teams-project-icon { font-size: 1.3rem; }
    .teams-project-header h3 { margin: 0; font-size: 1.1rem; }

    /* Team cards grid */
    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1rem;
    }
    @media (max-width: 640px) {
      .teams-grid { grid-template-columns: 1fr; }
    }

    /* Team summary card */
    .team-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      cursor: pointer;
      transition: all var(--transition-normal);
      display: flex;
      flex-direction: column;
      gap: .6rem;
    }
    .team-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-3px);
      border-color: var(--accent-primary);
    }
    .team-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .team-card-icon {
      width: 42px; height: 42px;
      border-radius: var(--radius-md);
      background: rgba(108,99,255,.1);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .team-card-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }
    .team-card-project {
      font-size: .78rem;
      color: var(--text-secondary);
    }
    .team-card-leader {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .6rem;
      background: var(--bg-base);
      border-radius: var(--radius-sm);
    }
    .team-card-members-preview {
      display: flex;
      gap: .3rem;
      flex-wrap: wrap;
    }
    .team-card-footer {
      padding-top: .4rem;
      border-top: 1px solid var(--border-subtle);
      text-align: left;
    }

    /* Team detail */
    .team-detail-header { margin-bottom: 1.25rem; }
    .team-detail-hero {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }
    .team-detail-icon {
      width: 56px; height: 56px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, var(--accent-primary), #8B7CFF);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.6rem;
      box-shadow: var(--shadow-accent);
      flex-shrink: 0;
    }
    .team-detail-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: .75rem;
    }
    @media (max-width: 640px) {
      .team-detail-stats { grid-template-columns: 1fr 1fr; }
    }
    .team-stat-chip {
      display: flex;
      align-items: center;
      gap: .6rem;
      padding: .75rem;
      background: var(--bg-base);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
    }

    /* Team structure grid */
    .team-structure-grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 1.25rem;
      align-items: start;
    }
    /* Prevent cards from stretching to fill row height */
    .team-structure-grid > .card {
      height: fit-content;
      min-height: unset;
      align-self: start;
    }
    @media (max-width: 768px) {
      .team-structure-grid { grid-template-columns: 1fr; }
      .team-structure-grid .card[style*="span 2"] { grid-column: span 1 !important; }
    }
    }

    /* Member cards */
    .team-members-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: .75rem;
    }
    @media (max-width: 480px) {
      .team-members-grid { grid-template-columns: 1fr; }
    }
    .team-member-card {
      padding: .875rem;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      transition: all var(--transition-fast);
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .team-member-card:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-sm);
    }
    .team-leader-card {
      background: rgba(247,151,30,.05);
      border-color: rgba(247,151,30,.3);
    }
    .team-member-meta {
      display: flex;
      gap: .4rem;
      flex-wrap: wrap;
      padding-top: .4rem;
      border-top: 1px solid var(--border-subtle);
    }

    /* ── Phase 1.5 — RBAC & Project/Group UI ── */
    .um-project-group-row {
      display: flex;
      gap: 0.75rem;
    }
    @media (max-width: 480px) {
      .um-project-group-row { flex-direction: column; gap: 0; }
    }
    .um-group-badge {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 1rem;
      background: var(--bg-base);
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    /* Permission-denied icon consistent */
    .placeholder-icon[style*="accent-secondary"] {
      border-color: var(--accent-secondary);
      color: var(--accent-secondary);
    }
    .tr-resource-row {
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: .75rem .875rem .25rem;
      margin-bottom: .6rem;
    }
    .tr-resource-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: .5rem;
    }

    /* Resource links on card */
    .tr-resource-list {
      display: flex;
      flex-direction: column;
      gap: .35rem;
      margin: .4rem 0 .2rem;
    }
    .tr-resource-link {
      display: flex;
      align-items: center;
      gap: .5rem;
      padding: .45rem .7rem;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-sm);
      text-decoration: none;
      transition: all var(--transition-fast);
      overflow: hidden;
    }
    .tr-resource-link:hover {
      border-color: var(--accent-primary);
      background: rgba(108,99,255,.05);
    }
    .tr-resource-num {
      min-width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--accent-primary);
      color: white;
      font-size: .68rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .tr-resource-title {
      flex: 1;
      font-size: .8rem;
      font-weight: 500;
      color: var(--text-primary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tr-resource-arrow {
      font-size: .75rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .tr-resource-more {
      font-size: .75rem;
      color: var(--accent-primary);
      font-weight: 600;
      padding: .25rem .7rem;
      text-align: center;
    }
    .tr-res-chip {
      background: rgba(56,161,243,.1);
      border-color: rgba(56,161,243,.3);
      color: var(--accent-info);
    }

    @media (max-width: 420px) {
      .tr-resource-link { padding: .4rem .6rem; }
      .tr-resource-title { font-size: .76rem; }
    }


    /* ── Patch: Global mobile overflow guard ── */
    * { box-sizing: border-box; }
    @media (max-width: 768px) {
      .page-header { flex-direction: column; align-items: flex-start; gap: .75rem; }
      .page-header .flex { flex-wrap: wrap; }

      /* Kanban: horizontal scroll contained */
      .kanban-board { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: .5rem; }

      /* Settings grid: force single column */
      .settings-grid { grid-template-columns: 1fr !important; }

      /* Profile: no overflow */
      .profile-card { max-width: 100%; }

      /* UM table: no page-level scroll */
      .um-table-wrap { overflow-x: auto; max-width: 100%; }

      /* Cards: no overflow */
      .card { overflow: hidden; }

      /* Modals: full screen on mobile */
      .um-modal {
        max-width: calc(100vw - 1rem) !important;
        max-height: 90vh;
        overflow-y: auto;
        margin: .5rem;
      }

      /* Team detail grid */
      .team-structure-grid { grid-template-columns: 1fr !important; }
      .team-structure-grid > .card[style*="span 2"] { grid-column: span 1 !important; }

      /* Training type grid */
      .training-type-grid { grid-template-columns: repeat(3,1fr); }

      /* Tasks tabs overflow */
      .tasks-tabs { overflow-x: auto; white-space: nowrap; padding-bottom: 2px; }

      /* Qt-list */
      .qt-list .flex { flex-wrap: wrap; gap: .5rem; }
    }

    @media (max-width: 480px) {
      .team-detail-stats { grid-template-columns: 1fr 1fr; }
      .training-stats-row { grid-template-columns: 1fr 1fr; }
      .um-modal-footer { flex-direction: column; }
      .um-modal-footer .btn { width: 100%; }
    }





    /* ── Meeting Detail Modal — Sticky Tab Navigation ── */

    /* Main tab bar — sticky below header */
    .md-tab-bar {
      display: flex;
      gap: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      flex-shrink: 0;
      background: var(--bg-surface);
      border-bottom: 2px solid var(--border-subtle);
    }
    .md-tab-bar::-webkit-scrollbar { display: none; }

    .md-tab-btn {
      padding: .65rem 1.1rem;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      background: none;
      font-family: var(--font-primary);
      font-size: .85rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
      flex-shrink: 0;
    }
    .md-tab-btn:hover { color: var(--text-primary); }
    .md-tab-btn.active {
      color: var(--accent-primary);
      border-bottom-color: var(--accent-primary);
    }

    /* Tab content — fills remaining modal height, scrollable */
    .md-tab-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: .875rem 1.5rem;
      min-height: 0;
    }

    /* Sub-tabs (attendance group filter) — sticky inside modal */
    #md-subtabs {
      flex-shrink: 0;
      background: var(--bg-base);
      border-bottom: 1px solid var(--border-subtle);
    }
    .md-subtab-bar {
      display: flex;
      gap: .4rem;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: .5rem .875rem;
    }
    .md-subtab-bar::-webkit-scrollbar { display: none; }

    .md-subtab {
      padding: .3rem .875rem;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-full);
      background: var(--bg-surface);
      font-family: var(--font-primary);
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: all var(--transition-fast);
    }
    .md-subtab:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .md-subtab.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    @media (max-width: 480px) {
      .md-tab-btn  { font-size: .8rem; padding: .55rem .875rem; }
      .md-subtab   { font-size: .75rem; padding: .28rem .7rem; }
      .md-tab-content { padding: .75rem 1rem; }
    }

    /* ── Attendance flat UI (redesigned) ── */
    .att-modal-header {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border-subtle);
    }
    .att-summary-bar {
      display: flex;
      gap: .75rem;
      flex-wrap: wrap;
      padding: .75rem 0;
      font-size: .8rem;
      font-weight: 700;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: .5rem;
    }
    .att-sum-item { white-space: nowrap; }

    .att-group-tabs {
      display: flex;
      gap: .35rem;
      overflow-x: auto;
      padding: .6rem 1.5rem;
      border-bottom: 1px solid var(--border-subtle);
      -webkit-overflow-scrolling: touch;
    }
    .att-group-tab {
      padding: .35rem .875rem;
      border: 1.5px solid var(--border-medium);
      border-radius: var(--radius-full);
      background: var(--bg-base);
      font-family: var(--font-primary);
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all var(--transition-fast);
    }
    .att-group-tab:hover { border-color: var(--accent-primary); color: var(--accent-primary); }
    .att-group-tab.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .att-flat-list { display: flex; flex-direction: column; gap: .5rem; }
    .att-flat-row {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: border-color var(--transition-fast);
    }
    .att-flat-row:hover { border-color: var(--border-medium); }

    .att-member-info {
      display: flex;
      align-items: flex-start;
      gap: .6rem;
      padding: .65rem .875rem;
      min-width: 0;
    }
    .att-member-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      color: white;
      font-size: .875rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .att-member-name {
      font-size: .875rem;
      font-weight: 700;
      color: var(--text-primary);
      word-break: break-word;
      white-space: normal;
      line-height: 1.35;
    }
    .att-excuse-text {
      font-size: .72rem;
      color: var(--accent-warning);
      word-break: break-word;
      white-space: normal;
      margin-top: .15rem;
    }

    /* Action row — 3 big tap-friendly buttons */
    .att-action-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      border-top: 1px solid var(--border-subtle);
    }
    .att-quick-btn {
      padding: .5rem .25rem;
      border: none;
      border-left: 1px solid var(--border-subtle);
      background: var(--bg-base);
      font-family: var(--font-primary);
      font-size: .78rem;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all var(--transition-fast);
      text-align: center;
    }
    .att-quick-btn:first-child { border-left: none; }
    .att-quick-btn:hover { background: var(--bg-elevated); }
    .att-quick-btn.att-quick-active { font-weight: 700; }

    @media (max-width: 480px) {
      .att-modal-header { padding: 1rem 1rem .75rem; }
      .att-group-tabs   { padding: .5rem .875rem; }
      .att-member-info  { padding: .55rem .75rem; }
      .att-quick-btn    { font-size: .72rem; padding: .45rem .2rem; }
    }

    /* Attendance group sections */
    .att-group-section {
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      overflow: hidden;
    }
    .att-group-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .65rem 1rem;
      background: var(--bg-base);
      cursor: pointer;
      user-select: none;
      transition: background var(--transition-fast);
    }
    .att-group-header:hover { background: var(--bg-elevated); }
    .att-group-toggle { font-size: .8rem; color: var(--text-muted); transition: all var(--transition-fast); }
    .att-group-body {
      padding: .5rem .75rem;
      display: block;
    }
    .att-group-body .attendance-list { max-height: none; }

    /* ── Phase 2.2 — Meetings Module ── */
    .meetings-stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 640px) { .meetings-stats-row { grid-template-columns: 1fr 1fr; gap: .75rem; } }

    .meetings-list { display: flex; flex-direction: column; gap: .875rem; }

    .meeting-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .6rem;
      transition: all var(--transition-normal);
      box-shadow: var(--shadow-sm);
    }
    .meeting-card:hover { box-shadow: var(--shadow-md); border-color: rgba(108,99,255,.3); }

    .meeting-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .meeting-type-badge {
      font-size: .75rem;
      font-weight: 600;
      color: var(--accent-primary);
      background: rgba(108,99,255,.1);
      padding: .2rem .6rem;
      border-radius: var(--radius-full);
    }
    .meeting-card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
      line-height: 1.35;
    }
    .meeting-card-desc {
      font-size: .8rem;
      color: var(--text-secondary);
      margin: 0;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .meeting-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      align-items: center;
    }
    .meeting-meta-item {
      font-size: .775rem;
      color: var(--text-secondary);
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: .18rem .6rem;
      text-decoration: none;
      white-space: nowrap;
    }
    .meeting-att-summary {
      display: flex;
      gap: 1rem;
      font-size: .78rem;
      font-weight: 600;
      padding: .4rem .6rem;
      background: var(--bg-base);
      border-radius: var(--radius-sm);
    }
    .meeting-card-actions {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      padding-top: .4rem;
      border-top: 1px solid var(--border-subtle);
    }

    /* Meeting detail modal */
    .meeting-detail-grid {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      margin-bottom: .75rem;
    }
    .meeting-info-chip {
      font-size: .8rem;
      font-weight: 500;
      background: var(--bg-base);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-full);
      padding: .25rem .75rem;
      color: var(--text-primary);
      text-decoration: none;
      white-space: nowrap;
    }

    /* Attendance list */

  <script>
/**
 * GPMS - state.js
 * Central state management for Phase 1
 */

const State = (() => {
  // ─── Initial State ───────────────────────────
  const _state = {
    // Auth
    isAuthenticated: false,
    currentUser: null,

    // UI
    currentRoute: 'dashboard',
    sidebarCollapsed: false,
    theme: localStorage.getItem('gpms_theme') || 'dark',
    mobileSidebarOpen: false,

    // Data is now live — computed from UserDB, Tasks, etc. per role
  };

  // ─── Listeners ───────────────────────────────
  const _listeners = {};

  function on(event, callback) {
    if (!_listeners[event]) _listeners[event] = [];
    _listeners[event].push(callback);
  }

  function emit(event, data) {
    (_listeners[event] || []).forEach(cb => cb(data));
  }

  // ─── Getters ─────────────────────────────────
  function get(key) {
    return key ? _state[key] : { ..._state };
  }

  // ─── Setters ─────────────────────────────────
  function set(key, value) {
    _state[key] = value;
    emit('change', { key, value });
    emit(`change:${key}`, value);
  }

  // ─── Theme ───────────────────────────────────
  function setTheme(theme) {
    _state.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('gpms_theme', theme);
    emit('themeChange', theme);
  }

  function toggleTheme() {
    setTheme(_state.theme === 'dark' ? 'light' : 'dark');
  }

  // ─── Sidebar ─────────────────────────────────
  function toggleSidebar() {
    _state.sidebarCollapsed = !_state.sidebarCollapsed;
    localStorage.setItem('gpms_sidebar', _state.sidebarCollapsed ? '1' : '0');
    emit('sidebarToggle', _state.sidebarCollapsed);
  }

  // ─── Auth ─────────────────────────────────────
  function login(user) {
    _state.isAuthenticated = true;
    _state.currentUser = user;
    sessionStorage.setItem('gpms_user', JSON.stringify(user));
    emit('login', user);
  }

  function logout() {
    _state.isAuthenticated = false;
    _state.currentUser = null;
    sessionStorage.removeItem('gpms_user');
    emit('logout');
  }

  function restoreSession() {
    try {
      const saved = sessionStorage.getItem('gpms_user');
      if (saved) {
        const user = JSON.parse(saved);
        // Always rebuild from DB to get fresh RBAC permissions
        const dbUser = UserDB.findById(user.id);
        if (dbUser && dbUser.status === 'active') {
          const fresh = UserDB.buildSessionUser(dbUser);
          _state.isAuthenticated = true;
          _state.currentUser = fresh;
          sessionStorage.setItem('gpms_user', JSON.stringify(fresh));
          return fresh;
        }
        sessionStorage.removeItem('gpms_user');
      }
    } catch(e) {}
    return null;
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Restore theme
    document.documentElement.setAttribute('data-theme', _state.theme);

    // Restore sidebar state
    const savedSidebar = localStorage.getItem('gpms_sidebar');
    if (savedSidebar === '1') _state.sidebarCollapsed = true;
  }

  return { get, set, on, emit, setTheme, toggleTheme, toggleSidebar, login, logout, restoreSession, init };
})();

window.State = State;
/**
 * GPMS - auth.js
 * Simulated authentication (Phase 1 - UI only)
 */

// ══════════════════════════════════════════════════════
//  GPMS Phase 1.1 — UserDB: Account persistence layer
// ══════════════════════════════════════════════════════
const UserDB = (() => {
  const STORE_KEY = 'gpms_users_v2';

  // ─── Project / Group structure (single source of truth) ─
  const PROJECTS = {
    'Project 1': { label: 'Project 1', groups: ['Group 1', 'Group 2'] },
    'Project 2': { label: 'Project 2', groups: ['Group 3', 'Group 4'] },
  };

  // ─── Role definitions ────────────────────────
  const ROLES = {
    'Member': {
      id: 'Member', icon: '👨‍💻', color: '#6C63FF',
      navAccess: ['dashboard', 'projects', 'teams', 'tasks', 'meetings', 'chat', 'research', 'training', 'settings'],
      // Fine-grained action permissions
      can: {
        viewOwnProfile: true, viewOwnTasks: true, viewOwnAttendance: true,
        viewOwnEvaluations: true, viewOwnTraining: true, viewAnnouncements: true,
      },
      cannot: {
        createTask: true, editTask: true, deleteTask: true,
        createMeeting: true, editMeeting: true, manageUsers: true,
        createTraining: true, editTraining: true, deleteTraining: true,
        manageTeams: true, manageProjects: true, manageResearch: true,
        uploadDeliverables: true, changePermissions: true, viewOtherGroups: true,
      },
    },
    'Group Leader': {
      id: 'Group Leader', icon: '👑', color: '#F7971E',
      navAccess: ['dashboard', 'projects', 'teams', 'tasks', 'meetings', 'chat', 'research', 'training', 'reports', 'settings'],
      can: {
        viewOwnGroup: true, createMeeting: true, manageAttendance: true,
        createTask: true, evaluateMembers: true, viewGroupReports: true,
        editTask: true,
      },
      cannot: {
        viewOtherGroups: true, manageUsers: true, changeRoles: true,
        changeProjectAssignments: true, manageTrainingGlobally: true,
        accessOtherProjects: true,
      },
    },
    'Assistant Project Leader': {
      id: 'Assistant Project Leader', icon: '🎓', color: '#43E97B',
      navAccess: ['dashboard', 'projects', 'teams', 'tasks', 'meetings', 'chat', 'research', 'training', 'reports', 'settings'],
      can: {
        viewAllGroups: true, monitorProjects: true, reviewEvaluations: true,
        reviewReports: true, createCrossTeams: true, createQuickTasks: true,
        monitorResearch: true,
      },
      cannot: {
        manageUsers: true, changeRoles: true, changeProjectAssignments: true,
        changeGroupAssignments: true,
      },
    },
    'Project Leader': {
      id: 'Project Leader', icon: '🏛️', color: '#FF6584',
      navAccess: ['dashboard', 'projects', 'teams', 'tasks', 'meetings', 'research', 'chat', 'training', 'reports', 'settings'],
      can: {
        manageUsers: true, manageProjects: true, manageGroups: true,
        assignUsers: true, assignLeaders: true, changeRoles: true,
        configurePermissions: true, accessAllModules: true,
        viewAllGroups: true, createTraining: true, editTraining: true, deleteTraining: true,
      },
      cannot: {},
    },
    'Supervisor': {
      id: 'Supervisor', icon: '🔭', color: '#9B59B6',
      navAccess: ['dashboard', 'projects', 'teams', 'tasks', 'meetings', 'chat', 'reports', 'research', 'training', 'settings'],
      can: {
        viewDashboard: true, viewProjects: true, viewReports: true,
        viewResearch: true, addFeedback: true,
      },
      cannot: {
        manageUsers: true, createTask: true, editAttendance: true,
        changePermissions: true, modifyProjectStructure: true,
        createTraining: true, editTraining: true, deleteTraining: true,
      },
    },
  };

  // ─── Default training object ─────────────────
  function _defaultTraining() {
    return {
      skills: { excel: 0, researchWriting: 0, statistics: 0, presentation: 0, communication: 0 },
      completedCourses: [], recommendedCourses: [], evaluationScore: null,
    };
  }

  // ─── Seed ─────────────────────────────────────
  function _seed() {
    const existing = _load();
    if (existing.length > 0) {
      // Migrate: add training + supervisor role + project structure if missing
      let changed = false;
      const migrated = existing.map(u => {
        let updated = { ...u };
        if (!u.training) { updated.training = _defaultTraining(); changed = true; }
        // Migrate old project names to new structure
        if (u.project && !PROJECTS[u.project]) {
          updated.project = 'Project 1'; updated.group = ''; changed = true;
        }
        return updated;
      });

      // One-time fix: align demo Group Leader / Member accounts so the
      // email numbering (gl1/gl2/gl3/gl4, m2/m3/m4/m5/m6) matches the
      // group they are actually assigned to (Group 1..4).
      // This corrects a previous seed mismatch where gl2@/gl3@ were
      // pointing at the wrong project/group.
      const FIXED_ASSIGNMENTS = {
        'gl@gpms.edu':   { project: 'Project 1', group: 'Group 1' },
        'm@gpms.edu':    { project: 'Project 1', group: 'Group 1' },
        'gl2@gpms.edu':  { project: 'Project 1', group: 'Group 2' },
        'm2@gpms.edu':   { project: 'Project 1', group: 'Group 2' },
        'm3@gpms.edu':   { project: 'Project 1', group: 'Group 2' },
        'gl3@gpms.edu':  { project: 'Project 2', group: 'Group 3' },
        'm4@gpms.edu':   { project: 'Project 2', group: 'Group 3' },
        'gl4@gpms.edu':  { project: 'Project 2', group: 'Group 4' },
        'm5@gpms.edu':   { project: 'Project 2', group: 'Group 4' },
        'm6@gpms.edu':   { project: 'Project 2', group: 'Group 4' },
      };
      migrated.forEach(u => {
        const fix = FIXED_ASSIGNMENTS[(u.email||'').toLowerCase()];
        if (fix && (u.project !== fix.project || u.group !== fix.group)) {
          u.project = fix.project;
          u.group = fix.group;
          changed = true;
        }
      });

      if (changed) _save(migrated);
      return;
    }
    const defaults = [
      { id:'u1', name:'Admin (Project Leader)', email:'pl@gpms.edu',  password:'123456', role:'Project Leader',           project:'Project 1', group:'',        status:'active', training:_defaultTraining() },
      { id:'u3', name:'Dr. Khaled Hassan',      email:'apl@gpms.edu', password:'123456', role:'Assistant Project Leader', project:'Project 1', group:'',        status:'active', training:_defaultTraining() },
      { id:'u5', name:'Dr. Supervisor',         email:'sv@gpms.edu',  password:'123456', role:'Supervisor',               project:'',          group:'',        status:'active', training:_defaultTraining() },
      { id:'u14',name:'Dr. Mona Ibrahim',        email:'apl2@gpms.edu',password:'123456', role:'Assistant Project Leader', project:'Project 2', group:'',        status:'active', training:_defaultTraining() },
      // Group 1 — Project 1
      { id:'u2', name:'Sara Ali',               email:'gl@gpms.edu',  password:'123456', role:'Group Leader',             project:'Project 1', group:'Group 1', status:'active', training:_defaultTraining() },
      { id:'u4', name:'Ahmed Mohamed',          email:'m@gpms.edu',   password:'123456', role:'Member',                  project:'Project 1', group:'Group 1', status:'active', training:_defaultTraining() },
      // Group 2 — Project 1
      { id:'u8', name:'Nour Ahmed',              email:'gl2@gpms.edu', password:'123456', role:'Group Leader',             project:'Project 1', group:'Group 2', status:'active', training:_defaultTraining() },
      { id:'u9', name:'Hana Mohamed',            email:'m2@gpms.edu',  password:'123456', role:'Member',                  project:'Project 1', group:'Group 2', status:'active', training:_defaultTraining() },
      { id:'u10',name:'Yasser Ali',              email:'m3@gpms.edu',  password:'123456', role:'Member',                  project:'Project 1', group:'Group 2', status:'active', training:_defaultTraining() },
      // Group 3 — Project 2
      { id:'u6', name:'Layla Hassan',           email:'gl3@gpms.edu', password:'123456', role:'Group Leader',             project:'Project 2', group:'Group 3', status:'active', training:_defaultTraining() },
      { id:'u7', name:'Omar Faris',             email:'m4@gpms.edu',  password:'123456', role:'Member',                  project:'Project 2', group:'Group 3', status:'active', training:_defaultTraining() },
      // Group 4 — Project 2
      { id:'u11',name:'Rami Hassan',             email:'gl4@gpms.edu', password:'123456', role:'Group Leader',             project:'Project 2', group:'Group 4', status:'active', training:_defaultTraining() },
      { id:'u12',name:'Dina Omar',               email:'m5@gpms.edu',  password:'123456', role:'Member',                  project:'Project 2', group:'Group 4', status:'active', training:_defaultTraining() },
      { id:'u13',name:'Tariq Saeed',             email:'m6@gpms.edu',  password:'123456', role:'Member',                  project:'Project 2', group:'Group 4', status:'active', training:_defaultTraining() },
    ];
    _save(defaults);
  }

  function _load() { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch(e) { return []; } }
  function _save(users) { localStorage.setItem(STORE_KEY, JSON.stringify(users)); }

  // ─── Public API ──────────────────────────────
  function getAll()       { return _load(); }
  function getRoles()     { return ROLES; }
  function getRoleInfo(r) { return ROLES[r] || ROLES['Member']; }
  function getProjects()  { return PROJECTS; }
  function getGroupsFor(projectName) { return PROJECTS[projectName]?.groups || []; }

  function findByEmail(email) { return _load().find(u => u.email.toLowerCase() === email.toLowerCase()); }
  function findById(id)       { return _load().find(u => u.id === id); }

  // Returns users filtered by what the current user can see (data isolation)
  function getVisibleUsers(currentUser) {
    const all = _load();
    const role = currentUser.role;
    if (role === 'Project Leader')            return all;
    if (role === 'Assistant Project Leader')  return all; // APL = admin scope, sees all users
    if (role === 'Supervisor')                return all; // read-only view
    if (role === 'Group Leader')              return all.filter(u => u.group === currentUser.group && u.project === currentUser.project);
    // Member: only self
    return all.filter(u => u.id === currentUser.id);
  }

  function create(data) {
    const users = _load();
    if (users.find(u => u.email.toLowerCase() === data.email.toLowerCase()))
      return { error: 'البريد الإلكتروني مستخدم بالفعل' };
    const user = {
      id: 'u_' + Date.now(),
      name: data.name.trim(),
      email: data.email.trim().toLowerCase(),
      password: data.password,
      role: data.role || 'Member',
      project: data.project || '',
      group: data.group || '',
      status: data.status || 'active',
      training: _defaultTraining(),
    };
    users.push(user);
    _save(users);
    return { user };
  }

  function update(id, data) {
    const users = _load();
    const idx = users.findIndex(u => u.id === id);
    if (idx === -1) return { error: 'المستخدم غير موجود' };
    if (data.email) {
      const conflict = users.find(u => u.email.toLowerCase() === data.email.toLowerCase() && u.id !== id);
      if (conflict) return { error: 'البريد الإلكتروني مستخدم بالفعل' };
    }
    users[idx] = { ...users[idx], ...data };
    _save(users);
    return { user: users[idx] };
  }

  function remove(id) { _save(_load().filter(u => u.id !== id)); }

  function validateLogin(email, password) {
    const user = findByEmail(email);
    if (!user)                  return { error: 'البريد الإلكتروني أو كلمة المرور غير صحيحة' };
    if (user.password !== password) return { error: 'البريد الإلكتروني أو كلمة المرور غير صحيحة' };
    if (user.status !== 'active')   return { error: 'الحساب غير نشط. تواصل مع مشرف المشروع.' };
    return { user };
  }

  function buildSessionUser(dbUser) {
    const roleInfo = getRoleInfo(dbUser.role);
    const training = dbUser.training ? { ...dbUser.training } : _defaultTraining();
    if (training.evaluationScore !== null && training.evaluationScore < 60) {
      if (!training.recommendedCourses.includes('Basic Communication Skills'))
        training.recommendedCourses.push('Basic Communication Skills');

    return {

      project: dbUser.project, group: dbUser.group,
      status: dbUser.status, training,
      permissions: { can: roleInfo.can || {}, cannot: roleInfo.cannot || {} },
    };
  }

  _seed();

  return {
    getAll, getRoles, getRoleInfo, getProjects, getGroupsFor,
    findByEmail, findById, getVisibleUsers,
    create, update, remove, validateLogin, buildSessionUser,
    defaultTraining: _defaultTraining,
  };
})();

//  GPMS Phase 1.5 — RBAC: Permission enforcement engine
// ══════════════════════════════════════════════════════
const RBAC = (() => {

  // ─── Check a single permission ───────────────
  function can(action) {
    const user = State.get('currentUser');
    if (!user) return false;
    const perms = user.permissions?.can || {};
    return !!perms[action];
  }

  function cannot(action) {
    const user = State.get('currentUser');
    if (!user) return true;
    const perms = user.permissions?.cannot || {};
    return !!perms[action];
  }

  // ─── Route guard ─────────────────────────────
  function canAccessRoute(route) {
    const user = State.get('currentUser');
    if (!user) return false;
    return (user.navAccess || []).includes(route);
  }

  // ─── Data isolation: can user see this record?
  function canSeeUser(targetUser) {
    const current = State.get('currentUser');
    if (!current) return false;
    const role = current.role;
    if (role === 'Project Leader' || role === 'Supervisor') return true;
    if (role === 'Assistant Project Leader') return true; // APL admin scope
    if (role === 'Group Leader') return targetUser.group === current.group && targetUser.project === current.project;
    return targetUser.id === current.id; // Member: only self
  }

  // ─── Training permission check ───────────────
  function canManageTraining() {
    const user = State.get('currentUser');
    if (!user) return false;
    return ['Project Leader', 'Assistant Project Leader'].includes(user.role);
  }

  // ─── Guard function — blocks action + shows toast
  function guard(action, callback) {
    if (cannot(action)) {
      Toast.show('⛔ ليس لديك صلاحية لهذا الإجراء', 'error');
      return false;
    }
    if (typeof callback === 'function') callback();
    return true;
  }

  // ─── Render access-denied block ──────────────
  function renderDenied(message) {
    return `
    <div class="placeholder-page">
      <div class="placeholder-icon" style="border-color:var(--accent-secondary);color:var(--accent-secondary);">⛔</div>
      <h3>وصول مقيّد</h3>
      <p>${message || 'ليس لديك صلاحية للوصول إلى هذا القسم.'}</p>
      <button class="btn btn-secondary" onclick="Router.navigate('dashboard')">العودة للوحة التحكم</button>
    </div>`;
  }

  return { can, cannot, canAccessRoute, canSeeUser, canManageTraining, guard, renderDenied };
})();
window.RBAC = RBAC;

    if (!email || !email.includes('@')){ _showError(errEl, 'يرجى إدخال بريد إلكتروني صحيح'); return; }
