  // ── Meeting card ──────────────────────────────
  function _meetingCard(m, cu) {
    const status  = _computeStatus(m);
    const sCfg    = MEETING_STATUS.find(s => s.id === status) || MEETING_STATUS[0];
    const tCfg    = MEETING_TYPES.find(t => t.id === m.type)  || MEETING_TYPES[0];
    const canEdit = _canEdit(m, cu);
    const canDel  = _canDelete(m, cu);

    // Attendance summary must be scoped to what this user is allowed to see
    // (e.g. a Group Leader only sees their own group's attendance counts).
    const visibleAttendees = _getAttendeesForViewer(m, cu).map(u => u.id);
    const att = getAttendanceForMeeting(m.id).filter(a => visibleAttendees.includes(a.memberId));

    const scopeLabel = m.targetScope === 'system' ? 'النظام كله' :
                       m.targetScope === 'project' ? m.targetProject :
                       (Array.isArray(m.targetGroups) ? m.targetGroups.join('، ') : m.targetGroup || '—');

    const actionItems = Array.isArray(m.actionItems) ? m.actionItems : [];
    const doneActions = actionItems.filter(a => a.status === 'مكتمل').length;
    const hasMinutes  = !!(m.minutes && m.minutes.summary);
    const hasFeedback = Array.isArray(m.feedback) && m.feedback.length > 0;
    const isRecurring = m.recurrence && m.recurrence.type !== 'none';
    const canGenNext   = isRecurring && status === 'completed' && !m.nextGenerated && _canEdit(m, cu);

    return `
    <div class="meeting-card" id="mc-${m.id}">
      <!-- Header -->
      <div class="meeting-card-header">
        <div class="meeting-type-badge">${tCfg.icon} ${tCfg.label}</div>
        <span class="badge" style="background:${sCfg.bg};color:${sCfg.color};">${sCfg.label}</span>
      </div>

      <!-- Title -->
      <h4 class="meeting-card-title">${m.title}</h4>
      ${m.description ? `<p class="meeting-card-desc">${m.description}</p>` : ''}

      <!-- Meta -->
      <div class="meeting-card-meta">
        <span class="meeting-meta-item">📅 ${m.date}</span>
        ${m.time ? `<span class="meeting-meta-item">🕐 ${m.time}</span>` : ''}
        ${m.location ? `<span class="meeting-meta-item">📍 ${m.location}</span>` : ''}
        <span class="meeting-meta-item">👥 ${scopeLabel}</span>
        ${m.link ? `<a href="${m.link}" target="_blank" class="meeting-meta-item" style="color:var(--accent-primary);">🔗 رابط</a>` : ''}
        ${isRecurring ? `<span class="meeting-meta-item" style="color:var(--accent-primary);">🔁 ${_recurLabel(m.recurrence)}</span>` : ''}
      </div>

      <!-- Phase 2.2 Part 2: feature indicators -->
      ${(hasMinutes || actionItems.length || hasFeedback || (m.attachments||[]).length) ? `
      <div class="meeting-card-meta">
        ${hasMinutes ? `<span class="meeting-meta-item" style="color:#43E97B;">📝 محضر</span>` : ''}
        ${actionItems.length ? `<span class="meeting-meta-item" style="color:var(--accent-warning);">✅ ${doneActions}/${actionItems.length} إجراءات</span>` : ''}
        ${hasFeedback ? `<span class="meeting-meta-item" style="color:#9B59B6;">🔭 ${m.feedback.length} ملاحظات مشرف</span>` : ''}
        ${(m.attachments||[]).length ? `<span class="meeting-meta-item">📎 ${m.attachments.length} مرفقات</span>` : ''}
      </div>` : ''}

      <!-- Attendance summary -->
      ${att.length > 0 ? `
      <div class="meeting-att-summary">
        <span style="color:#43E97B;">✅ ${att.filter(a=>a.status==='حاضر').length} حاضر</span>
        <span style="color:#FF6584;">❌ ${att.filter(a=>a.status==='غائب').length} غائب</span>
        <span style="color:#F7971E;">🟡 ${att.filter(a=>a.status==='معذور').length} معذور</span>
      </div>` : ''}

      <!-- Actions -->
      <div class="meeting-card-actions">
        <button class="btn btn-secondary text-sm" onclick="Meetings.openDetail('${m.id}')">👁 التفاصيل</button>
        ${canEdit && status !== 'cancelled' ? `<button class="btn btn-secondary text-sm" onclick="Meetings.openModal('${m.id}')">✏️ تعديل</button>` : ''}
        ${canGenNext ? `<button class="btn btn-secondary text-sm" style="color:var(--accent-primary);" onclick="Meetings.generateNextOccurrence('${m.id}')">🔁 إنشاء الاجتماع القادم</button>` : ''}
        ${canDel && status !== 'cancelled' ? `<button class="btn btn-secondary text-sm" style="color:var(--accent-secondary);" onclick="Meetings.cancelMeeting('${m.id}')">❌ إلغاء</button>` : ''}
        ${canDel ? `<button class="btn-icon" style="color:var(--accent-secondary);" onclick="Meetings.deleteMeeting('${m.id}')">🗑</button>` : ''}
      </div>
    </div>`;
  }

  function _mStatCard(icon, label, val, color, bg) {
    return `<div class="stat-card" style="--stat-color:${color};--stat-bg:${bg};">
      <div class="stat-header"><div class="stat-icon">${icon}</div></div>
      <div class="stat-value">${val}</div>
      <div class="stat-label">${label}</div>
    </div>`;
  }

  // ══════════════════════════════════════════════
  //  DETAIL VIEW — Meeting + Attendance + Minutes + Actions + Feedback + Files
  // ══════════════════════════════════════════════
  function openDetail(meetingId, initialTab) {
    const cu      = State.get('currentUser');
    const meeting = _load().find(m => m.id === meetingId);
    if (!meeting) { Toast.show('الاجتماع غير موجود', 'error'); return; }

    const status   = _computeStatus(meeting);
    const sCfg     = MEETING_STATUS.find(s => s.id === status) || MEETING_STATUS[0];
    const tCfg     = MEETING_TYPES.find(t => t.id === meeting.type) || MEETING_TYPES[0];
    const canEdit  = _canEdit(meeting, cu);
    const creator  = UserDB.findById(meeting.createdBy);

    const modal = document.createElement('div');
    modal.className = 'um-modal-bg';
    modal.id = 'meeting-detail-modal';

    const tabs = [
      { id: 'attendance', label: '✅ الحضور' },
      { id: 'minutes',    label: '📝 المحضر' },
      { id: 'actions',    label: '📌 الإجراءات' },
      { id: 'feedback',   label: '🔭 ملاحظات المشرف' },
      { id: 'files',      label: '📎 المرفقات' },
    ];

    const startTab = initialTab && tabs.find(t=>t.id===initialTab) ? initialTab : 'attendance';

    modal.innerHTML = `
    <div class="um-modal" style="max-width:620px;display:flex;flex-direction:column;max-height:92vh;">

      <!-- Header -->
      <div class="att-modal-header">
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;flex-wrap:wrap;">
            <span class="meeting-type-badge">${tCfg.icon} ${tCfg.label}</span>
            <span class="badge" style="background:${sCfg.bg};color:${sCfg.color};">${sCfg.label}</span>
          </div>
          <h4 style="margin:0;font-size:1rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${meeting.title}</h4>
        </div>
        <button class="btn-icon" style="flex-shrink:0;" onclick="document.getElementById('meeting-detail-modal').remove()">✕</button>
      </div>

      <!-- Info chips -->
      <div class="meeting-detail-grid" style="padding:0 1.5rem .75rem;border-bottom:1px solid var(--border-subtle);">
        ${meeting.date     ? `<div class="meeting-info-chip">📅 ${meeting.date}</div>` : ''}
        ${meeting.time     ? `<div class="meeting-info-chip">🕐 ${meeting.time}</div>` : ''}
        ${meeting.location ? `<div class="meeting-info-chip">📍 ${meeting.location}</div>` : ''}
        ${meeting.link     ? `<a href="${meeting.link}" target="_blank" class="meeting-info-chip" style="color:var(--accent-primary);">🔗 رابط</a>` : ''}
        <div class="meeting-info-chip">👤 ${creator?.name||'—'}</div>
        ${meeting.recurrence && meeting.recurrence.type !== 'none' ? `<div class="meeting-info-chip" style="color:var(--accent-primary);">🔁 ${_recurLabel(meeting.recurrence)}</div>` : ''}
      </div>

      <!-- Main tabs — sticky, never scrolls -->
      <div class="md-tab-bar" id="md-tabs">
        ${tabs.map(t => `<button class="md-tab-btn ${t.id===startTab?'active':''}" data-tab="${t.id}" onclick="Meetings._switchDetailTab('${meetingId}','${t.id}',this)">${t.label}</button>`).join('')}
      </div>

      <!-- Sub-tabs (e.g. group tabs in Attendance) — sticky, injected by tab renderers -->
      <div id="md-subtabs" style="display:none;"></div>

      <!-- Tab content — ONLY this scrolls -->
      <div id="md-content" class="md-tab-content">
        ${_renderDetailTab(meetingId, startTab)}
      </div>

      <!-- Footer -->
      <div class="um-modal-footer" style="border-top:1px solid var(--border-subtle);">
        ${canEdit && status !== 'cancelled' ? `<button class="btn btn-secondary" onclick="document.getElementById('meeting-detail-modal').remove();Meetings.openModal('${meetingId}')">✏️ تعديل بيانات الاجتماع</button>` : ''}
        <button class="btn btn-primary" onclick="document.getElementById('meeting-detail-modal').remove()">إغلاق</button>
      </div>
    </div>`;

    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
  }

  // ── Switch main detail tab ────────────────────
  function _switchDetailTab(meetingId, tabId, btn) {
    document.querySelectorAll('#md-tabs .att-group-tab, #md-tabs .md-tab-btn').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    // Clear attendance sub-tabs when switching tabs
    const subBar = document.getElementById('md-subtabs');
    if (subBar) { subBar.innerHTML = ''; subBar.style.display = 'none'; }
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, tabId);
  }

  // ── Render content for a given detail tab ─────
  function _renderDetailTab(meetingId, tabId) {
    const meeting = _load().find(m => m.id === meetingId);
    if (!meeting) return '';
    switch (tabId) {
      case 'attendance': return _renderAttendanceTab(meeting);
      case 'minutes':    return _renderMinutesTab(meeting);
      case 'actions':    return _renderActionsTab(meeting);
      case 'feedback':   return _renderFeedbackTab(meeting);
      case 'files':      return _renderFilesTab(meeting);
      default: return '';
    }
  }

  // ══════════════════════════════════════════════
  //  TAB: Attendance
  // ══════════════════════════════════════════════
  function _renderAttendanceTab(meeting) {
    const cu       = State.get('currentUser');
    const meetingId = meeting.id;
    const attendees = _getAttendeesForViewer(meeting, cu);
    const canAtt    = _canRecordAttendance(meeting, cu);

    const byGroup   = {};
    attendees.forEach(m => {
      const g = m.group || 'عام';
      if (!byGroup[g]) byGroup[g] = [];
      byGroup[g].push(m);
    });
    const groupNames = Object.keys(byGroup).sort();
    // Group-filter tabs only make sense for roles that can see multiple groups
    // (Project Leader / Assistant Project Leader / Supervisor). Group Leaders and
    // Members are already scoped to a single group, so no tabs for them.
    const canSeeMultipleGroups = ['Project Leader','Assistant Project Leader','Supervisor'].includes(cu.role);
    const showTabs = groupNames.length > 1 && canSeeMultipleGroups;

    if (!attendees.length) {
      const msg = (cu.role === 'Group Leader')
        ? 'لا يوجد أعضاء في مجموعتك ضمن هذا الاجتماع'
        : 'لا يوجد أعضاء مستهدفون';
      return `<div style="text-align:center;padding:2rem;color:var(--text-muted);">${msg}</div>`;
    }

    // Inject sub-tabs into sticky sub-bar (outside scroll area)
    setTimeout(() => {
      const subBar = document.getElementById('md-subtabs');
      if (subBar) {
        if (showTabs) {
          subBar.innerHTML = `
            <div class="md-subtab-bar">
              <button class="md-subtab active" data-group="" onclick="Meetings._switchAttTab('','${meetingId}',this)">الكل (${attendees.length})</button>
              ${groupNames.map(g => `<button class="md-subtab" data-group="${g}" onclick="Meetings._switchAttTab('${g}','${meetingId}',this)">${g} (${byGroup[g].length})</button>`).join('')}
            </div>`;
          subBar.style.display = 'block';
        } else {
          subBar.innerHTML = '';
          subBar.style.display = 'none';
        }
      }
    }, 0);

    // Group Leader: read-only banner explaining scope, when this isn't
    // a meeting they themselves created (so they can't edit attendance).
    const glBanner = (cu.role === 'Group Leader' && !canAtt)
      ? `<div class="tr-collab-summary" style="margin-bottom:.6rem;">
           <span>👁️ عرض فقط — حضور مجموعتك (${cu.group})</span>
         </div>`
      : '';

    return `${glBanner}<div id="att-panel">
        ${_renderAttPanelHTML(meeting, attendees, byGroup, showTabs ? '' : groupNames[0], canAtt)}
      </div>`;
  }

  function _renderAttPanelHTML(meeting, attendees, byGroup, filterGroup, canAtt) {
    const meetingId = meeting.id;
    const attRecords = getAttendanceForMeeting(meetingId);
    const members = filterGroup ? (byGroup[filterGroup] || []) : attendees;
    const present  = attRecords.filter(a => a.status === 'حاضر'  && members.find(m=>m.id===a.memberId)).length;
    const absent   = attRecords.filter(a => a.status === 'غائب'  && members.find(m=>m.id===a.memberId)).length;
    const excused  = attRecords.filter(a => a.status === 'معذور' && members.find(m=>m.id===a.memberId)).length;
    const pending  = members.length - present - absent - excused;

    return `
    <div class="att-summary-bar">
      <span class="att-sum-item" style="color:#43E97B;">✅ ${present} حاضر</span>
      <span class="att-sum-item" style="color:#FF6584;">❌ ${absent} غائب</span>
      <span class="att-sum-item" style="color:#F7971E;">🟡 ${excused} معذور</span>
      <span class="att-sum-item" style="color:var(--text-muted);">⬜ ${pending} لم يُسجَّل</span>
    </div>
    <div class="att-flat-list">
      ${members.map(member => {
        const rec = attRecords.find(a => a.memberId === member.id);
        const cur = rec?.status || null;
        const excuse = rec?.excuse || '';
        const ri = UserDB.getRoleInfo(member.role);
        return `
        <div class="att-flat-row" id="att-row-${member.id}">
          <div class="att-member-info">
            <div class="att-member-avatar" style="background:linear-gradient(135deg,${ri.color},#8B7CFF);">${member.name.charAt(0)}</div>
            <div style="flex:1;min-width:0;">
              <div class="att-member-name">${member.name}</div>
              <div style="font-size:.72rem;color:var(--text-muted);">${member.group||''}</div>
              ${excuse && cur==='معذور' ? `<div class="att-excuse-text">📝 ${excuse}</div>` : ''}
            </div>
            <span class="badge ${cur ? ATT_CFG[cur].cls : 'badge-warning'}" style="flex-shrink:0;white-space:nowrap;${!cur?'opacity:.75;':''}">${cur ? ATT_CFG[cur].icon+' '+cur : '⬜ لم يُسجَّل'}</span>
          </div>
          ${canAtt ? `
          <div class="att-action-row">
            ${ATT_STATUS.map(s => {
              const cfg = ATT_CFG[s];
              return `<button class="att-quick-btn ${cur===s?'att-quick-active':''}"
                data-status="${s}"
                style="${cur===s?`background:${cfg.color};color:#fff;border-color:${cfg.color};`:''}"
                onclick="Meetings._recordAttendance('${meetingId}','${member.id}','${s}',this)">
                ${cfg.icon} ${s}
              </button>`;
            }).join('')}
          </div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // ══════════════════════════════════════════════
  //  TAB: Meeting Minutes (محضر الاجتماع)
  // ══════════════════════════════════════════════
  function _renderMinutesTab(meeting) {
    const cu = State.get('currentUser');
    const canEditMin = _canEditMinutes(meeting, cu);
    const m = meeting.minutes;

    if (!m && !canEditMin) {
      return `<div class="placeholder-page" style="min-height:180px;">
        <div class="placeholder-icon" style="width:52px;height:52px;">📝</div>
        <p>لم يتم تسجيل محضر لهذا الاجتماع بعد</p>
      </div>`;
    }

    const recordedByName = m?.recordedByName || '';
    const ts = m?.timestamp ? new Date(m.timestamp).toLocaleString('ar-EG') : '';

    return `
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      ${m ? `<div class="tr-collab-summary" style="margin-bottom:.25rem;">
        <span>👤 سجّله: ${recordedByName}</span>
        <span>🕐 ${ts}</span>
      </div>` : ''}

      <div class="form-group" style="margin:0;">
        <label>📌 ملخص الاجتماع</label>
        <textarea class="form-control" id="mn-summary" rows="2" ${canEditMin?'':'readonly'} placeholder="ملخص عام عن الاجتماع..." style="resize:vertical;">${m?.summary||''}</textarea>
      </div>
      <div class="form-group" style="margin:0;">
        <label>✅ القرارات المتخذة</label>
        <textarea class="form-control" id="mn-decisions" rows="3" ${canEditMin?'':'readonly'} placeholder="القرارات التي تم اتخاذها..." style="resize:vertical;">${m?.decisions||''}</textarea>
      </div>
      <div class="form-group" style="margin:0;">
        <label>💬 ملاحظات النقاش</label>
        <textarea class="form-control" id="mn-discussion" rows="3" ${canEditMin?'':'readonly'} placeholder="نقاط النقاش الرئيسية..." style="resize:vertical;">${m?.discussion||''}</textarea>
      </div>
      <div class="form-group" style="margin:0;">
        <label>🎯 النتائج الرئيسية</label>
        <textarea class="form-control" id="mn-outcomes" rows="2" ${canEditMin?'':'readonly'} placeholder="النتائج والمخرجات..." style="resize:vertical;">${m?.outcomes||''}</textarea>
      </div>

      ${canEditMin ? `
      <button class="btn btn-primary" style="align-self:flex-end;" onclick="Meetings._saveMinutesFromTab('${meeting.id}')">
        💾 ${m ? 'تحديث المحضر' : 'حفظ المحضر'}
      </button>` : ''}
    </div>`;
  }

  function _saveMinutesFromTab(meetingId) {
    const cu = State.get('currentUser');
    const data = {
      summary:    document.getElementById('mn-summary')?.value?.trim()    || '',
      decisions:  document.getElementById('mn-decisions')?.value?.trim()  || '',
      discussion: document.getElementById('mn-discussion')?.value?.trim() || '',
      outcomes:   document.getElementById('mn-outcomes')?.value?.trim()   || '',
    };
    saveMinutes(meetingId, data, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'minutes');
  }

  // ══════════════════════════════════════════════
  //  TAB: Action Items
  // ══════════════════════════════════════════════
  function _renderActionsTab(meeting) {
    const cu = State.get('currentUser');
    const canManage = _canManageActions(meeting, cu);
    const items = Array.isArray(meeting.actionItems) ? meeting.actionItems : [];
    const allUsers = UserDB.getAll();

    return `
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      ${canManage ? `<button class="btn btn-primary" style="align-self:flex-start;" onclick="Meetings._openActionForm('${meeting.id}')">+ إضافة عنصر إجراء</button>` : ''}

      ${items.length === 0 ? `
      <div class="placeholder-page" style="min-height:160px;">
        <div class="placeholder-icon" style="width:52px;height:52px;">📌</div>
        <p>لا توجد عناصر إجراء لهذا الاجتماع</p>
      </div>` : items.map(item => _actionItemCard(meeting, item, cu, canManage, allUsers)).join('')}
    </div>`;
  }

  function _actionItemCard(meeting, item, cu, canManage, allUsers) {
    const pc = AI_PRIORITY_CFG[item.priority] || AI_PRIORITY_CFG['متوسط'];
    const sc = AI_STATUS_CFG[item.status] || AI_STATUS_CFG['جديد'];
    const assignees = Array.isArray(item.assignedTo) ? item.assignedTo : [item.assignedTo].filter(Boolean);
    const assigneeNames = assignees.map(id => allUsers.find(u=>u.id===id)?.name).filter(Boolean);
    const canUpdateStatus = _canUpdateActionStatus(meeting, item, cu);

    return `
    <div class="kanban-task" style="cursor:default;" id="ai-${item.id}">
      <div class="kt-header">
        <span class="badge ${pc.cls}" style="font-size:.68rem;">${pc.icon} ${item.priority}</span>
        ${canManage ? `
        <div class="kt-actions">
          <button class="btn-icon" style="width:24px;height:24px;font-size:.7rem;" onclick="Meetings._openActionForm('${meeting.id}','${item.id}')">✏️</button>
          <button class="btn-icon" style="width:24px;height:24px;font-size:.7rem;color:var(--accent-secondary);" onclick="Meetings._deleteActionItem('${meeting.id}','${item.id}')">🗑</button>
        </div>` : ''}
      </div>
      <div class="kt-title">${item.title}</div>
      ${item.description ? `<div class="kt-desc">${item.description}</div>` : ''}
      <div class="kt-meta">
        ${assigneeNames.length ? `<span style="font-size:.72rem;color:var(--text-secondary);">👤 ${assigneeNames.join('، ')}</span>` : ''}
        ${item.dueDate ? `<span style="font-size:.7rem;color:var(--text-muted);">📅 ${item.dueDate}</span>` : ''}
      </div>
      <div class="kt-footer">
        ${canUpdateStatus ? `
        <select class="kt-status-sel" onchange="Meetings._updateActionStatus('${meeting.id}','${item.id}',this.value)">
          ${AI_STATUSES.map(s => `<option value="${s}" ${item.status===s?'selected':''}>${s}</option>`).join('')}
        </select>` : `<span class="badge ${sc.cls}">${sc.icon} ${item.status}</span>`}
        ${canManage ? (item.taskId
          ? `<span class="badge badge-success" style="font-size:.68rem;">✅ تم التحويل لمهمة</span>`
          : `<button class="btn btn-secondary text-sm" onclick="Meetings._convertToTask('${meeting.id}','${item.id}')">📋 تحويل إلى مهمة</button>`
        ) : ''}
      </div>
    </div>`;
  }

  function _updateActionStatus(meetingId, actionId, newStatus) {
    const cu = State.get('currentUser');
    if (updateActionItemStatus(meetingId, actionId, newStatus, cu)) {
      Toast.show('✓ تم تحديث حالة العنصر', 'success');
      const content = document.getElementById('md-content');
      if (content) content.innerHTML = _renderDetailTab(meetingId, 'actions');
    }
  }

  function _deleteActionItem(meetingId, actionId) {
    const cu = State.get('currentUser');
    if (!confirm('حذف عنصر الإجراء هذا؟')) return;
    if (deleteActionItem(meetingId, actionId, cu)) {
      Toast.show('تم الحذف', 'info');
      const content = document.getElementById('md-content');
      if (content) content.innerHTML = _renderDetailTab(meetingId, 'actions');
    }
  }

  function _convertToTask(meetingId, actionId) {
    const cu = State.get('currentUser');
    convertActionToTask(meetingId, actionId, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'actions');
  }

  // ── Action item add/edit form (overlay dialog) ─
  function _openActionForm(meetingId, actionId) {
    const cu = State.get('currentUser');
    const meeting = _load().find(m => m.id === meetingId);
    if (!meeting) return;
    const ex = actionId ? (meeting.actionItems||[]).find(a => a.id === actionId) : null;

    // Build member options from attendees of this meeting
    const attendees = _getAttendees(meeting);
    const selected = ex ? (Array.isArray(ex.assignedTo) ? ex.assignedTo : [ex.assignedTo].filter(Boolean)) : [];

    document.getElementById('action-form-dialog')?.remove();
    const dialog = document.createElement('div');
    dialog.id = 'action-form-dialog';
    dialog.className = 'um-modal-bg';
    dialog.style.zIndex = '1100';
    dialog.innerHTML = `
    <div class="um-modal" style="max-width:460px;">
      <h4>${ex ? '✏️ تعديل عنصر إجراء' : '➕ عنصر إجراء جديد'}</h4>
      <div class="form-group">
        <label>العنوان *</label>
        <input class="form-control" id="ai-title" placeholder="عنوان عنصر الإجراء" value="${ex?.title||''}">
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea class="form-control" id="ai-desc" rows="2" style="resize:vertical;">${ex?.description||''}</textarea>
      </div>
      <div class="tr-two-col">
        <div class="form-group">
          <label>الأولوية</label>
          <select class="form-control" id="ai-priority">
            ${AI_PRIORITIES.map(p => `<option ${(ex?.priority||'متوسط')===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>تاريخ الاستحقاق</label>
          <input class="form-control" id="ai-due" type="date" value="${ex?.dueDate||''}">
        </div>
      </div>
      <div class="form-group">
        <label>الأعضاء المسؤولون</label>
        <div style="display:flex;flex-wrap:wrap;gap:.5rem;padding:.5rem;background:var(--bg-base);border-radius:var(--radius-sm);border:1.5px solid var(--border-medium);max-height:150px;overflow-y:auto;">
          ${attendees.length ? attendees.map(u => `
          <label style="display:flex;align-items:center;gap:.35rem;font-size:.82rem;cursor:pointer;
            padding:.3rem .6rem;border-radius:var(--radius-sm);border:1.5px solid ${selected.includes(u.id)?'var(--accent-primary)':'var(--border-medium)'};
            background:${selected.includes(u.id)?'rgba(108,99,255,.1)':'var(--bg-surface)'};">
            <input type="checkbox" class="ai-assignee-cb" value="${u.id}" ${selected.includes(u.id)?'checked':''}>
            ${u.name}
          </label>`).join('') : `<span style="font-size:.8rem;color:var(--text-muted);">لا يوجد أعضاء مستهدفون</span>`}
        </div>
      </div>
      <div id="ai-error" class="auth-error" style="display:none;"></div>
      <div class="um-modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('action-form-dialog').remove()">إلغاء</button>
        <button class="btn btn-primary" onclick="Meetings._saveActionForm('${meetingId}','${actionId||''}')">${ex?'💾 حفظ':'➕ إضافة'}</button>
      </div>
    </div>`;
    dialog.addEventListener('click', e => { if (e.target === dialog) dialog.remove(); });
    document.body.appendChild(dialog);
  }

  function _saveActionForm(meetingId, actionId) {
    const cu = State.get('currentUser');
    const title = document.getElementById('ai-title')?.value?.trim();
    const errEl = document.getElementById('ai-error');
    if (!title) { if(errEl){errEl.textContent='يرجى إدخال العنوان';errEl.style.display='block';} return; }

    const assignedTo = Array.from(document.querySelectorAll('.ai-assignee-cb')).filter(c=>c.checked).map(c=>c.value);

    saveActionItem(meetingId, {
      id: actionId || null,
      title,
      description: document.getElementById('ai-desc')?.value?.trim() || '',
      priority: document.getElementById('ai-priority')?.value || 'متوسط',
      dueDate: document.getElementById('ai-due')?.value || '',
      assignedTo,
    }, cu);

    document.getElementById('action-form-dialog')?.remove();
    Toast.show(actionId ? '✓ تم التعديل' : '✓ تمت الإضافة', 'success');
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'actions');
  }

  // ══════════════════════════════════════════════
  //  TAB: Supervisor Feedback
  // ══════════════════════════════════════════════
  function _renderFeedbackTab(meeting) {
    const cu = State.get('currentUser');
    const canAdd = _canAddFeedback(cu);
    const feedback = Array.isArray(meeting.feedback) ? meeting.feedback : [];
    const FB_TYPES = { comment: { icon:'💬', label:'تعليق' }, recommendation: { icon:'💡', label:'توصية' }, evaluation: { icon:'📊', label:'تقييم' } };

    return `
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      ${canAdd ? `
      <div class="card" style="padding:1rem;">
        <div class="form-group" style="margin-bottom:.6rem;">
          <label>نوع الملاحظة</label>
          <select class="form-control" id="fb-type">
            <option value="comment">💬 تعليق</option>
            <option value="recommendation">💡 توصية</option>
            <option value="evaluation">📊 تقييم</option>
          </select>
        </div>
        <div class="form-group" style="margin-bottom:.6rem;">
          <label>النص</label>
          <textarea class="form-control" id="fb-text" rows="2" placeholder="اكتب ملاحظتك..." style="resize:vertical;"></textarea>
        </div>
        <button class="btn btn-primary" onclick="Meetings._submitFeedback('${meeting.id}')">+ إضافة ملاحظة</button>
      </div>` : `<div style="font-size:.8rem;color:var(--text-muted);padding:.5rem;">ملاحظات المشرف الأكاديمي — للقراءة فقط</div>`}

      ${feedback.length === 0 ? `
      <div class="placeholder-page" style="min-height:140px;">
        <div class="placeholder-icon" style="width:52px;height:52px;">🔭</div>
        <p>لا توجد ملاحظات من المشرف بعد</p>
      </div>` : feedback.map(f => {
        const tCfg = FB_TYPES[f.type] || FB_TYPES.comment;
        const canDel = (cu.role === 'Supervisor' && f.authorId === cu.id) || cu.role === 'Project Leader';
        return `
        <div class="qt-card">
          <div class="flex items-center justify-between" style="margin-bottom:.4rem;">
            <span class="badge badge-info">${tCfg.icon} ${tCfg.label}</span>
            ${canDel ? `<button class="btn-icon" style="font-size:.75rem;color:var(--accent-secondary);" onclick="Meetings._removeFeedback('${meeting.id}','${f.id}')">🗑</button>` : ''}
          </div>
          <div style="font-size:.85rem;color:var(--text-primary);line-height:1.6;">${f.text}</div>
          <div style="font-size:.7rem;color:var(--text-muted);margin-top:.4rem;">🔭 ${f.authorName} · ${new Date(f.createdAt).toLocaleString('ar-EG')}</div>
        </div>`;
      }).join('')}
    </div>`;
  }

  function _submitFeedback(meetingId) {
    const cu = State.get('currentUser');
    const type = document.getElementById('fb-type')?.value || 'comment';
    const text = document.getElementById('fb-text')?.value?.trim();
    if (!text) { Toast.show('يرجى كتابة نص الملاحظة', 'warning'); return; }
    addFeedback(meetingId, { type, text }, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'feedback');
  }

  function _removeFeedback(meetingId, feedbackId) {
    const cu = State.get('currentUser');
    if (!confirm('حذف هذه الملاحظة؟')) return;
    deleteFeedback(meetingId, feedbackId, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'feedback');
  }

  // ══════════════════════════════════════════════
  //  TAB: Attachments
  // ══════════════════════════════════════════════
  function _renderFilesTab(meeting) {
    const cu = State.get('currentUser');
    const canManage = _canManageAttachments(meeting, cu);
    const files = Array.isArray(meeting.attachments) ? meeting.attachments : [];

    return `
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      ${canManage ? `
      <div class="tr-upload-zone" onclick="document.getElementById('mt-attach-input').click()">
        <span style="font-size:1.8rem;">📂</span>
        <span style="font-size:.85rem;font-weight:600;color:var(--accent-primary);">اضغط لرفع المرفقات</span>
        <span style="font-size:.75rem;color:var(--text-muted);">PDF, Word, PowerPoint, صور</span>
      </div>
      <input type="file" id="mt-attach-input" accept="${ATTACH_ACCEPT}" multiple style="display:none;" onchange="Meetings._uploadAttachments('${meeting.id}',this)">
      ` : ''}

      ${files.length === 0 ? `
      <div class="placeholder-page" style="min-height:140px;">
        <div class="placeholder-icon" style="width:52px;height:52px;">📎</div>
        <p>لا توجد مرفقات لهذا الاجتماع</p>
      </div>` : `
      <div class="tr-file-preview" style="margin-top:0;">
        ${files.map(f => `
        <div class="tr-file-chip">
          📄 ${f.name} <span style="color:var(--text-muted);font-size:.7rem;">(${_fmtFileSize(f.size||0)})</span>
          ${canManage ? `<button class="btn-icon" style="width:18px;height:18px;font-size:.65rem;color:var(--accent-secondary);margin-right:-.2rem;" onclick="Meetings._removeAttachmentUI('${meeting.id}','${f.id}')">✕</button>` : ''}
        </div>`).join('')}
      </div>`}
    </div>`;
  }

  function _uploadAttachments(meetingId, input) {
    const cu = State.get('currentUser');
    if (!input.files?.length) return;
    const files = Array.from(input.files).map(f => ({ name: f.name, size: f.size, type: f.type }));
    addAttachments(meetingId, files, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'files');
  }

  function _removeAttachmentUI(meetingId, attId) {
    const cu = State.get('currentUser');
    removeAttachment(meetingId, attId, cu);
    const content = document.getElementById('md-content');
    if (content) content.innerHTML = _renderDetailTab(meetingId, 'files');
  }

  // ── Switch group tab ──────────────────────────
  function _switchAttTab(group, meetingId, btn) {
    document.querySelectorAll('#md-subtabs .md-subtab, #att-group-tabs .att-group-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const panel = document.getElementById('att-panel');
    if (!panel) return;
    const cu         = State.get('currentUser');
    const meeting    = _load().find(m => m.id === meetingId);
    const attendees  = _getAttendeesForViewer(meeting, cu);
    const canAtt     = _canRecordAttendance(meeting, cu);
    const byGroup    = {};
    attendees.forEach(m => { const g = m.group||'عام'; if(!byGroup[g]) byGroup[g]=[]; byGroup[g].push(m); });

    panel.innerHTML = _renderAttPanelHTML(meeting, attendees, byGroup, group, canAtt);
    panel.scrollTop = 0;
  }

  // ── Toggle group section ──────────────────────
  function _toggleAttGroup(id) {
    const body   = document.getElementById(id);
    const toggle = document.getElementById(id.replace('ag-','ag-toggle-'));
    if (!body) return;
    const isOpen = body.style.display !== 'none';
    body.style.display = isOpen ? 'none' : 'block';
    if (toggle) toggle.textContent = isOpen ? '▶' : '▼';
  }

  // ── Record attendance from detail modal ───────
  function _recordAttendance(meetingId, memberId, status, btn) {
    const cu = State.get('currentUser');
    const meeting = _load().find(m => m.id === meetingId);
    if (!meeting) return;
    if (!_canRecordAttendance(meeting, cu)) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }

    // If excuse — show excuse dialog first
    if (status === 'معذور') {
      _showExcuseDialog(meetingId, memberId);
      return;
    }

    _applyAttendance(meetingId, memberId, status, null);
  }

  function _showExcuseDialog(meetingId, memberId) {
    // Remove any existing excuse dialog
    document.getElementById('excuse-dialog')?.remove();

    const member = UserDB.findById(memberId);
    const existing = _loadAtt().find(a => a.meetingId === meetingId && a.memberId === memberId);

    const dialog = document.createElement('div');
    dialog.id = 'excuse-dialog';
    dialog.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1100;display:flex;align-items:center;justify-content:center;padding:1rem;';
    dialog.innerHTML = `
      <div style="background:var(--bg-surface);border-radius:var(--radius-lg);padding:1.5rem;max-width:380px;width:100%;box-shadow:var(--shadow-lg);border:1px solid var(--border-medium);">
        <h4 style="margin:0 0 .25rem;">🟡 سبب العذر</h4>
        <p style="font-size:.82rem;color:var(--text-muted);margin:0 0 1rem;">العضو: <strong>${member?.name||''}</strong></p>
        <textarea id="excuse-text" class="form-control" rows="3" placeholder="اكتب سبب العذر هنا..." style="resize:vertical;">${existing?.excuse||''}</textarea>
        <div style="display:flex;gap:.75rem;margin-top:1rem;justify-content:flex-end;">
          <button class="btn btn-secondary" onclick="document.getElementById('excuse-dialog').remove()">إلغاء</button>
          <button class="btn btn-primary" onclick="Meetings._confirmExcuse('${meetingId}','${memberId}')">✓ تأكيد</button>
        </div>
      </div>`;
    document.body.appendChild(dialog);
    dialog.addEventListener('click', e => { if (e.target === dialog) dialog.remove(); });
    setTimeout(() => document.getElementById('excuse-text')?.focus(), 100);
  }

  function _confirmExcuse(meetingId, memberId) {
    const excuse = document.getElementById('excuse-text')?.value?.trim() || '';
    document.getElementById('excuse-dialog')?.remove();
    _applyAttendance(meetingId, memberId, 'معذور', excuse);
  }

  function _applyAttendance(meetingId, memberId, status, excuse) {
    const cu = State.get('currentUser');
    saveAttendance({ meetingId, memberId, status, excuse, cu });

    // Re-render the active attendance panel for correct summary + row state
    const panel = document.getElementById('att-panel');
    if (panel) {
      const meeting   = _load().find(m => m.id === meetingId);
      const attendees = _getAttendeesForViewer(meeting, cu);
      const canAtt    = _canRecordAttendance(meeting, cu);
      const byGroup   = {};
      attendees.forEach(m => { const g = m.group||'عام'; if(!byGroup[g]) byGroup[g]=[]; byGroup[g].push(m); });
      const activeTab = document.querySelector('#md-subtabs .md-subtab.active, #att-group-tabs .att-group-tab.active');
      const group = activeTab ? (activeTab.dataset.group || '') : '';
      const groupNames = Object.keys(byGroup).sort();
      panel.innerHTML = _renderAttPanelHTML(meeting, attendees, byGroup, group || (groupNames.length<=1 ? groupNames[0] : ''), canAtt);
    }
    Toast.show(`✅ تم تسجيل "${status}" ${excuse ? '— ' + excuse.slice(0,20) : ''}`, 'success');
  }

  // ══════════════════════════════════════════════
  //  MODAL: Add / Edit Meeting
  // ══════════════════════════════════════════════
  function openModal(editId) {
    const cu = State.get('currentUser');
    if (!_canCreate(cu)) { Toast.show('⛔ ليس لديك صلاحية لإنشاء اجتماعات', 'error'); return; }

    const ex       = editId ? _load().find(m => m.id === editId) : null;
    const projects = UserDB.getProjects();
    const initProj = ex?.targetProject || cu.project || '';
    const groups   = initProj ? UserDB.getGroupsFor(initProj) : [];

    // For GL: force their own group/project
    const isGL  = cu.role === 'Group Leader';
    const today = new Date().toISOString().slice(0,10);

    const modal = document.createElement('div');
    modal.className = 'um-modal-bg';
    modal.id = 'meeting-modal';
    modal.innerHTML = `
    <div class="um-modal" style="max-width:520px;">
      <h4>${ex ? '✏️ تعديل الاجتماع' : '📅 اجتماع جديد'}</h4>

      <div class="form-group">
        <label>عنوان الاجتماع *</label>
        <input class="form-control" id="mt-title" placeholder="عنوان الاجتماع" value="${ex?.title||''}">
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea class="form-control" id="mt-desc" rows="2" placeholder="وصف مختصر..." style="resize:vertical;">${ex?.description||''}</textarea>
      </div>

      <div class="tr-two-col">
        <div class="form-group">
          <label>التاريخ *</label>
          <input class="form-control" id="mt-date" type="date" value="${ex?.date||today}">
        </div>
        <div class="form-group">
          <label>الوقت</label>
          <input class="form-control" id="mt-time" type="time" value="${ex?.time||''}">
        </div>
      </div>

      <div class="form-group">
        <label>نوع الاجتماع</label>
        <select class="form-control" id="mt-type">
          ${MEETING_TYPES
            .filter(t => isGL ? ['team','training'].includes(t.id) : true)
            .map(t => `<option value="${t.id}" ${(ex?.type||(isGL?'team':'general'))===t.id?'selected':''}>${t.icon} ${t.label}</option>`)
            .join('')}
        </select>
      </div>

      <div class="tr-two-col">
        <div class="form-group">
          <label>الموقع</label>
          <input class="form-control" id="mt-location" placeholder="قاعة / رقم غرفة" value="${ex?.location||''}">
        </div>
        <div class="form-group">
          <label>رابط أونلاين</label>
          <input class="form-control" id="mt-link" type="url" placeholder="https://meet.google.com/..." dir="ltr" value="${ex?.link||''}">
        </div>
      </div>

      <!-- Target scope -->
      ${!isGL ? `
      <div class="form-group">
        <label>نطاق الاجتماع</label>
        <select class="form-control" id="mt-scope" onchange="Meetings._onScopeChange(this.value,'${cu.role}')">
          <option value="group"   ${(ex?.targetScope||'group')==='group'  ?'selected':''}>مجموعة محددة</option>
          <option value="project" ${ex?.targetScope==='project'?'selected':''}>مشروع كامل</option>
          ${['Project Leader','Assistant Project Leader'].includes(cu.role)
            ? `<option value="system" ${ex?.targetScope==='system'?'selected':''}>النظام كله</option>` : ''}
        </select>
      </div>

      <div id="mt-scope-fields">
        ${_renderScopeFields(ex?.targetScope||'group', initProj, ex?.targetGroups||[ex?.targetGroup].filter(Boolean), cu)}
      </div>
      ` : `
      <input type="hidden" id="mt-scope" value="group">
      <input type="hidden" id="mt-project" value="${cu.project}">
      <div id="mt-scope-fields">
        <div class="form-group">
          <label>المجموعة</label>
          <input class="form-control" value="${cu.group}" readonly style="opacity:.7;">
          <input type="hidden" id="mt-groups-hidden" value="${cu.group}">
        </div>
      </div>`}

      <!-- Recurrence -->
      <div class="form-group">
        <label>🔁 تكرار الاجتماع</label>
        <select class="form-control" id="mt-recur-type" onchange="Meetings._onRecurChange(this.value)">
          ${RECUR_TYPES.map(r => `<option value="${r.id}" ${(ex?.recurrence?.type||'none')===r.id?'selected':''}>${r.label}</option>`).join('')}
        </select>
      </div>
      <div id="mt-recur-custom" class="form-group" style="${(ex?.recurrence?.type)==='custom'?'':'display:none;'}">
        <label>عدد الأيام بين كل تكرار</label>
        <input class="form-control" id="mt-recur-interval" type="number" min="1" max="90" value="${ex?.recurrence?.intervalDays||7}">
      </div>

      <div id="mt-error" class="auth-error" style="display:none;"></div>
      <div class="um-modal-footer">

    document.body.appendChild(modal);

  function _onRecurChange(val) {
    const custom = document.getElementById('mt-recur-custom');
    if (custom) custom.style.display = val === 'custom' ? 'block' : 'none';
  }

  function _renderScopeFields(scope, initProj, initGroups, cu) {
    const projects = UserDB.getProjects();
    const isGL = cu.role === 'Group Leader';
    if (scope === 'system') return '<div class="form-group"><p style="font-size:.82rem;color:var(--text-muted);padding:.5rem;">سيُرسل الاجتماع لجميع أعضاء النظام</p></div>';

    const projOpts = Object.keys(projects).map(p => `<option value="${p}" ${initProj===p?'selected':''}>${p}</option>`).join('');
    const groups   = initProj ? UserDB.getGroupsFor(initProj) : [];

    if (scope === 'project') {
      return `
      <div class="form-group">
        <label>المشروع *</label>
        <select class="form-control" id="mt-project" onchange="Meetings._onProjChange(this.value)">
          <option value="">— اختر —</option>${projOpts}
        </select>
      </div>`;
    }

    // scope = group
    return `
    <div class="um-project-group-row">
      <div class="form-group" style="flex:1;">
        <label>المشروع *</label>
        <select class="form-control" id="mt-project" ${isGL?'disabled':''} onchange="Meetings._onProjChange(this.value,'group')">
          <option value="">— اختر —</option>${projOpts}
        </select>
      </div>
      <div class="form-group" style="flex:1;">
        <label>المجموعة / المجموعات *</label>
        <div id="mt-groups-container">
          ${groups.map(g => `
          <label style="display:flex;align-items:center;gap:.5rem;padding:.3rem 0;font-size:.85rem;cursor:pointer;">
            <input type="checkbox" value="${g}" ${(initGroups||[]).includes(g)?'checked':''}> ${g}
          </label>`).join('')}
        </div>
      </div>
    </div>`;
  }

  function _onScopeChange(scope, role) {
    const cu = State.get('currentUser');
    const proj = document.getElementById('mt-project')?.value || cu.project || '';
    const container = document.getElementById('mt-scope-fields');
    if (container) container.innerHTML = _renderScopeFields(scope, proj, [], cu);
  }

  function _onProjChange(proj, scope) {
    const cu = State.get('currentUser');
    const currentScope = document.getElementById('mt-scope')?.value || 'group';
    const container = document.getElementById('mt-scope-fields');
    if (container) container.innerHTML = _renderScopeFields(currentScope, proj, [], cu);
  }

  function closeModal() {
    document.getElementById('meeting-modal')?.remove();
    document.getElementById('meeting-detail-modal')?.remove();
  }

  function saveModal(editId) {
    const cu = State.get('currentUser');
    const title    = document.getElementById('mt-title')?.value?.trim();
    const desc     = document.getElementById('mt-desc')?.value?.trim();
    const date     = document.getElementById('mt-date')?.value;
    const time     = document.getElementById('mt-time')?.value;
    const type     = document.getElementById('mt-type')?.value;
    const location = document.getElementById('mt-location')?.value?.trim();
    const link     = document.getElementById('mt-link')?.value?.trim();
    const scope    = document.getElementById('mt-scope')?.value || 'group';
    const project  = document.getElementById('mt-project')?.value || cu.project || '';
    const errEl    = document.getElementById('mt-error');
    const _err = msg => { if(errEl){errEl.textContent=msg;errEl.style.display='block';} };

    if (!title) { _err('يرجى إدخال عنوان الاجتماع'); return; }
    if (!date)  { _err('يرجى تحديد تاريخ الاجتماع'); return; }

    // Collect target groups
    let targetGroups = [];
    if (scope === 'group') {
      const hidden = document.getElementById('mt-groups-hidden');
      if (hidden) {
        targetGroups = [hidden.value].filter(Boolean);
      } else {
        document.querySelectorAll('#mt-groups-container input[type=checkbox]:checked').forEach(cb => targetGroups.push(cb.value));
      }
      if (cu.role === 'Group Leader') targetGroups = [cu.group];
      if (!targetGroups.length) { _err('يرجى اختيار مجموعة واحدة على الأقل'); return; }
    }
    if (scope === 'project' && !project) { _err('يرجى اختيار المشروع'); return; }

    // Recurrence
    const recurType = document.getElementById('mt-recur-type')?.value || 'none';
    const recurrence = { type: recurType };
    if (recurType === 'custom') {
      recurrence.intervalDays = parseInt(document.getElementById('mt-recur-interval')?.value) || 7;
    }

    const data = {
      id: editId || null, title, description: desc, date, time, type,
      location, link, targetScope: scope,
      targetProject: project,
      targetGroups: scope === 'group' ? targetGroups : [],
      targetGroup: scope === 'group' ? targetGroups[0] : '',
      recurrence,
    };

    saveMeeting(data, cu);
    closeModal();
    Toast.show(editId ? '✓ تم تعديل الاجتماع' : '✓ تمت إضافة الاجتماع', 'success');
    const c = document.getElementById('page-content');
    if (c) c.innerHTML = Meetings.renderPage();
  }

  // ── Stats for Dashboard ───────────────────────
  function getStats(cu) {
    const meetings  = _visibleMeetings(cu);
    const now       = new Date();
    const weekEnd   = new Date(now.getTime() + 7 * 86400000);
    const upcoming  = meetings.filter(m => {
      const d = new Date(`${m.date}T${m.time||'00:00'}`);
      return d > now && m.status !== 'cancelled';
    });
    const thisWeek  = meetings.filter(m => {
      const d = new Date(`${m.date}T${m.time||'00:00'}`);
      return d >= now && d <= weekEnd && m.status !== 'cancelled';
    });
    const attRecs   = _loadAtt();
    const totalAtt  = attRecs.filter(a => {
      const m = meetings.find(x => x.id === a.meetingId);
      if (!m) return false;
      // Scope to attendance records of members this user is allowed to see
      const visibleIds = _getAttendeesForViewer(m, cu).map(u => u.id);
      return visibleIds.includes(a.memberId);
    });
    const presentPct = totalAtt.length > 0
      ? Math.round(totalAtt.filter(a => a.status === 'حاضر').length / totalAtt.length * 100) : 0;

    // Action items aggregation (Phase 2.2 Part 2)
    let actionTotal = 0, actionDone = 0, actionMine = 0;
    meetings.forEach(m => {
      (m.actionItems || []).forEach(a => {
        actionTotal++;
        if (a.status === 'مكتمل') actionDone++;
        const assignees = Array.isArray(a.assignedTo) ? a.assignedTo : [a.assignedTo].filter(Boolean);
        if (assignees.includes(cu.id) && a.status !== 'مكتمل') actionMine++;
      });
    });
    const feedbackCount = meetings.reduce((sum,m) => sum + (Array.isArray(m.feedback)?m.feedback.length:0), 0);

    return {
      total: meetings.length, upcoming: upcoming.length, thisWeek: thisWeek.length, attendancePct: presentPct,
      actionItemsTotal: actionTotal, actionItemsDone: actionDone, actionItemsMine: actionMine,
      feedbackCount,
    };
  }

  // Expose public API
  return {
    renderPage, openModal, saveModal, closeModal,
    openDetail, cancelMeeting, deleteMeeting, saveMeeting,
    _onScopeChange, _onProjChange, _onRecurChange,
    _recordAttendance, _confirmExcuse, _switchAttTab, _switchDetailTab,
    _saveMinutesFromTab,
    _openActionForm, _saveActionForm, _updateActionStatus, _deleteActionItem, _convertToTask,
    _submitFeedback, _removeFeedback,
    _uploadAttachments, _removeAttachmentUI,
    generateNextOccurrence,
    getAll, getStats, getAttAll, getAttendanceForMeeting,
    saveAttendance, saveMinutes, saveActionItem, addFeedback, addAttachments,
  };
})();
window.Meetings = Meetings;



const Router = (() => {
  // ─── Route Definitions ───────────────────────
  const routes = {
    'dashboard':       { title: 'لوحة التحكم',         icon: '🏠', breadcrumb: 'الرئيسية' },
    'projects':        { title: 'المشاريع',             icon: '📁', breadcrumb: 'الرئيسية / المشاريع' },
    'teams':           { title: 'الفرق والأعضاء',      icon: '👥', breadcrumb: 'الرئيسية / الفرق' },
    'tasks':           { title: 'المهام',               icon: '✅', breadcrumb: 'الرئيسية / المهام' },
    'meetings':        { title: 'الاجتماعات',           icon: '📅', breadcrumb: 'الرئيسية / الاجتماعات' },
    'research':        { title: 'مركز البحث',           icon: '🔬', breadcrumb: 'الرئيسية / مركز البحث' },
    'chat':            { title: 'المحادثات',            icon: '💬', breadcrumb: 'الرئيسية / المحادثات' },
    'training':        { title: 'التدريب والتطوير',     icon: '📚', breadcrumb: 'الرئيسية / التدريب والتطوير' },
    'reports':         { title: 'التقارير',             icon: '📊', breadcrumb: 'الرئيسية / التقارير' },
    'settings':        { title: 'الإعدادات',            icon: '⚙️', breadcrumb: 'الرئيسية / الإعدادات' },
  };

  let _currentRoute = 'dashboard';
  let _listeners = [];

  // ─── Navigate ────────────────────────────────
  function navigate(route) {
    if (!routes[route]) {
      console.warn(`[Router] Unknown route: ${route}`);
      route = 'dashboard';
    }

    // ── RBAC Route Guard ──
    const user = State.get('currentUser');
    if (user && !RBAC.canAccessRoute(route)) {
      Toast.show(`⛔ ليس لديك صلاحية للوصول إلى "${routes[route]?.title || route}"`, 'error');
      return; // block navigation entirely
    }

    _currentRoute = route;
    window.location.hash = route;
    State.set('currentRoute', route);

    _listeners.forEach(cb => cb(route, routes[route]));
    _updateUI(route);
  }

  // ─── Update UI ───────────────────────────────
  function _updateUI(route) {
    const info = routes[route];

    // Update topbar title
    const titleEl = document.querySelector('.topbar-page-title h3');
    const breadEl = document.querySelector('.topbar-page-title .breadcrumb');
    if (titleEl) titleEl.textContent = info.title;
    if (breadEl) breadEl.textContent = info.breadcrumb;

    // Update sidebar active state
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });

    // Render page
    _renderPage(route);

    // Close mobile sidebar
    State.set('mobileSidebarOpen', false);
    document.getElementById('sidebar')?.classList.remove('mobile-open');
    document.getElementById('overlay')?.classList.remove('active');
  }

  // ─── Render page content ─────────────────────
  function _renderPage(route) {
    const content = document.getElementById('page-content');
    if (!content) return;

    content.innerHTML = '';
    content.className = 'page-view';

    // Force reflow for animation
    void content.offsetWidth;

    switch (route) {
      case 'dashboard': content.innerHTML = Components.renderDashboard(); break;
      case 'teams':     content.innerHTML = Teams.renderPage();           break;
      case 'tasks':     content.innerHTML = Tasks.renderPage();           break;
      case 'meetings':  content.innerHTML = Meetings.renderPage();        break;
      case 'training':  content.innerHTML = Training.renderPage();        break;
      case 'settings':  content.innerHTML = Components.renderSettings();  break;
      default:          content.innerHTML = Components.renderPlaceholder(route, routes[route]); break;
    }

    // Post-render hooks
    _afterRender(route);
    // Refresh notif badge on every navigation
    if (typeof Notif !== 'undefined') setTimeout(() => Notif.refreshBadge(), 100);
  }

  function _afterRender(route) {
    if (route === 'dashboard') {
      // Animate progress bars
      setTimeout(() => {
        document.querySelectorAll('.progress-fill[data-value]').forEach(bar => {
          bar.style.width = bar.dataset.value + '%';
        });
      }, 100);
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Parse initial hash
    const hash = window.location.hash.replace('#', '');
    const initial = routes[hash] ? hash : 'dashboard';

    // Handle hash changes
    window.addEventListener('hashchange', () => {
      const h = window.location.hash.replace('#', '');
      if (routes[h] && h !== _currentRoute) navigate(h);
    });

    navigate(initial);
  }

  function on(cb) { _listeners.push(cb); }
  function current() { return _currentRoute; }
  function getInfo(route) { return routes[route || _currentRoute]; }
  function getAllRoutes() { return routes; }

  return { navigate, init, on, current, getInfo, getAllRoutes };
})();

// ─── Toast Notifications ──────────────────────
const Toast = (() => {
  function show(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const icons = { success: '✅', warning: '⚠️', error: '❌', info: 'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${message}</span>`;

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  return { show };
})();

// ─── App Controller ────────────────────────────
const App = (() => {

  // ─── Show Login ──────────────────────────────
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    Auth.renderLogin();
  }

  // ─── Show Main App ────────────────────────────
  function showMainApp(user) {
    // Hide login
    const loginScreen = document.getElementById('login-screen');
    loginScreen.style.opacity = '0';
    loginScreen.style.transition = 'opacity 0.4s ease';

    setTimeout(() => {
      loginScreen.style.display = 'none';
      loginScreen.style.opacity = '1';
    }, 400);

    // Show main app
    const mainApp = document.getElementById('main-app');
    mainApp.style.display = 'flex';
    mainApp.style.opacity = '0';

    // Render sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = Components.renderSidebar(user);

    // Restore sidebar state (desktop only)
    if (State.get('sidebarCollapsed') && window.innerWidth > 768) {
      sidebar.classList.add('collapsed');
      document.body.classList.add('sidebar-collapsed');
    }

    // Topbar user info
    _updateTopbarUser(user);

    setTimeout(() => {
      mainApp.style.transition = 'opacity 0.4s ease';
      mainApp.style.opacity = '1';
      Router.init();
    }, 50);

    Toast.show(`مرحباً ${user.name}! 👋`, 'success');
    setTimeout(() => Notif.refreshBadge(), 300);
  }

  // ─── Update Topbar User ───────────────────────
  function _updateTopbarUser(user) {
    const avatarEl = document.querySelector('.topbar-avatar .avatar');
    if (avatarEl) {
      avatarEl.textContent = user.avatar;
      avatarEl.style.background = `linear-gradient(135deg, ${user.roleColor}, #8B7CFF)`;
    }
  }

  // ─── Toggle Sidebar ───────────────────────────
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      // Mobile: slide in/out
      const isOpen = sidebar.classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active', isOpen);
      State.set('mobileSidebarOpen', isOpen);
    } else {
      // Desktop: collapse/expand
      sidebar.classList.toggle('collapsed');
      const collapsed = sidebar.classList.contains('collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      State.set('sidebarCollapsed', collapsed);
      localStorage.setItem('gpms_sidebar', collapsed ? '1' : '0');
    }
  }

  // ─── Sync Theme Toggle ────────────────────────
  function syncThemeToggle() {
    const thumb = document.querySelector('.theme-toggle-thumb');
    const theme = State.get('theme');
    if (thumb) thumb.textContent = theme === 'dark' ? '🌙' : '☀️';

    // Also sync settings page role cards if visible
    document.querySelectorAll('.role-card[onclick*="setTheme"]').forEach(el => {
      const isLight = el.getAttribute('onclick')?.includes("'light'");
      el.classList.toggle('selected', isLight ? theme === 'light' : theme === 'dark');
    });
  }

  // ─── Topbar search handler ─────────────────────
  function handleSearch(e) {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) Toast.show(`🔍 البحث عن: "${val}" — قريباً`, 'info');
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Init state (theme etc.)
    State.init();

    // Theme toggle listener
    State.on('themeChange', () => syncThemeToggle());

    // Overlay click closes mobile sidebar
    document.getElementById('overlay')?.addEventListener('click', () => {
      document.getElementById('sidebar')?.classList.remove('mobile-open');
      document.getElementById('overlay')?.classList.remove('active');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Ctrl/Cmd + K = search focus
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.querySelector('.search-bar input')?.focus();
      }
      // Escape = close mobile sidebar
      if (e.key === 'Escape') {
        document.getElementById('sidebar')?.classList.remove('mobile-open');
        document.getElementById('overlay')?.classList.remove('active');
      }
    });

    // Search input
    document.querySelector('.search-bar input')?.addEventListener('keydown', handleSearch);

    // Check for existing session
    const savedUser = State.restoreSession();
    if (savedUser) {
      showMainApp(savedUser);
    } else {
      showLogin();
    }

    // Initial theme sync
    syncThemeToggle();

    console.log('%cGPMS v1.1 — Phase 1.1 Auth Upgrade', 'color:#6C63FF;font-weight:bold;font-size:14px;');
    console.log('%c✔ UserDB  ✔ Auth  ✔ UM  ✔ Router  ✔ Theme', 'color:#43E97B;font-size:12px;');
  }

  return { init, showLogin, showMainApp, toggleSidebar, syncThemeToggle, handleSearch, _updateTopbarUser };
})();

window.Toast = Toast;
