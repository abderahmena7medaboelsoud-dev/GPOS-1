        Notif.add({ type:'task_assigned', title:'مهمة سريعة جديدة', body:`"${newQT.title}"`, userId: uid, relatedId: newQT.id });
      });
      ActivityLog.add({ type:'task', text:`تمت إضافة مهمة سريعة "${newQT.title}"`, userId: newQT.createdBy, userName: UserDB.findById(newQT.createdBy)?.name||'النظام', avatar: UserDB.findById(newQT.createdBy)?.name?.charAt(0)||'?' });
    }
    _saveQT(list);
  }
  function deleteQT(id) { _saveQT(_loadQT().filter(t => t.id !== id)); }

  // ══════════════════════════════════════════════
  //  RENDER: Main page
  // ══════════════════════════════════════════════
  function renderPage() {
    const cu      = State.get('currentUser');
    const role    = cu.role;
    const myTasks = _visibleTasks(cu);
    const myQT    = _visibleQT(cu);
    const tCount  = myTasks.length;
    const qCount  = myQT.length;
    const subtitle = role === 'Member'
      ? `لديك <strong>${tCount}</strong> مهمة و<strong>${qCount}</strong> مهمة سريعة`
      : 'إدارة المهام والمتابعة';
    const showQTTab = _canCreateQT(role) || role === 'Member' || role === 'Supervisor' || role === 'Group Leader';

    return `
    <div class="page-header">
      <div class="page-header-left">
        <h2>✅ المهام</h2>
        <p>${subtitle}</p>
      </div>
      <div class="flex gap-2" style="flex-wrap:wrap;">
        ${_canCreate(role) ? `<button class="btn btn-primary" onclick="Tasks.openTaskModal()">+ مهمة جديدة</button>` : ''}
        ${_canCreateQT(role) ? `<button class="btn btn-secondary" onclick="Tasks.openQTModal()">⚡ مهمة سريعة</button>` : ''}
      </div>
    </div>
    <div class="tasks-tabs" id="tasks-tabs">
      <button class="tasks-tab active" data-tab="kanban" onclick="Tasks._switchTab('kanban',this)">
        📋 لوحة كانبان ${tCount > 0 ? `<span class="badge-count" style="margin-right:.3rem;background:var(--accent-primary);">${tCount}</span>` : ''}
      </button>
      ${showQTTab ? `<button class="tasks-tab" data-tab="quicktasks" onclick="Tasks._switchTab('quicktasks',this)">
        ⚡ مهام سريعة ${qCount > 0 ? `<span class="badge-count" style="margin-right:.3rem;background:var(--accent-warning);">${qCount}</span>` : ''}
      </button>` : ''}
    </div>
    <div id="tasks-tab-content">${_renderKanban(cu)}</div>`;
  }

  function _switchTab(tab, el) {
    document.querySelectorAll('.tasks-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    const cu = State.get('currentUser');
    const c  = document.getElementById('tasks-tab-content');
    if (!c) return;
    if (tab === 'kanban')     c.innerHTML = _renderKanban(cu);
    if (tab === 'quicktasks') c.innerHTML = _renderQuickTasks(cu);
  }

  // ─── Kanban board ─────────────────────────────
  function _renderKanban(cu) {
    const tasks = _visibleTasks(cu);
    // Empty state — friendly message instead of blank screen
    if (!tasks.length) {
      return `<div class="placeholder-page" style="min-height:260px;">
        <div class="placeholder-icon">📋</div>
        <h3>${cu.role === 'Member' ? 'لا توجد مهام مُعيَّنة لك بعد' : 'لا توجد مهام بعد'}</h3>
        <p>${cu.role === 'Member'
          ? 'ستظهر مهامك هنا عندما يُعيَّن إليك شيء من قِبل قائد الفريق'
          : 'ابدأ بإنشاء مهمة جديدة للفريق'}</p>
        ${_canCreate(cu.role) ? `<button class="btn btn-primary" onclick="Tasks.openTaskModal()">+ مهمة جديدة</button>` : ''}
      </div>`;
    }
    return `
    <div class="kanban-board" id="kanban-board">
      ${STATUS_COLS.map(col => {
        const colTasks = tasks.filter(t => t.status === col.id);
        return `
        <div class="kanban-col" data-status="${col.id}"
          ondragover="event.preventDefault()"
          ondrop="Tasks._onDrop(event,'${col.id}')">
          <div class="kanban-col-header" style="border-color:${col.color};">
            <span>${col.icon} ${col.id}</span>
            <span class="badge" style="background:${col.bg};color:${col.color};">${colTasks.length}</span>
          </div>
          <div class="kanban-col-body" id="kc-${col.id.replace(/\s/g,'_')}">
            ${colTasks.length ? colTasks.map(t => _taskCard(t, cu)).join('') : `<div class="kanban-empty">لا توجد مهام</div>`}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  }

  function _taskCard(t, cu) {
    const pc         = PRIORITY_CFG[t.priority] || PRIORITY_CFG['متوسط'];
    const allUsers   = UserDB.getAll();
    const assignee   = allUsers.find(u => u.id === t.assignedTo);
    const ri         = assignee ? UserDB.getRoleInfo(assignee.role) : null;
    const canFull    = _canEditFull(t, cu);   // تعديل كامل
    const canStatus  = _canEditStatus(t, cu); // تغيير حالة فقط
    const isMember   = cu.role === 'Member';
    const isOverdue  = t.dueDate && new Date(t.dueDate) < new Date() && t.status !== 'مكتمل';
    const targetGroups = Array.isArray(t.targetGroups) ? t.targetGroups : (t.group ? [t.group] : []);
    const leaderNames  = targetGroups.map(g => {
      const gl = allUsers.find(u => u.role === 'Group Leader' && u.group === g && u.project === t.project);
      return gl ? gl.name : null;
    }).filter(Boolean);

    // أزرار الإجراءات — تظهر فقط للمستويات المخوّلة
    const actionsHTML = canFull ? `
      <div class="kt-actions">
        <button class="btn-icon" style="width:24px;height:24px;font-size:.7rem;"
          onclick="Tasks.openTaskModal('${t.id}')">✏️</button>
        ${['Project Leader','Assistant Project Leader'].includes(cu.role) ? `
        <button class="btn-icon" style="width:24px;height:24px;font-size:.7rem;color:var(--accent-secondary);"
          onclick="Tasks._deleteTask('${t.id}')">🗑</button>` : ''}
      </div>` : '';

    // Dropdown تغيير الحالة — للـ GL/APL/PL + Member على مهامهم فقط
    const memberCanUpdateOwn = isMember && (task.assignedTo === cu.id ||
      (Array.isArray(task.assignedMembers) && task.assignedMembers.includes(cu.id)));
    const statusDropdown = (canStatus && !isMember) || memberCanUpdateOwn ? `
      <select class="kt-status-sel" onchange="Tasks._memberUpdateStatus('${t.id}',this.value)">
        ${STATUSES.map(s => `<option value="${s}" ${t.status===s?'selected':''}>${s}</option>`).join('')}
      </select>` : '';

    return `
    <div class="kanban-task ${isOverdue ? 'kanban-task-overdue' : ''}"
         draggable="${canFull}"
         data-id="${t.id}"
         ondragstart="Tasks._onDragStart(event,'${t.id}')">
      <div class="kt-header">
        <span class="badge ${pc.cls}" style="font-size:.68rem;">${pc.icon} ${t.priority}</span>
        ${actionsHTML}
      </div>
      <div class="kt-title">${t.title}</div>
      ${t.description ? `<div class="kt-desc">${t.description.substring(0,80)}${t.description.length>80?'...':''}</div>` : ''}
      ${targetGroups.length > 1 ? `<div style="font-size:.7rem;color:var(--accent-primary);margin:.25rem 0;">👥 ${targetGroups.join(' · ')}</div>` : ''}
      ${leaderNames.length ? `<div style="font-size:.7rem;color:var(--accent-warning);margin-bottom:.2rem;">👑 ${leaderNames.join(' · ')}</div>` : ''}
      <div class="kt-meta">
        ${assignee ? `<div class="flex items-center gap-1">
          <div class="avatar" style="width:20px;height:20px;font-size:.6rem;background:linear-gradient(135deg,${ri?.color||'#6C63FF'},#8B7CFF);color:white;flex-shrink:0;">${assignee.name.charAt(0)}</div>
          <span style="font-size:.72rem;color:var(--text-secondary);">${assignee.name}</span>
        </div>` : ''}
        ${t.dueDate ? `<span style="font-size:.7rem;color:${isOverdue?'var(--accent-secondary)':'var(--text-muted)'};">📅 ${t.dueDate}</span>` : ''}
      </div>
      <div class="kt-footer">
        <span style="font-size:.68rem;color:var(--text-muted);">📁 ${t.project||'—'}</span>
        ${statusDropdown}
      </div>
    </div>`;
  }

  function _memberUpdateStatus(taskId, newStatus) {
    const cu = State.get('currentUser');
    if (updateStatus(taskId, newStatus, cu)) {
      Toast.show('✓ تم تحديث حالة المهمة', 'success');
      const c = document.getElementById('tasks-tab-content');
      if (c) c.innerHTML = _renderKanban(cu);
    }
  }

  let _dragId = null;
  function _onDragStart(e, id) { _dragId = id; e.dataTransfer.effectAllowed = 'move'; }
  function _onDrop(e, newStatus) {
    e.preventDefault();
    if (!_dragId) return;
    const cu = State.get('currentUser');
    if (updateStatus(_dragId, newStatus, cu)) {
      Toast.show(`✓ تم نقل المهمة إلى "${newStatus}"`, 'success');
      const c = document.getElementById('tasks-tab-content');
      if (c) c.innerHTML = _renderKanban(cu);
    }
    _dragId = null;
  }
  function _deleteTask(id) {
    const cu = State.get('currentUser');
    const task = _load().find(t => t.id === id);
    if (!task) return;
    // Member لا يحذف أبداً
    if (cu.role === 'Member') { Toast.show('⛔ لا يمكنك حذف المهام', 'error'); return; }
    // GL: يحذف فقط مهامه
    if (cu.role === 'Group Leader' && task.createdBy !== cu.id) {
      Toast.show('⛔ يمكنك حذف مهامك فقط', 'error'); return;
    }
    // Supervisor: read-only
    if (cu.role === 'Supervisor') { Toast.show('⛔ المشرف بصلاحيات قراءة فقط', 'error'); return; }
    // APL: يحذف كل المهام (لا قيد)
    if (!confirm('حذف هذه المهمة؟')) return;
    deleteTask(id);
    Toast.show('تم حذف المهمة', 'info');
    const c = document.getElementById('tasks-tab-content');
    if (c) c.innerHTML = _renderKanban(cu);
  }

  // ── PART 3 & 4: Quick Tasks ───────────────────
  function _renderQuickTasks(cu) {
    const role = cu.role;
    const list = _visibleQT(cu);
    const canCreate = _canCreateQT(role);
    const isGL = role === 'Group Leader';
    const isSV = role === 'Supervisor';
    const isMember = role === 'Member';
    const allUsers = UserDB.getAll();

    const subLabel = isSV ? 'عرض للقراءة فقط'
                   : isMember ? 'مهامك السريعة المُعيَّنة لك'
                   : '';

    const canManage = _canCreateQT(role); // PL + APL فقط
    return `
    <div>
      <div class="flex items-center justify-between" style="margin-bottom:1rem;">
        <div>
          <h4>⚡ المهام السريعة</h4>
          ${subLabel ? `<p style="font-size:.78rem;color:var(--text-muted);margin-top:.2rem;">${subLabel}</p>` : ''}
        </div>
        ${canManage ? `<button class="btn btn-primary" onclick="Tasks.openQTModal()">+ إضافة</button>` : ''}
      </div>
      ${list.length === 0
        ? `<div class="placeholder-page" style="min-height:200px;">
            <div class="placeholder-icon">⚡</div>
            <h3>لا توجد مهام سريعة</h3>
            ${canManage ? `<button class="btn btn-primary" onclick="Tasks.openQTModal()">+ أضف مهمة سريعة</button>` : ''}
          </div>`
        : `<div class="qt-list">
            ${list.map(qt => {
              const memberIds = Array.isArray(qt.assignedMemberIds) ? qt.assignedMemberIds : (qt.assignedTo ? [qt.assignedTo] : []);
              const memberNames = memberIds.map(id => allUsers.find(u => u.id === id)?.name).filter(Boolean);
              const relGroups = Array.isArray(qt.relatedGroups) ? qt.relatedGroups : [];
              const canEditThis = _canEditQT(qt, cu);
              return `
              <div class="qt-card">
                <div style="display:flex;align-items:flex-start;gap:.75rem;">
                  <div style="flex:1;min-width:0;">
                    <div style="font-weight:600;font-size:.875rem;${qt.status==='done'?'text-decoration:line-through;color:var(--text-muted);':''}">${qt.title}</div>
                    ${qt.description ? `<div style="font-size:.75rem;color:var(--text-secondary);margin:.2rem 0;">${qt.description}</div>` : ''}
                    <div style="font-size:.72rem;color:var(--text-muted);margin-top:.25rem;display:flex;flex-wrap:wrap;gap:.4rem;">
                      ${memberNames.length ? `<span>👤 ${memberNames.join('، ')}</span>` : ''}
                      ${relGroups.length ? `<span>👥 ${relGroups.join(' · ')}</span>` : ''}
                      ${qt.dueDate ? `<span>📅 ${qt.dueDate}</span>` : ''}
                    </div>
                  </div>
                  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.4rem;flex-shrink:0;">
                    <span class="badge ${qt.status==='done'?'badge-success':'badge-warning'}">${qt.status==='done'?'مكتمل':'قيد التنفيذ'}</span>
                    ${canEditThis ? `<div class="flex gap-1">
                      <button class="btn-icon" style="font-size:.8rem;" onclick="Tasks._toggleQT('${qt.id}')">${qt.status==='done'?'↩️':'✓'}</button>
                      <button class="btn-icon" style="font-size:.8rem;color:var(--accent-secondary);" onclick="Tasks._deleteQT('${qt.id}')">🗑</button>
                    </div>` : ''}
                  </div>
                </div>
              </div>`;
            }).join('')}
          </div>`}
    </div>`;
  }

  function _toggleQT(id) {
    const list = _loadQT();
    const qt = list.find(t => t.id === id);
    if (!qt) return;
    qt.status = qt.status === 'done' ? 'pending' : 'done';
    _saveQT(list);
    const c = document.getElementById('tasks-tab-content');
    if (c) c.innerHTML = _renderQuickTasks(State.get('currentUser'));
  }
  function _deleteQT(id) {
    if (!confirm('حذف هذه المهمة السريعة؟')) return;
    deleteQT(id);
    const c = document.getElementById('tasks-tab-content');
    if (c) c.innerHTML = _renderQuickTasks(State.get('currentUser'));
  }

  // ══════════════════════════════════════════════
  //  PART 5 & 6: Enhanced Task Creation Modal
  // ══════════════════════════════════════════════
  function openTaskModal(editId) {
    const cu = State.get('currentUser');
    if (!_canCreate(cu.role)) { Toast.show('⛔ ليس لديك صلاحية لإنشاء مهام', 'error'); return; }
    // GL: يمكنه تعديل مهامه فقط
    if (editId && cu.role === 'Group Leader') {
      const task = _load().find(t => t.id === editId);
      if (task && task.createdBy !== cu.id) {
        Toast.show('⛔ يمكنك تغيير الحالة فقط من الـ Dropdown — لا يمكنك تعديل مهمة أنشأها غيرك', 'error');
        return;
      }
    }

    const ex = editId ? _load().find(t => t.id === editId) : null;
    const projects = UserDB.getProjects();
    const initProj = ex?.project || cu.project || '';
    // For Group Leader: restrict to own group only
    const isGL = cu.role === 'Group Leader';
    const groupsForProj = initProj ? UserDB.getGroupsFor(initProj) : [];
    const initGroups = ex?.targetGroups || (isGL ? [cu.group] : []);

    const modal = document.createElement('div');
    modal.className = 'um-modal-bg';
    modal.id = 'task-modal';
    modal.innerHTML = `
    <div class="um-modal" style="max-width:560px;max-height:90vh;overflow-y:auto;">
      <h4>${ex ? '✏️ تعديل المهمة' : '➕ مهمة جديدة'}</h4>

      <div class="form-group">
        <label>عنوان المهمة *</label>
        <input class="form-control" id="tk-title" placeholder="عنوان المهمة" value="${ex?.title||''}">
      </div>
      <div class="form-group">
        <label>الوصف</label>
        <textarea class="form-control" id="tk-desc" rows="2" placeholder="وصف المهمة..." style="resize:vertical;">${ex?.description||''}</textarea>
      </div>

      <div class="tr-two-col">
        <div class="form-group">
          <label>الأولوية</label>
          <select class="form-control" id="tk-priority">
            ${PRIORITIES.map(p => `<option ${(ex?.priority||'متوسط')===p?'selected':''}>${p}</option>`).join('')}
          </select>
        </div>
        <div class="form-group">
          <label>الحالة</label>
          <select class="form-control" id="tk-status">
            ${STATUSES.map(s => `<option ${(ex?.status||'جديد')===s?'selected':''}>${s}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>تاريخ التسليم</label>
        <input class="form-control" id="tk-due" type="date" value="${ex?.dueDate||''}">
      </div>

      ${!isGL ? `
      <div class="form-group">
        <label>المشروع</label>
        <select class="form-control" id="tk-project" onchange="Tasks._onProjChange(this.value)">
          <option value="">— اختر —</option>
          ${Object.keys(projects).map(p => `<option value="${p}" ${initProj===p?'selected':''}>${p}</option>`).join('')}
        </select>
      </div>` : `<input type="hidden" id="tk-project" value="${cu.project||''}">`}

      <!-- PART 5: Multi-group selector -->
      <div class="form-group" id="tk-groups-wrap">
        <label>المجموعات المستهدفة ${isGL ? '(مجموعتك فقط)' : ''}</label>
        <div id="tk-groups-list" style="display:flex;flex-wrap:wrap;gap:.5rem;padding:.5rem;background:var(--bg-base);border-radius:var(--radius-sm);border:1.5px solid var(--border-medium);min-height:44px;">
          ${_buildGroupCheckboxes(groupsForProj, initGroups, isGL)}
        </div>
      </div>

      <!-- PART 5: Group info preview -->
      <div id="tk-group-preview" style="margin-bottom:.75rem;">${_buildGroupPreview(initGroups, initProj)}</div>

      <div id="tk-error" class="auth-error" style="display:none;"></div>
      <div class="um-modal-footer" style="justify-content:space-between;">
        <button class="btn btn-secondary" onclick="Tasks.closeModal()">إلغاء</button>
        <button class="btn btn-primary" onclick="Tasks._showTaskSummary('${editId||''}')">
          ${ex ? '💾 حفظ' : '📋 مراجعة وتأكيد'}
        </button>
      </div>
    </div>`;

    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
    document.body.appendChild(modal);

  }

  function _buildGroupCheckboxes(groups, selected, disabled) {
    if (!groups.length) return `<span style="font-size:.8rem;color:var(--text-muted);padding:.25rem;">اختر مشروعاً أولاً</span>`;
    return groups.map(g => {
      const checked = selected.includes(g);
      const dis = disabled ? 'disabled' : '';
      return `<label style="display:flex;align-items:center;gap:.35rem;font-size:.82rem;cursor:${disabled?'default':'pointer'};
        padding:.3rem .6rem;border-radius:var(--radius-sm);border:1.5px solid ${checked?'var(--accent-primary)':'var(--border-medium)'};
        background:${checked?'rgba(108,99,255,.1)':'var(--bg-surface)'};transition:all .15s;">
        <input type="checkbox" value="${g}" ${checked?'checked':''} ${dis}
          style="accent-color:var(--accent-primary);"
          onchange="Tasks._onGroupToggle()">
        👥 ${g}
      </label>`;
    }).join('');
  }

  function _buildGroupPreview(groups, project) {
    if (!groups.length || !project) return '';
    const allUsers = UserDB.getAll();
    const rows = groups.map(g => {
      const leader  = allUsers.find(u => u.role === 'Group Leader' && u.group === g && u.project === project);
      const members = allUsers.filter(u => u.group === g && u.project === project && u.role === 'Member');
      return `<div style="display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;background:var(--bg-elevated);border-radius:var(--radius-sm);border:1px solid var(--border-subtle);">
        <span style="font-size:.9rem;">👥</span>
        <div style="flex:1;">
          <div style="font-size:.82rem;font-weight:700;color:var(--text-primary);">${g}</div>
          <div style="font-size:.72rem;color:var(--text-muted);">
            👑 قائد: ${leader ? leader.name : '—'} &nbsp;·&nbsp; 👤 أعضاء: ${members.length}
          </div>
        </div>
      </div>`;
    }).join('');
    return `<div style="display:flex;flex-direction:column;gap:.4rem;">${rows}</div>`;
  }

  function _onProjChange(proj) {
    const groups = UserDB.getGroupsFor(proj);
    const wrap = document.getElementById('tk-groups-list');
    if (wrap) wrap.innerHTML = _buildGroupCheckboxes(groups, [], false);
    const preview = document.getElementById('tk-group-preview');
    if (preview) preview.innerHTML = '';
  }

  function _onGroupToggle() {
    const proj = document.getElementById('tk-project')?.value;
    const checked = _getSelectedGroups();
    const preview = document.getElementById('tk-group-preview');
    if (preview) preview.innerHTML = _buildGroupPreview(checked, proj);
  }

  function _getSelectedGroups() {
    const checkboxes = document.querySelectorAll('#tk-groups-list input[type=checkbox]');
    return Array.from(checkboxes).filter(c => c.checked).map(c => c.value);
  }

  // PART 6: Confirmation summary — store form data before showing summary
  let _pendingTask = null;

  function _showTaskSummary(editId) {
    const title    = document.getElementById('tk-title')?.value?.trim();
    const desc     = document.getElementById('tk-desc')?.value?.trim();
    const priority = document.getElementById('tk-priority')?.value;
    const status   = document.getElementById('tk-status')?.value;
    const dueDate  = document.getElementById('tk-due')?.value;
    const project  = document.getElementById('tk-project')?.value;
    const groups   = _getSelectedGroups();
    const errEl    = document.getElementById('tk-error');
    const cu       = State.get('currentUser');

    if (!title) {
      if (errEl) { errEl.textContent = 'يرجى إدخال عنوان المهمة'; errEl.style.display = 'block'; }
      return;
    }

    // Snapshot all data NOW while form is still in DOM
    const effectiveGroups = groups.length > 0 ? groups : (cu.group ? [cu.group] : []);
    const allUsers = UserDB.getAll();
    const assignedMembers = allUsers
      .filter(u => effectiveGroups.includes(u.group) && u.project === project && u.role === 'Member')
      .map(u => u.id);
    const leaders = effectiveGroups.map(g =>
      allUsers.find(u => u.role === 'Group Leader' && u.group === g && u.project === project)?.name
    ).filter(Boolean);
    const memberCount = effectiveGroups.reduce((sum, g) =>
      sum + allUsers.filter(u => u.group === g && u.project === project && u.role === 'Member').length, 0);

    _pendingTask = {
      id: editId || null, title, description: desc, priority, status,
      dueDate, project,
      group: effectiveGroups[0] || '',
      targetGroups: effectiveGroups,
      assignedTo: null,
      assignedMembers,
      createdBy: cu.id,
    };

    if (!editId) {
      // Show confirmation summary modal
      const summaryModal = document.createElement('div');
      summaryModal.className = 'um-modal-bg';

const Meetings = (() => {

  // ── Phase 2.2 Part 2: Action Items ────────────
  const AI_PRIORITIES = ['منخفض','متوسط','عالي'];
  const AI_STATUSES   = ['جديد','قيد التنفيذ','مكتمل'];
  const AI_STATUS_CFG = {
    'جديد':         { icon: '📋', cls: 'badge-primary' },
    'قيد التنفيذ':  { icon: '⏳', cls: 'badge-warning' },
    'مكتمل':        { icon: '✅', cls: 'badge-success' },
  };
  const AI_PRIORITY_CFG = {
    'منخفض': { cls: 'badge-info',    icon: '🔵' },
    'متوسط': { cls: 'badge-warning', icon: '🟡' },
    'عالي':  { cls: 'badge-danger',  icon: '🔴' },

  const RECUR_TYPES = [
    { id: 'none',    label: 'بدون تكرار' },
    { id: 'weekly',  label: 'أسبوعي' },
    { id: 'monthly', label: 'شهري' },
    { id: 'custom',  label: 'مخصص (عدد أيام)' },
  ];

  // ── Attachments ─────────────────────────────────
  const ATTACH_ACCEPT = '.pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png';

  // ── Storage ──────────────────────────────────
  function _load()        { try { return JSON.parse(localStorage.getItem(STORE_KEY))  || []; } catch(e) { return []; } }
  function _save(d)       { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }
  function _loadAtt()     { try { return JSON.parse(localStorage.getItem(ATT_KEY))    || []; } catch(e) { return []; } }
  function _saveAtt(d)    { localStorage.setItem(ATT_KEY, JSON.stringify(d)); }

  function getAll()       { return _load(); }
  function getAttAll()    { return _loadAtt(); }

  // ── Helpers: fetch single meeting fresh ───────
  function _getMeeting(id) { return _load().find(m => m.id === id); }
  function _fmtFileSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
    return (b/1048576).toFixed(1) + ' MB';
  }

  // ── Auto-compute meeting status ───────────────
  function _computeStatus(m) {
    if (m.status === 'cancelled') return 'cancelled';
    const now  = new Date();
    const date = new Date(`${m.date}T${m.time || '00:00'}`);
    const end  = new Date(date.getTime() + 90 * 60000); // assume 90 min duration
    if (now < date)  return 'upcoming';
    if (now > end)   return 'completed';
    return 'ongoing';
  }

  // ── RBAC helpers ─────────────────────────────
  function _canCreate(cu) {
    return ['Project Leader','Assistant Project Leader','Group Leader'].includes(cu.role);
  }
  function _canEdit(meeting, cu) {
    const r = cu.role;
    if (r === 'Project Leader') return true;
    if (r === 'Assistant Project Leader') return true;
    if (r === 'Group Leader') return meeting.createdBy === cu.id;
    return false;
  }

  // ── Is this meeting "owned" by a Group Leader? ─
  // A meeting is GL-owned only if it was created by a Group Leader
  // (for their own team/group). Meetings created by PL/APL are always
  // managed exclusively by PL/APL, even if they target a specific group.
  function _isGLOwnedMeeting(meeting) {
    const creator = UserDB.findById(meeting.createdBy);
    return !!creator && creator.role === 'Group Leader';
  }

  // ── Attendance recording permissions ──────────
  // Project Leader / Assistant Project Leader: always full control.
  // Group Leader: full control ONLY for meetings THEY created for their
  // own group. For meetings created by PL/APL, Group Leaders get
  // read-only access (view attendance for their group members only).
  function _canRecordAttendance(meeting, cu) {
    const r = cu.role;
    if (r === 'Project Leader' || r === 'Assistant Project Leader') return true;
    if (r === 'Group Leader') {
      if (meeting.createdBy !== cu.id) return false; // not their own meeting -> read-only
      const targetGroups = Array.isArray(meeting.targetGroups) ? meeting.targetGroups : (meeting.targetGroup ? [meeting.targetGroup] : []);
      return targetGroups.includes(cu.group);
    }
    return false;
  }
  function _canDelete(meeting, cu) {
    return cu.role === 'Project Leader';
  }

  // ── Minutes permissions ───────────────────────
  // Same rule as attendance: PL/APL always; Group Leader only for
  // meetings they personally created.
  function _canEditMinutes(meeting, cu) {
    const r = cu.role;
    if (r === 'Project Leader' || r === 'Assistant Project Leader') return true;
    if (r === 'Group Leader') return meeting.createdBy === cu.id;
    return false;
  }

  // ── Action item permissions ───────────────────
  // Same ownership model: PL/APL always manage; Group Leader only for
  // meetings they personally created (their own team meetings).
  function _canManageActions(meeting, cu) {
    return _canEdit(meeting, cu);
  }
  function _canUpdateActionStatus(meeting, action, cu) {
    if (_canManageActions(meeting, cu)) return true;
    // Member: only assigned action items
    if (cu.role === 'Member') {
      return Array.isArray(action.assignedTo) ? action.assignedTo.includes(cu.id) : action.assignedTo === cu.id;
    }
    return false;
  }

  // ── Supervisor feedback permissions ───────────
  function _canAddFeedback(cu) { return cu.role === 'Supervisor'; }

  // ── Attachments permissions ───────────────────
  function _canManageAttachments(meeting, cu) { return _canEdit(meeting, cu); }

  // ── Visibility scoping ────────────────────────
  function _visibleMeetings(cu) {
    const all  = _load();
    const role = cu.role;
    if (role === 'Project Leader' || role === 'Assistant Project Leader' || role === 'Supervisor')
      return all;
    if (role === 'Group Leader') {
      return all.filter(m => {
        if (m.targetScope === 'system') return true;
        if (m.targetScope === 'project' && m.targetProject === cu.project) return true;
        const tg = Array.isArray(m.targetGroups) ? m.targetGroups : (m.targetGroup ? [m.targetGroup] : []);
        return m.targetProject === cu.project && tg.includes(cu.group);
      });
    }
    // Member: sees meetings targeting their group
    return all.filter(m => {
      if (m.targetScope === 'system') return true;
      if (m.targetScope === 'project' && m.targetProject === cu.project) return true;
      const tg = Array.isArray(m.targetGroups) ? m.targetGroups : (m.targetGroup ? [m.targetGroup] : []);
      return m.targetProject === cu.project && tg.includes(cu.group);
    });
  }

  // ── Get attendees for a meeting ───────────────
  // ── Get attendees for a meeting (full list, for notifications etc.) ─
  function _getAttendees(meeting) {
    const allUsers = UserDB.getAll();
    const scope    = meeting.targetScope;
    const proj     = meeting.targetProject;
    const tg       = Array.isArray(meeting.targetGroups) ? meeting.targetGroups : (meeting.targetGroup ? [meeting.targetGroup] : []);

    if (scope === 'system')  return allUsers.filter(u => u.status === 'active' && u.role === 'Member');
    if (scope === 'project') return allUsers.filter(u => u.status === 'active' && u.project === proj && u.role === 'Member');
    return allUsers.filter(u => u.status === 'active' && u.role === 'Member' && u.project === proj && tg.includes(u.group));
  }

  // ── Get attendees scoped to the viewing user (for attendance display) ─
  // Project Leader / Assistant Project Leader / Supervisor: see all attendees of the meeting.
  // Group Leader: see ONLY members of their own assigned group (never other groups).
  // Member: see only their own group's attendee list (read-only context).
  function _getAttendeesForViewer(meeting, cu) {
    const allAttendees = _getAttendees(meeting);
    if (!cu) return allAttendees;
    const role = cu.role;
    if (role === 'Project Leader' || role === 'Assistant Project Leader' || role === 'Supervisor') {
      return allAttendees;
    }
    if (role === 'Group Leader' || role === 'Member') {
      // Strictly filter to members belonging to the viewer's own group + project
      return allAttendees.filter(u => u.project === cu.project && u.group === cu.group);
    }
    return allAttendees;
  }

  // ── Save / update meeting ─────────────────────
  function saveMeeting(data, cu) {
    const list = _load();
    const isNew = !data.id;
    if (!isNew) {
      const i = list.findIndex(m => m.id === data.id);
      if (i > -1) {
        list[i] = { ...list[i], ...data, updatedAt: new Date().toISOString() };
        _save(list);
        // Notify + log
        _notifyMeeting(list[i], cu, 'updated');
        ActivityLog.add({ type:'meeting', text:`تم تعديل اجتماع "${data.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
      }
      return list[i];
    } else {
      const meeting = {
        ...data,
        id: 'm_' + Date.now(),
        createdBy: cu.id,
        createdByName: cu.name,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        status: 'upcoming',
        notes: [], comments: [], attachments: data.attachments || [],
        minutes: data.minutes || null,
        actionItems: data.actionItems || [],
        feedback: data.feedback || [],
        recurrence: data.recurrence || { type: 'none' },
        generatedFrom: data.generatedFrom || null,
      };
      list.push(meeting);
      _save(list);
      _notifyMeeting(meeting, cu, 'created');
      ActivityLog.add({ type:'meeting', text:`تمت إضافة اجتماع "${data.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });

      // Recurring meeting: auto-generate next occurrence notification
      if (meeting.recurrence && meeting.recurrence.type !== 'none') {
        ActivityLog.add({ type:'meeting', text:`تم تفعيل التكرار (${_recurLabel(meeting.recurrence)}) للاجتماع "${meeting.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
      }
      return meeting;
    }
  }

  // ── Recurrence helpers ────────────────────────
  function _recurLabel(rec) {
    if (!rec || rec.type === 'none') return 'بدون تكرار';
    if (rec.type === 'weekly')  return 'أسبوعي';
    if (rec.type === 'monthly') return 'شهري';
    if (rec.type === 'custom')  return `كل ${rec.intervalDays || 1} يوم`;
    return '—';
  }

  function _nextOccurrenceDate(meeting) {
    const rec = meeting.recurrence;
    if (!rec || rec.type === 'none') return null;
    const cur = new Date(`${meeting.date}T${meeting.time || '00:00'}`);
    let next = new Date(cur);
    if (rec.type === 'weekly')  next.setDate(next.getDate() + 7);
    else if (rec.type === 'monthly') next.setMonth(next.getMonth() + 1);
    else if (rec.type === 'custom')  next.setDate(next.getDate() + (parseInt(rec.intervalDays) || 1));
    else return null;
    return next;
  }

  // ── Generate the next occurrence of a recurring meeting ─
  function generateNextOccurrence(meetingId, cu) {
    const list = _load();
    const meeting = list.find(m => m.id === meetingId);
    if (!meeting) return;
    if (!meeting.recurrence || meeting.recurrence.type === 'none') {
      Toast.show('هذا الاجتماع غير مكرر', 'info');
      return;
    }
    const next = _nextOccurrenceDate(meeting);
    if (!next) return;

    const newMeeting = {
      ...meeting,
      id: 'm_' + Date.now(),
      date: next.toISOString().slice(0,10),
      status: 'upcoming',
      notes: [], comments: [], attachments: [],
      minutes: null, actionItems: [], feedback: [],
      generatedFrom: meeting.id,
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString(),
    };
    list.push(newMeeting);
    meeting.nextGenerated = true;
    _save(list);
    _notifyMeeting(newMeeting, cu, 'created');
    Notif.add({ type:'meeting_recurring', title:'اجتماع متكرر جديد', body:`📅 "${newMeeting.title}" — ${newMeeting.date}`, userId: cu.id, relatedId: newMeeting.id });
    ActivityLog.add({ type:'meeting', text:`تم إنشاء الاجتماع التالي المتكرر "${newMeeting.title}" (${newMeeting.date})`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
    Toast.show(`✓ تم إنشاء الاجتماع القادم في ${newMeeting.date}`, 'success');
    const c = document.getElementById('page-content');
    if (c) c.innerHTML = Meetings.renderPage();
  }

  function cancelMeeting(id, cu) {
    const list = _load();
    const m = list.find(x => x.id === id);
    if (!m || !_canDelete(m, cu)) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }
    m.status = 'cancelled';
    m.updatedAt = new Date().toISOString();
    _save(list);
    _notifyMeeting(m, cu, 'cancelled');
    ActivityLog.add({ type:'meeting', text:`تم إلغاء اجتماع "${m.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
    Toast.show('تم إلغاء الاجتماع', 'info');
    const c = document.getElementById('page-content');
    if (c) c.innerHTML = Meetings.renderPage();
  }

  function deleteMeeting(id, cu) {
    if (!confirm('حذف هذا الاجتماع نهائياً؟')) return;
    _save(_load().filter(m => m.id !== id));
    // Also delete attendance records
    _saveAtt(_loadAtt().filter(a => a.meetingId !== id));
    Toast.show('تم حذف الاجتماع', 'info');
    ActivityLog.add({ type:'meeting', text:`تم حذف اجتماع`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
    const c = document.getElementById('page-content');
    if (c) c.innerHTML = Meetings.renderPage();
  }

  // ── Notify relevant users about meeting ───────
  function _notifyMeeting(meeting, cu, action) {
    const attendees = _getAttendees(meeting);
    const msgs = {
      created:   `📅 اجتماع جديد: "${meeting.title}" — ${meeting.date} ${meeting.time||''}`,
      updated:   `✏️ تم تعديل الاجتماع: "${meeting.title}"`,
      cancelled: `❌ تم إلغاء الاجتماع: "${meeting.title}"`,
    };
    const title = { created:'اجتماع جديد', updated:'تعديل اجتماع', cancelled:'إلغاء اجتماع' }[action];
    attendees.forEach(u => {
      if (u.id !== cu.id)
        Notif.add({ type:`meeting_${action}`, title, body: msgs[action], userId: u.id, relatedId: meeting.id });
    });
    // Also notify GLs of targeted groups
    const tg = Array.isArray(meeting.targetGroups) ? meeting.targetGroups : (meeting.targetGroup ? [meeting.targetGroup] : []);
    UserDB.getAll().filter(u => u.role === 'Group Leader' && tg.includes(u.group)).forEach(gl => {
      if (gl.id !== cu.id)
        Notif.add({ type:`meeting_${action}`, title, body: msgs[action], userId: gl.id, relatedId: meeting.id });
    });
  }

  // ── Save / update attendance ──────────────────
  function saveAttendance({ meetingId, memberId, status, excuse, cu }) {
    // Permission check using actual meeting data
    const meeting = _load().find(m => m.id === meetingId);
    if (!meeting || !_canRecordAttendance(meeting, cu)) {
      Toast.show('⛔ ليس لديك صلاحية لتسجيل الحضور', 'error');
      return;
    }
    const list    = _loadAtt();
    const existing = list.find(a => a.meetingId === meetingId && a.memberId === memberId);
    const member  = UserDB.findById(memberId);
    if (existing) {
      existing.status     = status;
      existing.excuse     = excuse !== undefined ? (excuse || '') : (existing.excuse || '');
      existing.recordedAt = new Date().toISOString();
      existing.recordedBy = cu.id;
    } else {
      list.push({
        id: 'att_' + Date.now(),
        meetingId, memberId, status,
        excuse: excuse || '',
        recordedBy: cu.id,
        recordedAt: new Date().toISOString(),
      });
    }
    _saveAtt(list);
    ActivityLog.add({
      type: 'attendance',
      text: `تم تسجيل ${status} للعضو ${member?.name||''}${excuse ? ' — ' + excuse : ''}`,
      userId: cu.id, userName: cu.name, avatar: cu.avatar,
    });
  }

  function getAttendanceForMeeting(meetingId) {
    return _loadAtt().filter(a => a.meetingId === meetingId);
  }

  // ══════════════════════════════════════════════
  //  PART 2 — ACTION ITEMS
  // ══════════════════════════════════════════════
  function saveActionItem(meetingId, data, cu) {
    const list = _load();
    const meeting = list.find(m => m.id === meetingId);
    if (!meeting) return null;
    if (!_canManageActions(meeting, cu)) { Toast.show('⛔ ليس لديك صلاحية لإضافة عناصر إجراء', 'error'); return null; }

    if (!Array.isArray(meeting.actionItems)) meeting.actionItems = [];

    let item;
    if (data.id) {
      item = meeting.actionItems.find(a => a.id === data.id);
      if (!item) return null;
      Object.assign(item, data, { updatedAt: new Date().toISOString() });
      ActivityLog.add({ type:'meeting', text:`تم تعديل عنصر إجراء "${item.title}" في اجتماع "${meeting.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
      // Notify newly assigned members about update
      (Array.isArray(item.assignedTo) ? item.assignedTo : [item.assignedTo]).filter(Boolean).forEach(uid => {
        if (uid !== cu.id)
          Notif.add({ type:'action_item_updated', title:'تحديث عنصر إجراء', body:`✏️ "${item.title}"`, userId: uid, relatedId: meeting.id });
      });
    } else {
      item = {
        id: 'ai_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
        title: data.title, description: data.description || '',
        assignedTo: data.assignedTo || [],
        dueDate: data.dueDate || '',
        priority: data.priority || 'متوسط',
        status: 'جديد',
        createdBy: cu.id,
        createdAt: new Date().toISOString(),
        taskId: null,
      };
      meeting.actionItems.push(item);
      ActivityLog.add({ type:'meeting', text:`تمت إضافة عنصر إجراء "${item.title}" في اجتماع "${meeting.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
      // Notify assigned members
      (Array.isArray(item.assignedTo) ? item.assignedTo : [item.assignedTo]).filter(Boolean).forEach(uid => {
        Notif.add({ type:'action_item_assigned', title:'تم تعيين عنصر إجراء لك', body:`📌 "${item.title}" — ${meeting.title}`, userId: uid, relatedId: meeting.id });
      });

    meeting.updatedAt = new Date().toISOString();
    _save(list);

    if (!_canManageActions(meeting, cu)) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return false; }

  // ── Convert Action Item → Task ────────────────
  function convertActionToTask(meetingId, actionId, cu) {
    const list = _load();
    const meeting = list.find(m => m.id === meetingId);
    if (!meeting) return;
    if (!_canManageActions(meeting, cu)) { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }
    const item = (meeting.actionItems || []).find(a => a.id === actionId);
    if (!item) return;
    if (item.taskId) { Toast.show('تم تحويل هذا العنصر إلى مهمة مسبقاً', 'warning'); return; }
    if (typeof Tasks === 'undefined') { Toast.show('⛔ نظام المهام غير متاح', 'error'); return; }

    const assignees = Array.isArray(item.assignedTo) ? item.assignedTo : [item.assignedTo].filter(Boolean);
    const tg = Array.isArray(meeting.targetGroups) ? meeting.targetGroups : (meeting.targetGroup ? [meeting.targetGroup] : []);

    const newTask = Tasks.saveTask({
      title: item.title,
      description: item.description ? `${item.description}\n\n(منشأة من اجتماع: ${meeting.title})` : `منشأة من اجتماع: ${meeting.title}`,
      priority: item.priority || 'متوسط',
      status: 'جديد',
      dueDate: item.dueDate || '',
      project: meeting.targetProject || cu.project || '',
      group: tg[0] || '',
      targetGroups: tg,
      assignedTo: assignees[0] || null,
      assignedMembers: assignees,
      createdBy: cu.id,
      sourceMeetingId: meeting.id,
      sourceActionId: item.id,
    });

    item.taskId = newTask?.id || null;
    meeting.updatedAt = new Date().toISOString();
    _save(list);

    ActivityLog.add({ type:'task', text:`تم إنشاء مهمة "${item.title}" من اجتماع "${meeting.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });
    assignees.forEach(uid => {
      Notif.add({ type:'task_from_meeting', title:'مهمة جديدة من اجتماع', body:`📋 "${item.title}"`, userId: uid, relatedId: newTask?.id });
    });
    Toast.show('✓ تم إنشاء مهمة من عنصر الإجراء', 'success');
  }

  // ══════════════════════════════════════════════
  //  PART 2 — SUPERVISOR FEEDBACK
  // ══════════════════════════════════════════════
  function addFeedback(meetingId, data, cu) {
    const list = _load();
    const meeting = list.find(m => m.id === meetingId);
    if (!meeting) return;
    if (!_canAddFeedback(cu)) { Toast.show('⛔ هذه الميزة للمشرف الأكاديمي فقط', 'error'); return; }

    if (!Array.isArray(meeting.feedback)) meeting.feedback = [];
    const entry = {
      id: 'fb_' + Date.now(),
      type: data.type || 'comment', // comment | recommendation | evaluation
      text: data.text || '',
      authorId: cu.id,
      authorName: cu.name,
      createdAt: new Date().toISOString(),
    };
    meeting.feedback.push(entry);
    meeting.updatedAt = new Date().toISOString();
    _save(list);

    ActivityLog.add({ type:'meeting', text:`أضاف المشرف ${cu.name} ملاحظة على اجتماع "${meeting.title}"`, userId:cu.id, userName:cu.name, avatar:cu.avatar });

    // Notify creator + group leaders of target groups
    const recipients = new Set();
    if (meeting.createdBy) recipients.add(meeting.createdBy);
    const tg = Array.isArray(meeting.targetGroups) ? meeting.targetGroups : (meeting.targetGroup ? [meeting.targetGroup] : []);
    UserDB.getAll().filter(u => u.role === 'Group Leader' && tg.includes(u.group)).forEach(gl => recipients.add(gl.id));
    recipients.forEach(uid => {
      if (uid !== cu.id)
        Notif.add({ type:'supervisor_feedback', title:'ملاحظة من المشرف', body:`🔭 "${meeting.title}"`, userId: uid, relatedId: meeting.id });
    });
    Toast.show('✓ تمت إضافة الملاحظة', 'success');
  }

  function deleteFeedback(meetingId, feedbackId, cu) {
    const list = _load();
    const meeting = list.find(m => m.id === meetingId);
    if (!meeting) return;
    if (cu.role !== 'Supervisor' && cu.role !== 'Project Leader') { Toast.show('⛔ ليس لديك صلاحية', 'error'); return; }
    const entry = (meeting.feedback || []).find(f => f.id === feedbackId);
    if (entry && cu.role === 'Supervisor' && entry.authorId !== cu.id) { Toast.show('⛔ يمكنك حذف ملاحظاتك فقط', 'error'); return; }
    meeting.feedback = (meeting.feedback || []).filter(f => f.id !== feedbackId);
    meeting.updatedAt = new Date().toISOString();
    _save(list);
  }

  // ══════════════════════════════════════════════
