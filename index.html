<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GPMS — نظام إدارة مشاريع التخرج</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
/* ============================================
   GPMS - Graduation Project Management System
   style.css - Core styles, variables, themes
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Tajawal:wght@300;400;500;700;800&display=swap');

/* ─── CSS Variables ─────────────────────────── */
:root {
  /* Brand Colors */
  --accent-primary: #6C63FF;
  --accent-secondary: #FF6584;
  --accent-tertiary: #43E97B;
  --accent-warning: #F7971E;
  --accent-info: #38A1F3;

  /* Light Theme */
  --bg-base: #F0F2F8;
  --bg-surface: #FFFFFF;
  --bg-elevated: #FFFFFF;
  --bg-overlay: rgba(255,255,255,0.85);
  --bg-sidebar: #1A1D2E;
  --bg-sidebar-hover: rgba(108,99,255,0.15);
  --bg-sidebar-active: rgba(108,99,255,0.25);

  --text-primary: #1A1D2E;
  --text-secondary: #5A5E7A;
  --text-muted: #9299B8;
  --text-sidebar: #C8CCEA;
  --text-sidebar-active: #FFFFFF;
  --text-on-accent: #FFFFFF;

  --border-subtle: rgba(0,0,0,0.07);
  --border-medium: rgba(0,0,0,0.12);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
  --shadow-accent: 0 8px 30px rgba(108,99,255,0.25);

  /* Sidebar */
  --sidebar-width: 260px;
  --sidebar-collapsed: 72px;

  /* Topbar */
  --topbar-height: 64px;

  /* Transitions */
  --transition-fast: 0.15s ease;
  --transition-normal: 0.25s ease;
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --radius-full: 9999px;

  /* Font */
  --font-primary: 'Cairo', sans-serif;
  --font-display: 'Tajawal', sans-serif;
}

/* Dark Theme */
[data-theme="dark"] {
  --bg-base: #0F1117;
  --bg-surface: #1A1D2E;
  --bg-elevated: #222539;
  --bg-overlay: rgba(26, 29, 46, 0.92);
  --bg-sidebar: #12141F;
  --bg-sidebar-hover: rgba(108,99,255,0.12);
  --bg-sidebar-active: rgba(108,99,255,0.22);

  --text-primary: #E8EAF6;
  --text-secondary: #9299B8;
  --text-muted: #5A5E7A;
  --text-sidebar: #8B91B5;
  --text-sidebar-active: #FFFFFF;

  --border-subtle: rgba(255,255,255,0.05);
  --border-medium: rgba(255,255,255,0.1);

  --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.5);
}

/* ─── Reset & Base ───────────────────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  direction: rtl;
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: var(--font-primary);
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background var(--transition-normal), color var(--transition-normal);
}

/* ─── Typography ─────────────────────────────── */
h1, h2, h3, h4, h5, h6 {
  font-family: var(--font-display);
  font-weight: 700;
  line-height: 1.3;
  color: var(--text-primary);
}

h1 { font-size: clamp(1.6rem, 3vw, 2.2rem); }
h2 { font-size: clamp(1.3rem, 2.5vw, 1.7rem); }
h3 { font-size: clamp(1.1rem, 2vw, 1.3rem); }
h4 { font-size: 1.05rem; }

p { line-height: 1.7; color: var(--text-secondary); }

a { text-decoration: none; color: var(--accent-primary); transition: opacity var(--transition-fast); }
a:hover { opacity: 0.8; }

ul { list-style: none; }

/* ─── Scrollbar ──────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: var(--radius-full); }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* ─── Utility Classes ────────────────────────── */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.justify-center { justify-content: center; }
.gap-1 { gap: 0.25rem; }
.gap-2 { gap: 0.5rem; }
.gap-3 { gap: 0.75rem; }
.gap-4 { gap: 1rem; }
.gap-6 { gap: 1.5rem; }
.w-full { width: 100%; }
.h-full { height: 100%; }
.relative { position: relative; }
.absolute { position: absolute; }
.hidden { display: none !important; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.text-sm { font-size: 0.8rem; }
.text-xs { font-size: 0.72rem; }
.text-lg { font-size: 1.1rem; }
.text-xl { font-size: 1.25rem; }
.font-medium { font-weight: 500; }
.font-semibold { font-weight: 600; }
.font-bold { font-weight: 700; }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-accent { color: var(--accent-primary); }
.text-success { color: var(--accent-tertiary); }
.text-warning { color: var(--accent-warning); }
.text-danger { color: var(--accent-secondary); }

/* ─── Buttons ────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  padding: 0.55rem 1.25rem;
  border-radius: var(--radius-sm);
  font-family: var(--font-primary);
  font-size: 0.875rem;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all var(--transition-fast);
  white-space: nowrap;
  user-select: none;
}

.btn-primary {
  background: var(--accent-primary);
  color: white;
  box-shadow: var(--shadow-accent);
}
.btn-primary:hover {
  filter: brightness(1.1);
  transform: translateY(-1px);
  box-shadow: 0 12px 35px rgba(108,99,255,0.35);
}

.btn-secondary {
  background: var(--bg-elevated);
  color: var(--text-primary);
  border: 1px solid var(--border-medium);
}
.btn-secondary:hover {
  background: var(--bg-base);
  transform: translateY(-1px);
}

.btn-ghost {
  background: transparent;
  color: var(--text-secondary);
  padding: 0.5rem;
}
.btn-ghost:hover {
  background: var(--border-subtle);
  color: var(--text-primary);
}

.btn-icon {
  width: 36px;
  height: 36px;
  padding: 0;
  border-radius: var(--radius-sm);
  background: var(--bg-elevated);
  border: 1px solid var(--border-subtle);
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition-fast);
}
.btn-icon:hover {
  background: var(--bg-base);
  color: var(--text-primary);
  border-color: var(--border-medium);
}

/* ─── Badges ─────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 0.2rem 0.6rem;
  border-radius: var(--radius-full);
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.badge-primary { background: rgba(108,99,255,0.15); color: var(--accent-primary); }
.badge-success { background: rgba(67,233,123,0.15); color: #2BC56A; }
.badge-warning { background: rgba(247,151,30,0.15); color: var(--accent-warning); }
.badge-danger  { background: rgba(255,101,132,0.15); color: var(--accent-secondary); }
.badge-info    { background: rgba(56,161,243,0.15); color: var(--accent-info); }
.badge-count {
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: var(--radius-full);
  background: var(--accent-secondary);
  color: white;
  font-size: 0.65rem;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ─── Cards ──────────────────────────────────── */
.card {
  background: var(--bg-surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border-subtle);
  box-shadow: var(--shadow-sm);
  padding: 1.5rem;
  transition: all var(--transition-normal);
}
.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* ─── Divider ────────────────────────────────── */
.divider {
  height: 1px;
  background: var(--border-subtle);
  margin: 1rem 0;
}

/* ─── Avatar ─────────────────────────────────── */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-full);
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 0.85rem;
  color: white;
  flex-shrink: 0;
}
.avatar-lg { width: 48px; height: 48px; font-size: 1rem; }
.avatar-sm { width: 28px; height: 28px; font-size: 0.7rem; }

/* ─── Progress Bar ───────────────────────────── */
.progress-bar {
  width: 100%;
  height: 8px;
  background: var(--border-subtle);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: var(--radius-full);
  background: linear-gradient(90deg, var(--accent-primary), #8B7CFF);
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.progress-fill.success { background: linear-gradient(90deg, #43E97B, #38F9D7); }
.progress-fill.warning { background: linear-gradient(90deg, #F7971E, #FFD200); }
.progress-fill.danger  { background: linear-gradient(90deg, #FF6584, #FF8C69); }

/* ─── Toast Notifications ────────────────────── */
#toast-container {
  position: fixed;
  bottom: 1.5rem;
  left: 1.5rem;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.toast {
  background: var(--bg-elevated);
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-md);
  padding: 0.75rem 1.25rem;
  box-shadow: var(--shadow-lg);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--text-primary);
  animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  min-width: 250px;
}
.toast.success { border-right: 3px solid var(--accent-tertiary); }
.toast.warning { border-right: 3px solid var(--accent-warning); }
.toast.error   { border-right: 3px solid var(--accent-secondary); }
.toast.info    { border-right: 3px solid var(--accent-info); }

@keyframes toastIn {
  from { opacity: 0; transform: translateX(-30px); }
  to   { opacity: 1; transform: translateX(0); }
}
@keyframes toastOut {
  from { opacity: 1; transform: translateX(0); }
  to   { opacity: 0; transform: translateX(-30px); }
}

/* ─── Overlay / Modal backdrop ───────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 800;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-normal);
}
.overlay.active {
  opacity: 1;
  pointer-events: all;
}

/* ─── Page transition ────────────────────────── */
.page-view {
  animation: pageIn 0.3s ease;
}
@keyframes pageIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ─── Skeleton Loaders ───────────────────────── */
.skeleton {
  background: linear-gradient(90deg, var(--border-subtle) 25%, var(--border-medium) 50%, var(--border-subtle) 75%);
  background-size: 200% 100%;
  border-radius: var(--radius-sm);
  animation: shimmer 1.5s infinite;
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── Tooltip ────────────────────────────────── */
[data-tooltip] { position: relative; }
[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  right: 50%;
  transform: translateX(50%);
  background: var(--text-primary);
  color: var(--bg-surface);
  padding: 0.3rem 0.7rem;
  border-radius: var(--radius-sm);
  font-size: 0.72rem;
  font-weight: 500;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition-fast);
  z-index: 100;
}
[data-tooltip]:hover::after { opacity: 1; }
/* ============================================
   GPMS - layout.css
   Shell layout, sidebar, topbar, responsive
   ============================================ */

/* ─── App Shell ──────────────────────────────── */
#app {
  display: flex;
  min-height: 100vh;
}

/* ─── LOGIN SCREEN ───────────────────────────── */
#login-screen {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-base);
  z-index: 1000;
  overflow: hidden;
  transition: opacity var(--transition-slow);
}

/* Background decoration */
#login-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 20% 20%, rgba(108,99,255,0.12) 0%, transparent 50%),
    radial-gradient(circle at 80% 80%, rgba(255,101,132,0.1) 0%, transparent 50%),
    radial-gradient(circle at 50% 50%, rgba(67,233,123,0.04) 0%, transparent 60%);
  pointer-events: none;
}

.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  padding: 3rem 2.5rem;
  width: 100%;
  max-width: 440px;
  position: relative;
  z-index: 1;
  animation: loginCardIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes loginCardIn {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  margin-bottom: 2rem;
  justify-content: center;
}

.login-logo-icon {
  width: 52px;
  height: 52px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--accent-primary), #8B7CFF);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 8px 24px rgba(108,99,255,0.35);
  font-size: 1.5rem;
  color: white;
}

.login-logo h1 {
  font-size: 1.4rem;
  color: var(--text-primary);
  line-height: 1.1;
}
.login-logo span {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 400;
}

.login-title {
  text-align: center;
  margin-bottom: 2rem;
}
.login-title h2 { font-size: 1.5rem; margin-bottom: 0.4rem; }
.login-title p  { font-size: 0.875rem; color: var(--text-secondary); }

.form-group {
  margin-bottom: 1.25rem;
}
.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 0.45rem;
}
.form-control {
  width: 100%;
  padding: 0.7rem 1rem;
  background: var(--bg-base);
  border: 1.5px solid var(--border-medium);
  border-radius: var(--radius-sm);
  font-family: var(--font-primary);
  font-size: 0.9rem;
  color: var(--text-primary);
  transition: all var(--transition-fast);
  outline: none;
  direction: rtl;
}
.form-control:focus {
  border-color: var(--accent-primary);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.1);
  background: var(--bg-surface);
}
.form-control::placeholder { color: var(--text-muted); }

.role-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
  margin-bottom: 1.5rem;
}

.role-card {
  padding: 0.75rem;
  border: 1.5px solid var(--border-medium);
  border-radius: var(--radius-md);
  cursor: pointer;
  text-align: center;
  transition: all var(--transition-fast);
  background: var(--bg-base);
}
.role-card:hover {
  border-color: var(--accent-primary);
  background: rgba(108,99,255,0.05);
}
.role-card.selected {
  border-color: var(--accent-primary);
  background: rgba(108,99,255,0.1);
  box-shadow: 0 0 0 3px rgba(108,99,255,0.15);
}
.role-card .role-icon {
  font-size: 1.5rem;
  margin-bottom: 0.3rem;
  display: block;
}
.role-card .role-name {
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text-primary);
}
.role-card .role-desc {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 0.1rem;
}

/* ─── MAIN APP SHELL ─────────────────────────── */
#main-app {
  display: flex;
  width: 100%;
  min-height: 100vh;
}

/* ─── Sidebar ────────────────────────────────── */
#sidebar {
  width: var(--sidebar-width);
  min-height: 100vh;
  background: var(--bg-sidebar);
  display: flex;
  flex-direction: column;
  position: fixed;
  right: 0;
  top: 0;
  bottom: 0;
  z-index: 200;
  transition: width var(--transition-slow), transform var(--transition-slow);
  overflow: hidden;
  border-left: 1px solid rgba(255,255,255,0.04);
}

#sidebar.collapsed {
  width: var(--sidebar-collapsed);
}

/* Sidebar Brand */
.sidebar-brand {
  height: var(--topbar-height);
  display: flex;
  align-items: center;
  padding: 0 1.25rem;
  gap: 0.875rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  overflow: hidden;
  white-space: nowrap;
}

.sidebar-logo {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--accent-primary), #8B7CFF);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  box-shadow: 0 4px 14px rgba(108,99,255,0.4);
  font-size: 1rem;
  color: white;
}

.sidebar-brand-text { overflow: hidden; }
.sidebar-brand-text h2 {
  font-size: 0.95rem;
  font-weight: 800;
  color: white;
  white-space: nowrap;
  font-family: var(--font-display);
}
.sidebar-brand-text span {
  font-size: 0.65rem;
  color: var(--text-sidebar);
  display: block;
  white-space: nowrap;
}

/* Sidebar User */
.sidebar-user {
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  gap: 0.75rem;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
  overflow: hidden;
}
.sidebar-user-info { overflow: hidden; }
.sidebar-user-info .user-name {
  font-size: 0.85rem;
  font-weight: 600;
  color: white;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.sidebar-user-info .user-role {
  font-size: 0.68rem;
  color: var(--text-sidebar);
  white-space: nowrap;
}

/* Sidebar Nav */
.sidebar-nav {
  flex: 1;
  padding: 0.75rem 0;
  overflow-y: auto;
  overflow-x: hidden;
}

.nav-section-label {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  padding: 0.75rem 1.4rem 0.4rem;
  white-space: nowrap;
  overflow: hidden;
  transition: opacity var(--transition-normal);
}
#sidebar.collapsed .nav-section-label { opacity: 0; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 0.875rem;
  padding: 0.7rem 1.25rem;
  cursor: pointer;
  transition: all var(--transition-fast);
  position: relative;
  border-radius: 0;
  overflow: hidden;
  white-space: nowrap;
  color: var(--text-sidebar);
  margin: 0.1rem 0.75rem;
  border-radius: var(--radius-sm);
}

.nav-item:hover {
  background: var(--bg-sidebar-hover);
  color: #D0D4FF;
}

.nav-item.active {
  background: var(--bg-sidebar-active);
  color: white;
}

.nav-item.active::before {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 60%;
  background: var(--accent-primary);
  border-radius: var(--radius-full) 0 0 var(--radius-full);
}

.nav-item-icon {
  width: 22px;
  height: 22px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
}
.nav-item-text {
  font-size: 0.875rem;
  font-weight: 500;
  flex: 1;
  white-space: nowrap;
}
.nav-item-badge {
  flex-shrink: 0;
}

body.sidebar-collapsed #content-area {

/* ─── Page Sections ──────────────────────────── */
.page-header {

.page-header-left h2 {

  left: -10%;

  height: 80px;

}

.dashboard-grid {

.dashboard-grid.three-col {

/* ─── Placeholder Pages ──────────────────────── */
.placeholder-page {

  flex-direction: column;
  align-items: center;
  justify-content: center;

}

  height: 80px;

  align-items: center;
  justify-content: center;
  font-size: 2rem;
  color: var(--accent-primary);
}
.placeholder-page h3 { font-size: 1.3rem; }
.placeholder-page p  { color: var(--text-secondary); max-width: 360px; font-size: 0.9rem; }

.coming-soon-badge {

  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 1rem;
  background: rgba(108,99,255,0.08);
  border: 1px solid rgba(108,99,255,0.2);
  border-radius: var(--radius-full);
  color: var(--accent-primary);
  font-size: 0.8rem;
  font-weight: 600;
}

/* ─── Responsive ─────────────────────────────── */
@media (max-width: 1024px) {
  .dashboard-grid.three-col { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 768px) {
  :root {
    --sidebar-width: 260px;
  }

  #sidebar {
    transform: translateX(100%);

    z-index: 500;
  }
  #sidebar.mobile-open {
    transform: translateX(0);
  }

  #topbar {
    right: 0;
    padding: 0 1rem;
  }

  .search-bar { display: none; }

  #content-area {
    margin-right: 0;
    padding: 1.25rem;
  }

  .stats-grid { grid-template-columns: 1fr 1fr; }
  .dashboard-grid { grid-template-columns: 1fr; }
  .dashboard-grid.three-col { grid-template-columns: 1fr; }

  .page-header { flex-direction: column; align-items: flex-start; }

  #overlay { display: block; }
}

@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr; }
  .role-grid  { grid-template-columns: 1fr 1fr; }
  #content-area { padding: 1rem; }
  .login-card { padding: 2rem 1.5rem; }
}

const State = (() => {

    theme: localStorage.getItem('gpms_theme') || 'dark',

    // Simulated data (Phase 1 static)

      { id: 2, type: 'meeting', text: 'اجتماع مراجعة المشروع غداً الساعة 10:00', user: 'سارة علي', time: 'منذ 30 دقيقة', avatar: 'س' },
      { id: 3, type: 'alert', text: 'موعد تسليم تقرير المرحلة الأولى قريب', user: 'النظام', time: 'منذ ساعة', avatar: '⚠' },
      { id: 4, type: 'task', text: 'بدأ العمل على "واجهة المستخدم الرئيسية"', user: 'خالد حسن', time: 'منذ ساعتين', avatar: 'خ' },
      { id: 5, type: 'join', text: 'انضم عضو جديد إلى الفريق', user: 'منى أحمد', time: 'منذ 3 ساعات', avatar: 'م' },

      { id: 3, title: 'كتابة وثيقة المتطلبات', status: 'inprogress', priority: 'medium', assignee: 'خالد' },
      { id: 4, title: 'اختبار وحدة المصادقة', status: 'todo', priority: 'medium', assignee: 'منى' },
      { id: 5, title: 'تقرير المرحلة الأولى', status: 'todo', priority: 'urgent', assignee: 'عمر' },
    ],
  };

  // ─── Listeners ───────────────────────────────
  const _listeners = {};

  function on(event, callback) {
    if (!_listeners[event]) _listeners[event] = [];
    _listeners[event].push(callback);
  }

  function emit(event, data) {
    (_listeners[event] || []).forEach(cb => cb(data));
  }

  // ─── Getters ─────────────────────────────────
  function get(key) {
    return key ? _state[key] : { ..._state };
  }

  // ─── Setters ─────────────────────────────────
  function set(key, value) {
    _state[key] = value;
    emit('change', { key, value });
    emit(`change:${key}`, value);
  }

  // ─── Theme ───────────────────────────────────
  function setTheme(theme) {
    _state.theme = theme;
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('gpms_theme', theme);
    emit('themeChange', theme);
  }

  function toggleTheme() {
    setTheme(_state.theme === 'dark' ? 'light' : 'dark');
  }

  // ─── Sidebar ─────────────────────────────────
  function toggleSidebar() {
    _state.sidebarCollapsed = !_state.sidebarCollapsed;
    localStorage.setItem('gpms_sidebar', _state.sidebarCollapsed ? '1' : '0');
    emit('sidebarToggle', _state.sidebarCollapsed);
  }

  // ─── Auth ─────────────────────────────────────
  function login(user) {
    _state.isAuthenticated = true;
    _state.currentUser = user;
    sessionStorage.setItem('gpms_user', JSON.stringify(user));
    emit('login', user);
  }

  function logout() {
    _state.isAuthenticated = false;
    _state.currentUser = null;
    sessionStorage.removeItem('gpms_user');
    emit('logout');
  }

  function restoreSession() {
    try {
      const saved = sessionStorage.getItem('gpms_user');
      if (saved) {
        const user = JSON.parse(saved);
        _state.isAuthenticated = true;
        _state.currentUser = user;
        return user;
      }
    } catch (e) {}
    return null;
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Restore theme
    document.documentElement.setAttribute('data-theme', _state.theme);

    // Restore sidebar state
    const savedSidebar = localStorage.getItem('gpms_sidebar');
    if (savedSidebar === '1') _state.sidebarCollapsed = true;
  }

  return { get, set, on, emit, setTheme, toggleTheme, toggleSidebar, login, logout, restoreSession, init };
})();

  // ─── Task Donut ───────────────────────────────
  function renderTaskDonut(active, completed) {
    const total = active + completed;
    const pct = Math.round((completed / total) * 100);
    const r = 50, cx = 60, cy = 60;
    const circumference = 2 * Math.PI * r;
    const dashOffset = circumference - (pct / 100) * circumference;

    return `
      <div style="display:flex; align-items:center; justify-content:center; position:relative; height:120px;">
        <svg width="120" height="120" viewBox="0 0 120 120" style="transform:rotate(-90deg)">
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border-subtle)" stroke-width="14"/>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--accent-primary)" stroke-width="14"
            stroke-dasharray="${circumference}" stroke-dashoffset="${dashOffset}"
            stroke-linecap="round" style="transition: stroke-dashoffset 1s ease;"/>
        </svg>
        <div style="position:absolute; text-align:center;">
          <div style="font-size:1.5rem; font-weight:800; font-family:var(--font-display); color:var(--text-primary);">${pct}%</div>
          <div style="font-size:0.65rem; color:var(--text-muted); font-weight:500;">مكتملة</div>

window.Components = Components;
/**
 * GPMS - router.js
 * Client-side SPA router (hash-based)
 */

const Router = (() => {
  // ─── Route Definitions ───────────────────────
  const routes = {
    'dashboard':       { title: 'لوحة التحكم',    icon: '🏠', breadcrumb: 'الرئيسية' },
    'projects':        { title: 'المشاريع',        icon: '📁', breadcrumb: 'الرئيسية / المشاريع' },
    'teams':           { title: 'الفرق والأعضاء', icon: '👥', breadcrumb: 'الرئيسية / الفرق' },
    'tasks':           { title: 'المهام',          icon: '✅', breadcrumb: 'الرئيسية / المهام' },
    'meetings':        { title: 'الاجتماعات',      icon: '📅', breadcrumb: 'الرئيسية / الاجتماعات' },
    'research':        { title: 'مركز البحث',      icon: '🔬', breadcrumb: 'الرئيسية / مركز البحث' },
    'chat':            { title: 'المحادثات',       icon: '💬', breadcrumb: 'الرئيسية / المحادثات' },
    'reports':         { title: 'التقارير',        icon: '📊', breadcrumb: 'الرئيسية / التقارير' },
    'settings':        { title: 'الإعدادات',       icon: '⚙️', breadcrumb: 'الرئيسية / الإعدادات' },
  };

  let _currentRoute = 'dashboard';
  let _listeners = [];

  // ─── Navigate ────────────────────────────────
  function navigate(route) {
    if (!routes[route]) {
      console.warn(`[Router] Unknown route: ${route}`);
      route = 'dashboard';
    }

    _currentRoute = route;
    window.location.hash = route;
    State.set('currentRoute', route);

    _listeners.forEach(cb => cb(route, routes[route]));
    _updateUI(route);
  }

  // ─── Update UI ───────────────────────────────
  function _updateUI(route) {
    const info = routes[route];

    // Update topbar title
    const titleEl = document.querySelector('.topbar-page-title h3');
    const breadEl = document.querySelector('.topbar-page-title .breadcrumb');
    if (titleEl) titleEl.textContent = info.title;
    if (breadEl) breadEl.textContent = info.breadcrumb;

    // Update sidebar active state
    document.querySelectorAll('.nav-item').forEach(el => {
      el.classList.toggle('active', el.dataset.route === route);
    });

    // Render page
    _renderPage(route);

    // Close mobile sidebar
    State.set('mobileSidebarOpen', false);
    document.getElementById('sidebar')?.classList.remove('mobile-open');
    document.getElementById('overlay')?.classList.remove('active');
  }

  // ─── Render page content ─────────────────────
  function _renderPage(route) {
    const content = document.getElementById('page-content');
    if (!content) return;

    content.innerHTML = '';
    content.className = 'page-view';

    // Force reflow for animation
    void content.offsetWidth;

    switch (route) {
      case 'dashboard': content.innerHTML = Components.renderDashboard(); break;
      case 'settings':  content.innerHTML = Components.renderSettings();  break;
      default:          content.innerHTML = Components.renderPlaceholder(route, routes[route]); break;
    }

    // Post-render hooks
    _afterRender(route);
  }

  function _afterRender(route) {
    if (route === 'dashboard') {
      // Animate progress bars
      setTimeout(() => {
        document.querySelectorAll('.progress-fill[data-value]').forEach(bar => {
          bar.style.width = bar.dataset.value + '%';
        });
      }, 100);
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Parse initial hash
    const hash = window.location.hash.replace('#', '');
    const initial = routes[hash] ? hash : 'dashboard';

    // Handle hash changes
    window.addEventListener('hashchange', () => {
      const h = window.location.hash.replace('#', '');
      if (routes[h] && h !== _currentRoute) navigate(h);
    });

    navigate(initial);
  }

  function on(cb) { _listeners.push(cb); }
  function current() { return _currentRoute; }
  function getInfo(route) { return routes[route || _currentRoute]; }
  function getAllRoutes() { return routes; }

  return { navigate, init, on, current, getInfo, getAllRoutes };
})();

window.Router = Router;
/**
 * GPMS - app.js
 * Main application controller
 */

// ─── Toast Notifications ──────────────────────
const Toast = (() => {
  function show(message, type = 'info', duration = 3500) {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const icons = { success: '✅', warning: '⚠️', error: '❌', info: 'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type] || icons.info}</span><span>${message}</span>`;

    container.appendChild(toast);

    setTimeout(() => {
      toast.style.animation = 'toastOut 0.3s ease forwards';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }

  return { show };
})();

// ─── App Controller ────────────────────────────
const App = (() => {

  // ─── Show Login ──────────────────────────────
  function showLogin() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('main-app').style.display = 'none';
    Auth.renderLogin();
  }

  // ─── Show Main App ────────────────────────────
  function showMainApp(user) {
    // Hide login
    const loginScreen = document.getElementById('login-screen');
    loginScreen.style.opacity = '0';
    loginScreen.style.transition = 'opacity 0.4s ease';

    setTimeout(() => {
      loginScreen.style.display = 'none';
      loginScreen.style.opacity = '1';
    }, 400);

    // Show main app
    const mainApp = document.getElementById('main-app');
    mainApp.style.display = 'flex';
    mainApp.style.opacity = '0';

    // Render sidebar
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = Components.renderSidebar(user);

    // Restore sidebar state
    if (State.get('sidebarCollapsed')) {
      sidebar.classList.add('collapsed');
      document.body.classList.add('sidebar-collapsed');
    }

    // Topbar user info
    _updateTopbarUser(user);

    setTimeout(() => {
      mainApp.style.transition = 'opacity 0.4s ease';
      mainApp.style.opacity = '1';
      Router.init();
    }, 50);

    Toast.show(`مرحباً ${user.name}! 👋`, 'success');
  }

  // ─── Update Topbar User ───────────────────────
  function _updateTopbarUser(user) {
    const avatarEl = document.querySelector('.topbar-avatar .avatar');
    if (avatarEl) {
      avatarEl.textContent = user.avatar;
      avatarEl.style.background = `linear-gradient(135deg, ${user.roleColor}, #8B7CFF)`;
    }
  }

  // ─── Toggle Sidebar ───────────────────────────
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      // Mobile: slide in/out
      const isOpen = sidebar.classList.toggle('mobile-open');
      document.getElementById('overlay').classList.toggle('active', isOpen);
      State.set('mobileSidebarOpen', isOpen);
    } else {
      // Desktop: collapse/expand
      sidebar.classList.toggle('collapsed');
      const collapsed = sidebar.classList.contains('collapsed');
      document.body.classList.toggle('sidebar-collapsed', collapsed);
      State.set('sidebarCollapsed', collapsed);
      localStorage.setItem('gpms_sidebar', collapsed ? '1' : '0');
    }
  }

  // ─── Sync Theme Toggle ────────────────────────
  function syncThemeToggle() {
    const thumb = document.querySelector('.theme-toggle-thumb');
    const theme = State.get('theme');
    if (thumb) thumb.textContent = theme === 'dark' ? '🌙' : '☀️';

    // Also sync settings page role cards if visible
    document.querySelectorAll('.role-card[onclick*="setTheme"]').forEach(el => {
      const isLight = el.getAttribute('onclick')?.includes("'light'");
      el.classList.toggle('selected', isLight ? theme === 'light' : theme === 'dark');
    });
  }

  // ─── Topbar search handler ─────────────────────
  function handleSearch(e) {
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) Toast.show(`🔍 البحث عن: "${val}" — قريباً`, 'info');
    }
  }

  // ─── Init ─────────────────────────────────────
  function init() {
    // Init state (theme etc.)
    State.init();

    // Theme toggle listener
    State.on('themeChange', () => syncThemeToggle());

    // Overlay click closes mobile sidebar
    document.getElementById('overlay')?.addEventListener('click', () => {
      document.getElementById('sidebar')?.classList.remove('mobile-open');
      document.getElementById('overlay')?.classList.remove('active');
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', e => {
      // Ctrl/Cmd + K = search focus
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        document.querySelector('.search-bar input')?.focus();
      }
      // Escape = close mobile sidebar
      if (e.key === 'Escape') {
        document.getElementById('sidebar')?.classList.remove('mobile-open');
        document.getElementById('overlay')?.classList.remove('active');
      }
    });

    // Search input
    document.querySelector('.search-bar input')?.addEventListener('keydown', handleSearch);

    // Check for existing session
    const savedUser = State.restoreSession();
    if (savedUser) {
      showMainApp(savedUser);
    } else {
      showLogin();
    }

    // Initial theme sync
    syncThemeToggle();

    console.log('%cGPMS v1.0 — Phase 1 Foundation', 'color:#6C63FF;font-weight:bold;font-size:14px;');
    console.log('%c✔ State  ✔ Router  ✔ Auth  ✔ Components  ✔ Theme', 'color:#43E97B;font-size:12px;');
  }

  return { init, showLogin, showMainApp, toggleSidebar, syncThemeToggle, handleSearch };
})();

window.Toast = Toast;
window.App = App;

// ─── Boot ─────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => App.init());
  </script>
